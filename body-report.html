<!DOCTYPE html>
<!-- html-demo-generator: Visbody 体测报告单页查看 Demo -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体测报告 - Visbody Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #fff;
      --primary: #1677ff;
      --primary-light: #e6f4ff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --font: 'Noto Sans SC', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

    .header {
      background: var(--card);
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .main { max-width: 800px; margin: 0 auto; padding: 24px; }

    /* Tab 切换 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--card);
      padding: 4px;
      border-radius: var(--radius);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .tabs button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 14px; font-weight: 500; font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .tabs button:hover { color: var(--text); background: var(--bg); }
    .tabs button.active { background: var(--primary); color: #fff; }

    /* 评分大卡片 */
    .score-card {
      background: linear-gradient(135deg, var(--primary) 0%, #4096ff 100%);
      color: #fff;
      padding: 24px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(22, 119, 255, .25);
    }
    .score-card .label { font-size: 13px; opacity: .9; margin-bottom: 4px; }
    .score-card .value { font-size: 36px; font-weight: 700; }
    .score-card .unit { font-size: 16px; font-weight: 500; opacity: .9; margin-left: 4px; }
    .score-card .tip { font-size: 12px; opacity: .85; margin-top: 8px; }

    /* 指标网格 */
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .metric-card {
      background: var(--card);
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .metric-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .metric-card .value { font-size: 22px; font-weight: 600; color: var(--primary); }
    .metric-card .unit { font-size: 13px; color: var(--text-muted); font-weight: 400; margin-left: 2px; }

    /* 详细列表 */
    .detail-list {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .detail-list .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .detail-list .row:last-child { border-bottom: none; }
    .detail-list .name { font-size: 14px; color: var(--text); }
    .detail-list .val { font-size: 14px; font-weight: 600; color: var(--primary); }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .metrics { grid-template-columns: 1fr; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>体测报告</h1>
    <p class="sub">本次体测结果 · 仅供参考演示</p>
  </header>

  <main class="main">
    <div class="tabs" role="tablist">
      <button type="button" class="active" data-tab="overview" aria-selected="true">概览</button>
      <button type="button" data-tab="detail" aria-selected="false">详细</button>
    </div>

    <section id="overview-panel" class="panel">
      <div class="score-card">
        <div class="label">身体综合评分</div>
        <div><span class="value" id="total-score">82</span><span class="unit">分</span></div>
        <div class="tip">基于体重、体脂、肌肉等指标综合计算，仅供参考。</div>
      </div>
      <div class="metrics">
        <div class="metric-card">
          <div class="label">体重</div>
          <div><span class="value" id="m-weight">65.2</span><span class="unit">kg</span></div>
        </div>
        <div class="metric-card">
          <div class="label">体脂率</div>
          <div><span class="value" id="m-fat">22.3</span><span class="unit">%</span></div>
        </div>
        <div class="metric-card">
          <div class="label">肌肉量</div>
          <div><span class="value" id="m-muscle">28.5</span><span class="unit">kg</span></div>
        </div>
        <div class="metric-card">
          <div class="label">BMI</div>
          <div><span class="value" id="m-bmi">22.1</span><span class="unit"></span></div>
        </div>
      </div>
    </section>

    <section id="detail-panel" class="panel hidden">
      <div class="score-card">
        <div class="label">身体综合评分</div>
        <div><span class="value">82</span><span class="unit">分</span></div>
      </div>
      <div class="metrics">
        <div class="metric-card"><div class="label">体重</div><div><span class="value">65.2</span><span class="unit">kg</span></div></div>
        <div class="metric-card"><div class="label">体脂率</div><div><span class="value">22.3</span><span class="unit">%</span></div></div>
        <div class="metric-card"><div class="label">肌肉量</div><div><span class="value">28.5</span><span class="unit">kg</span></div></div>
        <div class="metric-card"><div class="label">BMI</div><div><span class="value">22.1</span><span class="unit"></span></div></div>
      </div>
      <div class="detail-list">
        <div class="row"><span class="name">水分率</span><span class="val">58.2%</span></div>
        <div class="row"><span class="name">骨骼量</span><span class="val">2.8 kg</span></div>
        <div class="row"><span class="name">基础代谢</span><span class="val">1520 kcal</span></div>
        <div class="row"><span class="name">内脏脂肪等级</span><span class="val">6</span></div>
        <div class="row"><span class="name">体型</span><span class="val">标准</span></div>
      </div>
    </section>
  </main>

  <script>
    // 模拟单次体测数据（与 PRD 一致）
    var report = {
      totalScore: 82,
      weight: 65.2,
      bodyFat: 22.3,
      muscle: 28.5,
      bmi: 22.1,
      water: 58.2,
      bone: 2.8,
      bmr: 1520,
      visceralLevel: 6,
      bodyType: '标准'
    };

    var tabs = document.querySelectorAll('.tabs button');
    var overviewPanel = document.getElementById('overview-panel');
    var detailPanel = document.getElementById('detail-panel');

    tabs.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var tab = this.getAttribute('data-tab');
        tabs.forEach(function(b) { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
        this.classList.add('active');
        this.setAttribute('aria-selected', 'true');
        overviewPanel.classList.toggle('hidden', tab !== 'overview');
        detailPanel.classList.toggle('hidden', tab !== 'detail');
      });
    });
  </script>
</body>
</html>
