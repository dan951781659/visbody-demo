<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报告列表批量导出 - 研发演示 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #fff;
      --primary: #165DFF;
      --primary-light: #e8f0ff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 8px;
      --font-sans: 'DM Sans', 'Noto Sans SC', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

    .header {
      background: var(--card-bg);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .breadcrumb { font-size: 15px; color: var(--text-muted); }
    .breadcrumb a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .breadcrumb span { color: var(--text); font-weight: 600; }

    .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* 筛选区 */
    .filter-bar {
      background: var(--card-bg);
      padding: 20px 24px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }
    .filter-bar label { font-size: 14px; color: var(--text-muted); margin-right: 6px; }
    .filter-bar input[type="text"],
    .filter-bar input[type="date"] {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .filter-bar input[type="text"] { width: 200px; }
    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      min-width: 120px;
    }
    .date-range {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .date-range input[type="date"] { width: 140px; }
    .date-range .sep { color: var(--text-muted); font-size: 14px; }
    .date-range .calendar-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      margin-left: 2px;
    }
    .date-range .calendar-icon:hover { border-color: var(--primary); color: var(--primary); }
    .search-btn {
      padding: 10px 16px;
      min-width: 44px;
      justify-content: center;
    }
    .search-btn svg { width: 18px; height: 18px; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.05); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover:not(:disabled) { background: var(--primary-light); }
    .btn-group { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .export-wrap { position: relative; }
    .export-wrap .btn-export { min-width: 120px; }
    .export-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      min-width: 160px;
      z-index: 10;
    }
    .export-dropdown.show { display: block; }
    .export-dropdown button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: none;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 0;
    }
    .export-dropdown button:hover { background: var(--bg); }
    .export-dropdown button:first-child { border-radius: 6px 6px 0 0; }
    .export-dropdown button:last-child { border-radius: 0 0 6px 6px; }
    .selected-count {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      margin-left: 8px;
      font-weight: 500;
    }
    .selected-count strong { color: #fff; font-weight: 600; }

    /* 表格 */
    .table-wrap {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #f8fafc; color: var(--text-muted); font-weight: 600; }
    th input[type="checkbox"] { cursor: pointer; }
    td input[type="checkbox"] { cursor: pointer; }
    tr:hover { background: #f8fafc; }
    tr.selected { background: var(--primary-light); }
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; }
    .user-name { font-weight: 500; }
    .user-contact { font-size: 12px; color: var(--text-muted); }
    .measure-icons { display: flex; gap: 4px; }
    .measure-icon { width: 24px; height: 24px; border-radius: 4px; }
    .measure-icon.green { background: #22c55e; }
    .measure-icon.purple { background: #a855f7; }
    .measure-icon.red { background: #ef4444; }
    .ops { display: flex; gap: 8px; align-items: center; }
    .ops .icon { width: 28px; height: 28px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: var(--text-muted); }
    .ops .icon:hover { background: var(--bg); color: var(--primary); }
    .ops .icon.download { color: #22c55e; }
    .ops .icon.delete { color: #ef4444; }

    /* 分页 */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    .pagination-info { font-size: 14px; color: var(--text-muted); }
    .pagination-controls { display: flex; align-items: center; gap: 4px; }
    .pagination-controls button, .pagination-controls span {
      min-width: 36px; height: 36px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .pagination-controls button:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .pagination-controls button:disabled { cursor: not-allowed; opacity: .6; }
    .pagination-controls span.current { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pagination-controls select {
      margin-left: 12px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      opacity: 0;
      transition: transform .25s, opacity .25s;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .btn.loading { pointer-events: none; opacity: .8; }
    .btn.loading::after { content: ''; width: 16px; height: 16px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; margin-left: 8px; }
    .btn-secondary { background: #64748b; color: #fff; }
    .btn-secondary:hover:not(:disabled) { filter: brightness(1.1); }

    /* 批量导出弹窗 */
    .modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-mask.show { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      min-width: 480px;
      max-width: 600px;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
    }
    .modal h3 { font-size: 18px; margin-bottom: 20px; color: var(--text); font-weight: 600; }
    .modal-step { display: none; }
    .modal-step.active { display: block; }
    .modal-step-title { font-size: 15px; color: var(--text); margin-bottom: 16px; font-weight: 500; }
    .modal-option {
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .modal-option:hover { border-color: var(--primary); background: var(--primary-light); }
    .modal-option.selected { border-color: var(--primary); background: var(--primary-light); }
    .modal-option-title { font-size: 15px; color: var(--text); font-weight: 600; margin-bottom: 6px; }
    .modal-option-desc { font-size: 13px; color: var(--text-muted); }
    .modal-filter-group {
      margin-bottom: 16px;
    }
    .modal-filter-group label {
      display: block;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .modal-filter-group select,
    .modal-filter-group input[type="date"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .modal-info {
      background: var(--bg);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .modal-info strong { color: var(--primary); font-weight: 600; }
    .modal-format-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .modal-format-option {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .modal-format-option:hover { border-color: var(--primary); }
    .modal-format-option.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    .modal-format-option input[type="radio"] { display: none; }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .modal-actions .btn { min-width: 80px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header class="header">
    <div class="breadcrumb"><a href="#">报告管理</a> <span>| 报告列表</span></div>
  </header>

  <main class="main">
    <div class="filter-bar">
      <div class="date-range">
        <input type="date" value="2026-01-01" id="startDate" title="开始日期">
        <span class="sep">-</span>
        <input type="date" value="2026-01-31" id="endDate" title="结束日期">
      </div>
      <div>
        <input type="text" placeholder="按邮箱/姓名" id="searchInput">
      </div>
      <button type="button" class="btn btn-primary search-btn" title="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <div class="btn-group">
        <button type="button" class="btn btn-primary">数据预览</button>
        <button type="button" class="btn btn-primary" id="btnBatchExport">
          批量导出
          <span class="selected-count" id="selectedCount"></span>
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width: 48px;">
              <input type="checkbox" id="checkAll" title="全选本页">
            </th>
            <th>用户信息</th>
            <th>扫描时间</th>
            <th>测量项目</th>
            <th>设备型号</th>
            <th>SN</th>
            <th>门店</th>
            <th style="width: 140px;">操作</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <!-- 由 JS 填充 -->
        </tbody>
      </table>
      <div class="pagination">
        <div class="pagination-info">共 335 条</div>
        <div class="pagination-controls">
          <button type="button" disabled>&lt;</button>
          <span class="current">1</span>
          <button type="button">2</button>
          <button type="button">3</button>
          <button type="button">4</button>
          <button type="button">5</button>
          <span>...</span>
          <button type="button">17</button>
          <button type="button">&gt;</button>
          <select>
            <option>20条/页</option>
            <option>50条/页</option>
            <option>100条/页</option>
          </select>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- 批量导出弹窗 -->
  <div class="modal-mask" id="exportModal">
    <div class="modal">
      <h3>批量导出</h3>
      
      <!-- 步骤1：选择导出方式 -->
      <div class="modal-step active" id="step1">
        <div class="modal-step-title">请选择导出方式</div>
        <div class="modal-option" data-mode="selected">
          <div class="modal-option-title">按勾选导出</div>
          <div class="modal-option-desc">导出当前已勾选的报告（<span id="selectedCountInModal">0</span> 条）</div>
        </div>
        <div class="modal-option" data-mode="filter">
          <div class="modal-option-title">按条件导出</div>
          <div class="modal-option-desc">根据筛选条件导出全部符合条件的报告</div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="step1Cancel">取消</button>
          <button type="button" class="btn btn-primary" id="step1Next" disabled>下一步</button>
        </div>
      </div>

      <!-- 步骤2：按勾选导出 - 选择格式 -->
      <div class="modal-step" id="step2Selected">
        <div class="modal-step-title">选择导出格式</div>
        <div class="modal-info">已选择 <strong id="selectedCountStep2">0</strong> 条报告</div>
        <div class="modal-format-group">
          <label class="modal-format-option selected" data-format="excel">
            <input type="radio" name="format" value="excel" checked>
            <div>Excel (.xlsx)</div>
          </label>
          <label class="modal-format-option" data-format="csv">
            <input type="radio" name="format" value="csv">
            <div>CSV (.csv)</div>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="step2SelectedBack">上一步</button>
          <button type="button" class="btn btn-primary" id="step2SelectedConfirm">确认导出</button>
        </div>
      </div>

      <!-- 步骤2：按条件导出 - 设置筛选条件 -->
      <div class="modal-step" id="step2Filter">
        <div class="modal-step-title">设置筛选条件</div>
        <div class="modal-filter-group">
          <label>时间段</label>
          <div style="display: flex; gap: 12px;">
            <input type="date" id="modalStartDate" value="2026-01-01">
            <input type="date" id="modalEndDate" value="2026-01-31">
          </div>
        </div>
        <div class="modal-filter-group">
          <label>性别</label>
          <select id="modalGender">
            <option value="">全部</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div class="modal-filter-group">
          <label>测量项目</label>
          <select id="modalMeasure">
            <option value="">全部</option>
            <option value="体态评估">体态评估</option>
            <option value="身体围度">身体围度</option>
            <option value="肩部功能">肩部功能</option>
          </select>
        </div>
        <div class="modal-info">当前筛选结果约 <strong id="filterResultCount">335</strong> 条</div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="step2FilterBack">上一步</button>
          <button type="button" class="btn btn-primary" id="step2FilterNext">下一步</button>
        </div>
      </div>

      <!-- 步骤3：按条件导出 - 选择格式 -->
      <div class="modal-step" id="step3Filter">
        <div class="modal-step-title">选择导出格式</div>
        <div class="modal-info">当前筛选结果约 <strong id="filterResultCountStep3">335</strong> 条</div>
        <div class="modal-format-group">
          <label class="modal-format-option selected" data-format="excel">
            <input type="radio" name="formatFilter" value="excel" checked>
            <div>Excel (.xlsx)</div>
          </label>
          <label class="modal-format-option" data-format="csv">
            <input type="radio" name="formatFilter" value="csv">
            <div>CSV (.csv)</div>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="step3FilterBack">上一步</button>
          <button type="button" class="btn btn-primary" id="step3FilterConfirm">确认导出</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MAX_EXPORT = 500;
    const mockRows = [
      { id: 1, name: 'koko-sss', contact: '7818****3367@qq.com', time: '2026-01-22 11:17:27', icons: ['green','purple','red'], device: 'Visbody-M30', sn: 'N1C0123456789290', store: '【测试】西安测试' },
      { id: 2, name: '刘', contact: '+861****3412', time: '2026-01-22 14:33:02', icons: ['green','purple'], device: 'Visbody-R Explorer', sn: 'N1C0123456789291', store: '【测试】西安测试' },
      { id: 3, name: '杨晓彤', contact: '7818****3367@qq.com', time: '2026-01-21 10:06:14', icons: ['green'], device: 'Visbody-S30', sn: 'N1C0123456789292', store: '【测试】西安测试' },
      { id: 4, name: '张明', contact: '138****5678', time: '2026-01-20 15:20:00', icons: ['purple','red'], device: 'Visbody-M60', sn: 'N1C0123456789293', store: '【测试】西安测试' },
      { id: 5, name: '李华', contact: 'li***@163.com', time: '2026-01-19 09:45:22', icons: ['green','red'], device: 'Visbody-M30', sn: 'N1C0123456789294', store: '【测试】西安测试' },
    ];

    let currentStep = 'step1';
    let selectedMode = null;

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = mockRows.map(r => `
        <tr data-id="${r.id}">
          <td><input type="checkbox" class="row-check" value="${r.id}"></td>
          <td>
            <div class="user-cell">
              <div>
                <div class="user-name">${r.name}</div>
                <div class="user-contact">${r.contact}</div>
            </div>
          </td>
          <td>${r.time}</td>
          <td><div class="measure-icons">${r.icons.map(c => `<span class="measure-icon ${c}"></span>`).join('')}</div></td>
          <td>${r.device}</td>
          <td>${r.sn}</td>
          <td>${r.store}</td>
          <td>
            <div class="ops">
              <span class="icon" title="AI报告">AI+</span>
              <span class="icon" title="查看">📄</span>
              <span class="icon download" title="下载PDF">↓</span>
              <span class="icon delete" title="删除">🗑</span>
            </div>
          </td>
        </tr>
      `).join('');
      bindRowCheck();
    }

    function bindRowCheck() {
      const checkAll = document.getElementById('checkAll');
      const rowChecks = document.querySelectorAll('.row-check');
      checkAll.addEventListener('change', function() {
        rowChecks.forEach(cb => { cb.checked = this.checked; });
        document.querySelectorAll('#tbody tr').forEach(tr => tr.classList.toggle('selected', this.checked));
        updateExportState();
      });
      rowChecks.forEach((cb, i) => {
        cb.addEventListener('change', function() {
          document.querySelector(`#tbody tr[data-id="${mockRows[i].id}"]`).classList.toggle('selected', this.checked);
          const allChecked = Array.from(rowChecks).every(c => c.checked);
          const anyChecked = Array.from(rowChecks).some(c => c.checked);
          checkAll.checked = allChecked;
          checkAll.indeterminate = anyChecked && !allChecked;
          updateExportState();
        });
      });
    }

    function getSelectedCount() {
      return document.querySelectorAll('.row-check:checked').length;
    }

    function updateExportState() {
      const n = getSelectedCount();
      const btn = document.getElementById('btnBatchExport');
      const countEl = document.getElementById('selectedCount');
      if (n === 0) {
        countEl.textContent = '';
      } else {
        countEl.innerHTML = n <= MAX_EXPORT ? `(<strong>已选 ${n} 条</strong>)` : `(<strong>已选 ${n} 条</strong>，超过单次上限 ${MAX_EXPORT} 条)`;
      }
      // 更新弹窗中的选中数量
      const modalCountEl = document.getElementById('selectedCountInModal');
      if (modalCountEl) modalCountEl.textContent = n;
      // 如果弹窗打开且在步骤1且选择了"按勾选导出"，更新下一步按钮状态
      const modal = document.getElementById('exportModal');
      if (modal.classList.contains('show') && currentStep === 'step1' && selectedMode === 'selected') {
        const nextBtn = document.getElementById('step1Next');
        if (n === 0) {
          nextBtn.disabled = true;
          nextBtn.title = '请至少选择 1 条报告后再导出';
        } else {
          nextBtn.disabled = false;
          nextBtn.title = '';
        }
      }
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(window._toastT);
      window._toastT = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function showStep(stepId) {
      document.querySelectorAll('.modal-step').forEach(s => s.classList.remove('active'));
      document.getElementById(stepId).classList.add('active');
      currentStep = stepId;
    }

    function closeModal() {
      document.getElementById('exportModal').classList.remove('show');
      currentStep = 'step1';
      selectedMode = null;
      showStep('step1');
    }

    function getFilterResultCount() {
      return 335; // 演示用，实际应由后端根据筛选条件返回
    }

    // 批量导出按钮点击
    document.getElementById('btnBatchExport').addEventListener('click', function() {
      updateExportState();
      document.getElementById('exportModal').classList.add('show');
      showStep('step1');
    });

    // 步骤1：选择导出方式
    document.querySelectorAll('#step1 .modal-option').forEach(opt => {
      opt.addEventListener('click', function() {
        document.querySelectorAll('#step1 .modal-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        selectedMode = this.dataset.mode;
        const nextBtn = document.getElementById('step1Next');
        if (selectedMode === 'selected' && getSelectedCount() === 0) {
          nextBtn.disabled = true;
          nextBtn.title = '请至少选择 1 条报告后再导出';
        } else {
          nextBtn.disabled = false;
          nextBtn.title = '';
        }
      });
    });

    document.getElementById('step1Cancel').addEventListener('click', closeModal);
    document.getElementById('step1Next').addEventListener('click', function() {
      if (!selectedMode) return;
      if (selectedMode === 'selected') {
        const n = getSelectedCount();
        if (n === 0) {
          showToast('请至少选择 1 条报告后再导出。');
          return;
        }
        if (n > MAX_EXPORT) {
          showToast(`单次最多导出 ${MAX_EXPORT} 条报告，请缩小范围或使用『按条件导出』。`);
          return;
        }
        document.getElementById('selectedCountStep2').textContent = n;
        showStep('step2Selected');
      } else {
        // 同步筛选区的日期到弹窗
        document.getElementById('modalStartDate').value = document.getElementById('startDate').value;
        document.getElementById('modalEndDate').value = document.getElementById('endDate').value;
        document.getElementById('filterResultCount').textContent = getFilterResultCount();
        showStep('step2Filter');
      }
    });

    // 步骤2：按勾选导出 - 选择格式
    document.querySelectorAll('#step2Selected .modal-format-option').forEach(opt => {
      opt.addEventListener('click', function() {
        document.querySelectorAll('#step2Selected .modal-format-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        this.querySelector('input[type="radio"]').checked = true;
      });
    });

    document.getElementById('step2SelectedBack').addEventListener('click', () => showStep('step1'));
    document.getElementById('step2SelectedConfirm').addEventListener('click', function() {
      const format = document.querySelector('#step2Selected input[name="format"]:checked').value;
      const n = getSelectedCount();
      closeModal();
      this.classList.add('loading');
      setTimeout(() => {
        this.classList.remove('loading');
        showToast(format === 'excel' ? `已导出 ${n} 条为 Excel（演示 Demo 不生成真实文件）` : `已导出 ${n} 条为 CSV（演示 Demo 不生成真实文件）`);
      }, 1200);
    });

    // 步骤2：按条件导出 - 设置筛选条件
    document.getElementById('step2FilterBack').addEventListener('click', () => showStep('step1'));
    document.getElementById('step2FilterNext').addEventListener('click', function() {
      const count = getFilterResultCount();
      document.getElementById('filterResultCountStep3').textContent = count;
      showStep('step3Filter');
    });

    // 步骤3：按条件导出 - 选择格式
    document.querySelectorAll('#step3Filter .modal-format-option').forEach(opt => {
      opt.addEventListener('click', function() {
        document.querySelectorAll('#step3Filter .modal-format-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        this.querySelector('input[type="radio"]').checked = true;
      });
    });

    document.getElementById('step3FilterBack').addEventListener('click', () => showStep('step2Filter'));
    document.getElementById('step3FilterConfirm').addEventListener('click', function() {
      const format = document.querySelector('#step3Filter input[name="formatFilter"]:checked').value;
      const n = getFilterResultCount();
      closeModal();
      this.classList.add('loading');
      setTimeout(() => {
        this.classList.remove('loading');
        showToast(`导出任务已提交（当前筛选约 ${n} 条），完成后将通知下载。（演示 Demo 不生成真实文件）`);
      }, 1200);
    });

    // 点击遮罩关闭弹窗
    document.getElementById('exportModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // 日历图标点击打开结束日期选择
    document.querySelector('.date-range .calendar-icon')?.addEventListener('click', function() {
      document.getElementById('endDate').focus();
      document.getElementById('endDate').showPicker?.();
    });

    renderTable();
    updateExportState();
  </script>
</body>
</html>
