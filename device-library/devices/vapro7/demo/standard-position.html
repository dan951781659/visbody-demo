<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>手臂姿势准备</title><link rel="stylesheet" href="./shared.css" /></head>
  <body>
    <main class="device-stage">
      <section
        class="device device--guide"
        data-auto-detect-next="./standard-countdown.html"
        data-auto-detect-delay="2600"
        data-voice-text="请双臂自然打开，保持约四十五度夹角。"
      >
        <div class="status-bar"><span>18:32</span><span>综合测量</span><span class="demo-version-badge" data-demo-version>v1.6.0</span></div>
        <div class="topbar"><a class="back-link" href="./standard-grip-prep.html" data-stateful-link="./standard-grip-prep.html">← 返回</a><span class="text-link">测量准备页</span></div>
        <div class="section-label">综合测量</div>
        <h1 class="screen-title">双臂自然打开 45°</h1>
        <p class="screen-subtitle guide-caption">请保持面向屏幕，双臂自然打开并维持约 45° 夹角。</p>
        <div class="device-visual guide-visual">
          <div class="live-stage guide-scene-wrap phase-stage-rails">
            <div class="camera-corner tl"></div><div class="camera-corner tr"></div><div class="camera-corner bl"></div><div class="camera-corner br"></div>
            <div class="live-glow"></div>
            <div class="live-status live-status--single"><span class="live-chip ok">姿态识别中</span></div>
            <div class="turntable-base" aria-hidden="true"></div>
            <div class="guide-line circle"></div>
            <div class="human pose-hold"><div class="head"></div><div class="torso"></div><div class="limb arm left"></div><div class="limb arm right"></div><div class="limb leg left"></div><div class="limb leg right"></div></div>
            <p class="guide-arm-hint">若夹角不足，请再张开一些</p>
            <div class="live-focus" data-auto-detect-status>正在识别手臂姿态...</div>
          </div>
        </div>
        <div class="footer-hint guide-footer">
          <a class="button primary guide-phase-btn" href="./standard-countdown.html" data-demo-next="./standard-countdown.html" data-stateful-link="./standard-countdown.html">下一步</a>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
