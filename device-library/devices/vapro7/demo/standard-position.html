<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>完整测量准备</title><link rel="stylesheet" href="./shared.css" /></head>
<body>
<main class="device-stage"><section class="device device--guide">
<div class="status-bar"><span>18:32</span><span>完整测量</span><span class="demo-version-badge" data-demo-version>v1.5.0</span></div>
<div class="topbar"><a class="back-link" href="./home.html">← 返回</a><span class="text-link">测量准备</span></div>
<div class="section-label">完整测量</div>
<h1 class="screen-title" data-guide-title>上台前准备</h1>
<p class="screen-subtitle guide-caption" data-guide-subtitle>站上转台，双脚对准脚印与电机片位置。</p>
<div class="guide-phase-bar" role="tablist" aria-label="准备阶段">
<button type="button" class="guide-phase-tab is-active" data-guide-phase-tab="1" role="tab" aria-selected="true">① 上台前</button>
<button type="button" class="guide-phase-tab" data-guide-phase-tab="2" role="tab" aria-selected="false" disabled>② 扶手姿势</button>
</div>
<div class="device-visual guide-visual">
<div class="live-stage guide-scene-wrap" data-guide-sequence data-guide-scene data-guide-next="./standard-countdown.html" data-voice-text="请先脱鞋脱袜，并将双脚站稳在脚印位置。">
<div class="camera-corner tl"></div><div class="camera-corner tr"></div><div class="camera-corner bl"></div><div class="camera-corner br"></div>
<div class="live-glow"></div>
<div class="live-status live-status--single" data-guide-chips><span class="live-chip ok" data-guide-chip-a>阶段一 · 上台前</span></div>
<div class="turntable-base" aria-hidden="true"></div>
<div class="guide-line circle" data-guide-circle></div>
<div class="guide-feet-closeup" data-guide-feet aria-hidden="false"><span class="motor-mark">电机片</span><span class="footprint-mark">脚印</span></div>
<div class="guide-boarding-hints" data-guide-boarding-hints>
  <span>脱鞋脱袜</span>
  <span>双脚站在脚印位置</span>
</div>
<div class="human pose-boarding" data-guide-human><div class="head"></div><div class="torso"></div><div class="limb arm left"></div><div class="limb arm right"></div><div class="limb leg left"></div><div class="limb leg right"></div></div>
<div class="guide-rail-hint" data-guide-rail-hint hidden>握住扶手</div>
<p class="guide-arm-hint" data-guide-arm-hint hidden>若夹角不足，请再张开一些</p>
<div class="live-focus" data-guide-focus>请站上转台并对准脚印</div>
</div>
</div>
<div class="guide-actions"><button type="button" class="button ghost guide-replay-btn" data-guide-replay>再次播报</button></div>
<div class="footer-hint guide-footer">
<button type="button" class="button primary guide-phase-btn" data-guide-phase-confirm="1">确定第一步完成（演示）</button>
<a class="button primary guide-phase-btn" href="./standard-countdown.html" data-guide-phase-next data-demo-next="./standard-countdown.html" hidden>准备完成，进入倒计时</a>
</div>
</section></main>
<script src="./shared.js"></script>
</body></html>
