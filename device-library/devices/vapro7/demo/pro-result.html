<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>专业测量 · 体态测量完成</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device" data-voice-text="体态测量已完成，请选择下一步。">
        <div class="status-bar"><span>18:32</span><span>测量完成</span></div>
        <div class="topbar">
          <a class="back-link" href="./pro-measuring.html">← 返回</a>
          <span class="text-link">请查看结果</span>
        </div>
        <div class="section-label">专业测量 · 体态测量</div>
        <h1 class="screen-title">体态测量完成</h1>
        <div class="result-grid">
          <div class="result-card"><strong>头前引</strong><div class="field">9.2°</div></div>
          <div class="result-card"><strong>高低肩</strong><div class="field">左肩略高</div></div>
          <div class="result-card"><strong>骨盆状态</strong><div class="field">轻微前倾</div></div>
          <div class="result-card"><strong>综合提示</strong><div class="field">建议训练</div></div>
        </div>
        <div class="qr-box" style="margin-top:18px;">
          <strong>扫码查看详细报告</strong>
          <div class="qr-wrap">
            <div class="qr"></div>
            <div class="field">手机扫码后可查看体态分项详情与对比。</div>
          </div>
        </div>
        <div class="footer-hint">
          <div
            class="scheme-three-flow scheme-three-flow--result-completion"
            data-finish-group
            data-finish-flow="pro"
            data-finish-current="pro"
          >
            <div class="scheme-three-action-row">
              <a
                class="scheme-three-action-card"
                href="#"
                data-choice-item
                data-choice-label="扫码查看详细报告"
                data-action-link="open-report"
                data-finish-option="report"
              >
                <strong>扫码查看详细报告</strong>
                <span>手机扫码打开报告</span>
              </a>
              <a
                class="scheme-three-action-card"
                href="#"
                data-choice-item
                data-choice-label="继续下一项测量"
                data-finish-option="next"
              >
                <strong data-next-title>继续下一项测量</strong>
                <span data-next-desc>按测量顺序推荐</span>
              </a>
            </div>
            <div class="scheme-one-weak scheme-one-weak--minimal">
              <a href="./home.html" data-stateful-link="./home.html">完成</a>
            </div>
            <div class="scheme-one-footer scheme-three-result-footer-meta">
              <div class="auto-hint">
                <strong><span data-auto-prefix>请点击上方选项</span> <span data-auto-label>扫码查看详细报告</span></strong>
              </div>
            </div>
          </div>
          <p class="single-result-weak"><a href="./pro-prepare.html">重新测量体态</a></p>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
