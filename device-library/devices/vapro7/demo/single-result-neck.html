<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>颈部测量完成</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>测量完成</span></div>
        <div class="topbar">
          <a class="back-link" href="./single-measuring-neck.html">← 返回</a>
          <span class="text-link">请查看结果</span>
        </div>
        <div class="section-label section-label--stack">
          <span class="section-label__kicker">动态实验室</span>
          <span class="section-label__title">颈部测量</span>
        </div>
        <h1 class="screen-title">颈部测量完成</h1>
        <div class="result-grid">
          <div class="result-card"><strong>左转角度</strong><div class="field">38.6°</div></div>
          <div class="result-card"><strong>右转角度</strong><div class="field">42.1°</div></div>
          <div class="result-card"><strong>活动对称性</strong><div class="field">良好</div></div>
          <div class="result-card"><strong>建议</strong><div class="field">注意肩颈放松</div></div>
        </div>
        <div class="qr-box" style="margin-top:18px;">
          <strong>扫码查看详细报告</strong>
          <div class="qr-wrap">
            <div class="qr"></div>
            <div class="field">手机扫码后可查看颈部分项详情与历史对比。</div>
          </div>
        </div>
        <div class="footer-hint">
          <div
            class="scheme-three-flow scheme-three-flow--result-completion"
            data-choice-group
            data-default-index="1"
            data-finish-group
            data-finish-flow="single"
            data-finish-current="singleNeck"
          >
            <div class="scheme-three-action-row">
              <a
                class="scheme-three-action-card"
                href="#"
                data-choice-item
                data-choice-label="扫码查看详细报告"
                data-action-link="open-report"
                data-finish-option="report"
              >
                <strong>扫码查看详细报告</strong>
                <span>手机扫码打开报告</span>
              </a>
              <a
                class="scheme-three-action-card"
                href="#"
                data-choice-item
                data-choice-label="继续下一项测量"
                data-finish-option="next"
              >
                <strong data-next-title>继续下一项测量</strong>
                <span data-next-desc>按测量顺序推荐</span>
              </a>
            </div>
            <div class="scheme-one-weak scheme-one-weak--minimal">
              <a href="./home.html" data-stateful-link="./home.html">完成</a>
            </div>
            <div class="scheme-three-result-footer-meta scheme-one-footer">
              <div class="auto-hint">
                <strong><span data-auto-prefix>请点击上方选项</span> <span data-auto-label>扫码查看详细报告</span></strong>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
