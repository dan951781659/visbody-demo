<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体围测量准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>经典分体 · 单体围</span></div>
        <div class="topbar">
          <a class="back-link" href="./home.html" data-stateful-link="./home.html">← 返回首页</a>
          <span class="text-link">主测量模式</span>
        </div>
        <div class="section-label">经典分体</div>
        <h1 class="screen-title">体围测量</h1>
        <p class="screen-subtitle">单体围实机采集规则待验证；当前 Demo 提供占位流程用于信息架构评审。</p>
        <div class="summary-box">
          <ul class="hint-list">
            <li>已单独提供主入口，避免与专项肩/颈混淆。</li>
            <li>后续将根据实机规则补齐准备姿势、采集时长与报告字段。</li>
          </ul>
        </div>
        <div class="footer-hint">
          <div class="button-row">
            <a
              class="button primary"
              href="./legacy-girth-result.html"
              data-stateful-link="./legacy-girth-result.html"
              data-action-link="start-session"
              data-measurement-mode="girthOnly"
            >
              进入占位结果
            </a>
            <a class="button secondary" href="./settings-modes.html" data-stateful-link="./settings-modes.html">返回测量设置</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
