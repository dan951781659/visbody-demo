<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>颈部测量倒计时</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--countdown">
        <div class="status-bar"><span>18:32</span><span>开始测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./single-prepare-neck.html">← 返回</a>
          <span class="text-link">请保持静止</span>
        </div>
        <div class="section-label section-label--stack">
          <span class="section-label__kicker">动态实验室</span>
          <span class="section-label__title">颈部测量</span>
        </div>
        <div class="countdown-layout"
          data-stage-next="./single-measuring-neck.html"
          data-stage-delay="3200"
          data-stage-seconds-start="3"
          data-demo-countdown-target
          data-voice-text="颈部测量即将开始，请保持当前动作。">
          <div class="device-visual countdown-pose-wrap">
            <div class="live-stage countdown-pose-stage">
              <div class="human pose-neck" aria-hidden="true">
                <div class="head"></div><div class="torso"></div>
                <div class="limb arm left"></div><div class="limb arm right"></div>
                <div class="limb leg left"></div><div class="limb leg right"></div>
              </div>
            </div>
            <p class="countdown-pose-caption">请保持：头部缓慢转动姿态</p>
          </div>
          <div class="countdown-digit-block">
            <h1 class="screen-title">3 秒后开始 · 颈部</h1>
            <div class="headline countdown-seconds" data-stage-seconds>3</div>
            <p class="screen-subtitle">点击倒计时区域开始测量</p>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
