<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>单项流程兼容页</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>单项测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./home.html" data-stateful-link="./home.html">← 返回</a>
          <span class="text-link">单项测量</span>
        </div>
        <div class="section-label">单项测量</div>
        <h1 class="screen-title" id="flow-placeholder-title">请选择测量部位</h1>
        <p class="screen-subtitle" id="flow-placeholder-desc" style="margin-top:12px;line-height:1.6;">
          请从列表中选择要测量的部位。
        </p>
        <div class="footer-hint" style="margin-top:28px;">
          <div class="button-row">
            <a class="button primary" id="flow-placeholder-primary" href="./single-select.html" data-stateful-link="./single-select.html">返回单项列表</a>
            <a class="button secondary" id="flow-placeholder-secondary" href="./home.html" data-stateful-link="./home.html">返回首页</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
    <script>
      (function () {
        var targets = {
          neck: {
            title: "颈部测量",
            desc: "即将进入颈部测量准备页。",
            primary: "./single-prepare-neck.html"
          },
          balance: {
            title: "平衡测量",
            desc: "即将进入平衡测量准备页。",
            primary: "./single-prepare-balance.html"
          }
        };
        var descs = {
          neck: "即将进入颈部测量准备页。",
          balance: "即将进入平衡测量准备页。"
        };
        var q = new URLSearchParams(window.location.search).get("item") || "";
        var t = document.getElementById("flow-placeholder-title");
        var d = document.getElementById("flow-placeholder-desc");
        var primary = document.getElementById("flow-placeholder-primary");
        if (targets[q]) {
          t.textContent = targets[q].title;
          d.textContent = descs[q];
          if (primary) primary.setAttribute("href", targets[q].primary);
          if (primary) primary.textContent = "进入测量";
          if (q === "balance") {
            d.textContent = "即将进入平衡测量准备页。";
          }
          window.setTimeout(function () {
            window.location.replace(targets[q].primary);
          }, 1600);
        }
      })();
    </script>
  </body>
</html>
