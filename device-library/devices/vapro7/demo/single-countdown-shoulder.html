<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>肩部测量倒计时</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>肩部测量</span><span class="demo-version-badge" data-demo-version>v1.5.0</span></div>
        <div class="topbar">
          <a class="back-link" href="./single-prepare-shoulder.html">← 返回</a>
          <span class="text-link">即将开始</span>
        </div>
        <div
          style="padding-top:100px; text-align:center;"
          data-stage-next="./single-measuring-shoulder-left.html"
          data-stage-delay="3200"
          data-stage-seconds-start="3"
          data-demo-countdown-target
          data-voice-text="肩部左手测量即将开始，请保持姿势。"
        >
          <div class="section-label">肩部测量</div>
          <h1 class="screen-title">3 秒后开始 · 左手侧</h1>
          <div class="headline" style="font-size:132px; margin:0;" data-stage-seconds>3</div>
          <p class="screen-subtitle">请保持左手姿态稳定</p>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
