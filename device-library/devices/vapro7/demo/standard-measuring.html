<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测量中</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--measuring"
        data-measuring-flow
        data-measuring-duration="10000"
        data-measuring-next="./standard-next-step.html"
        data-voice-text="转台正在旋转采集，请保持当前姿势勿动。"
        data-i18n-voice="measuring.voice"
      >
        <audio
          class="turntable-audio"
          data-turntable-audio
          preload="auto"
          loop
          playsinline
          hidden
        >
          <source src="./assets/turntable-loop.wav" type="audio/wav" />
        </audio>
        <div class="status-bar"><span>18:32</span><span>身体成分</span></div>
        <h1 class="screen-title">身体成分测量</h1>
        <div class="device-visual">
          <div class="live-stage measuring-stage">
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">姿态正确</span>
              <span class="live-chip" data-measuring-chip>转台旋转中</span>
            </div>
            <img
              class="measuring-grip-hero"
              src="./assets/lanhu/measuring-grip-hero.png"
              alt=""
              width="300"
              height="220"
            />
            <div class="turntable-plate" aria-hidden="true"></div>
            <div class="guide-line circle"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="progress-track"><div class="progress-fill" data-measuring-progress style="width:0%;"></div></div>
        <div class="measuring-info-panel">
          <img class="measuring-info-panel__badge" src="./assets/lanhu/info-badge-i.png" alt="" />
          <div class="measuring-info-panel__row">
            <img class="measuring-info-panel__dot" src="./assets/lanhu/tip-dot.png" alt="" />
            <p class="measuring-info-panel__text" data-measuring-focus>请双手握紧扶手，双臂打开并保持45°夹角</p>
          </div>
        </div>
        <div class="device-tips-carousel-section">
          <div class="device-tips-carousel-box">
            <div class="measurement-tips-carousel" data-tip-carousel data-tip-interval="2600" data-tip-no-index></div>
          </div>
        </div>
        <div class="footer-hint">
          <div class="button-row">
            <a class="button primary" href="./standard-next-step.html" data-demo-next="./standard-next-step.html" data-stateful-link="./standard-next-step.html" data-measuring-next>下一步</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
