<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测量中</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device"
        data-measuring-flow
        data-measuring-duration="10000"
        data-measuring-next="./standard-next-step.html"
        data-voice-text="测量中，请保持静止。"
      >
        <audio
          class="turntable-audio"
          data-turntable-audio
          preload="auto"
          loop
          playsinline
          hidden
        >
          <source src="./assets/turntable-loop.wav" type="audio/wav" />
        </audio>
        <div class="status-bar"><span>18:32</span><span>测量中</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-countdown.html">← 返回</a>
          <span class="text-link">转台旋转中</span>
        </div>
        <h1 class="screen-title">请保持静止</h1>
        <p class="screen-subtitle" data-live-voice>转台正在旋转采集，约转一圈即完成；请保持当前姿势，不要走动或做大动作。</p>
        <div class="device-visual">
          <div class="live-stage measuring-stage">
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">姿态正确</span>
              <span class="live-chip" data-measuring-chip>转台旋转中</span>
            </div>
            <div class="turntable-plate" aria-hidden="true"></div>
            <div class="guide-line circle"></div>
            <div class="human pose-hold measuring-human">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="limb arm left"></div>
              <div class="limb arm right"></div>
              <div class="limb leg left"></div>
              <div class="limb leg right"></div>
            </div>
            <div class="scan-line"></div>
            <div class="live-focus" data-measuring-focus>请不要移动</div>
          </div>
        </div>
        <div class="progress-track"><div class="progress-fill" data-measuring-progress style="width:0%;"></div></div>
        <div class="measurement-tips-carousel" data-tip-carousel data-tip-interval="2600">
          <p class="measurement-tips-title">测量注意事项</p>
          <p class="measurement-tip-item is-active" data-tip-item>扎起头发，避免遮挡头颈与肩带区域。</p>
          <p class="measurement-tip-item" data-tip-item>保持赤脚站立，足底贴合站板。</p>
          <p class="measurement-tip-item" data-tip-item>尽量空腹或餐后满 2 小时再测量，数据更稳定。</p>
          <p class="measurement-tip-item" data-tip-item>测量前避免剧烈运动；运动后请休息片刻再上转台。</p>
        </div>
        <div class="footer-hint">
          <div class="button-row">
            <a class="button primary" href="./standard-next-step.html" data-demo-next="./standard-next-step.html" data-stateful-link="./standard-next-step.html" data-measuring-next>下一步</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
