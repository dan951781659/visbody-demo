<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>单项测量</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>单项测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./home.html">← 返回</a>
          <span class="text-link">请选择项目</span>
        </div>
        <div class="section-label">单项测量</div>
        <h1 class="screen-title">请选择测量项目</h1>
        <p class="screen-subtitle">请选择需要开始的单项测量。</p>
        <div class="choice-grid compact" data-choice-group data-default-index="0">
          <a class="choice-card" href="./single-prepare-shoulder.html" data-choice-item data-choice-label="肩部测量">
            <div class="card-title">肩部测量</div>
            <div class="card-desc">抬手完成肩部活动测量。</div>
          </a>
          <a class="choice-card" href="./single-prepare-neck.html" data-choice-item data-choice-label="颈部测量">
            <div class="card-title">颈部测量</div>
            <div class="card-desc">面向屏幕完成颈部测量。</div>
          </a>
          <a class="choice-card" href="./single-prepare-balance.html" data-choice-item data-choice-label="平衡测量">
            <div class="card-title">平衡测量</div>
            <div class="card-desc">保持站稳完成平衡能力测量。</div>
          </a>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
