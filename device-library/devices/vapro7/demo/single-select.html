<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动态实验室</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--home">
        <div class="status-bar"><span>18:32</span><span>动态实验室</span></div>
        <div class="topbar">
          <a class="back-link" href="./home.html" data-stateful-link="./home.html">← 返回</a>
          <span class="text-link">请选择测量部位</span>
        </div>
        <h1 class="screen-title screen-title--home">请选择测量部位</h1>
        <p class="dynamic-lab-scope-hint">肩部与颈部专项均在「动态实验室」下进行，可按需分别测量。</p>
        <p class="settings-group-hint" data-show-if-no-single hidden>当前未开启任何部位，请联系门店工作人员。</p>
        <div class="home-measure-grid choice-grid compact" data-choice-group data-default-index="0">
          <a
            class="choice-card choice-card--compact"
            href="./single-prepare-shoulder.html"
            data-choice-item
            data-choice-label="肩部测量"
            data-show-if-single-key="singleShoulder"
            data-stateful-link="./single-prepare-shoulder.html"
          >
            <div class="card-title">肩部测量</div>
            <div class="card-desc">外展上举双侧采集，生成肩部活动度结果。</div>
          </a>
          <a
            class="choice-card choice-card--compact"
            href="./single-prepare-neck.html"
            data-choice-item
            data-choice-label="颈部测量"
            data-show-if-single-key="singleNeck"
            data-stateful-link="./single-prepare-neck.html"
          >
            <div class="card-title">颈部测量</div>
            <div class="card-desc">缓慢转头采集颈部活动度，生成颈部专项结果。</div>
          </a>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
