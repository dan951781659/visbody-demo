<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>专业测量 · 体态测量中</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>测量中</span></div>
        <div class="topbar">
          <a class="back-link" href="./pro-countdown.html">← 返回</a>
          <span class="text-link">体态测量</span>
        </div>
        <div class="section-label">专业测量 · 体态测量</div>
        <h1 class="screen-title">请保持静止</h1>
        <p class="screen-subtitle">正在采集体态数据。</p>
        <div class="device-visual">
          <div class="live-stage">
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">姿态稳定</span>
              <span class="live-chip">测量中</span>
            </div>
            <div class="guide-line circle"></div>
            <div class="human pose-down">
              <div class="head"></div><div class="torso"></div>
              <div class="limb arm left"></div><div class="limb arm right"></div>
              <div class="limb leg left"></div><div class="limb leg right"></div>
            </div>
            <div class="scan-line"></div>
            <div class="live-focus">请不要移动</div>
          </div>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:82%;"></div></div>
        <div class="footer-hint">
          <div class="auto-hint">
            <strong>测量完成后自动显示结果</strong>
            <span class="count-badge">82%</span>
          </div>
          <div class="button-row">
            <a class="button primary" href="./pro-result.html" data-action-link="noop" data-complete-group="pro">查看结果</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
