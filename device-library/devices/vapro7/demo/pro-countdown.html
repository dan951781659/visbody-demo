<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体态测量 · 开始测量</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--countdown" data-set-measurement-mode="pro">
        <div class="status-bar"><span>18:32</span><span>开始测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./pro-prepare.html" data-stateful-link="./pro-prepare.html">← 返回</a>
        </div>
        <h1 class="screen-title">即将开始测量</h1>
        <div class="countdown-body">
        <div
          class="countdown-layout"
          data-stage-next="./pro-measuring.html"
          data-stage-delay="3200"
          data-stage-seconds-start="3"
          data-stage-auto-start
          data-stage-manual-next
          data-voice-text="请双手自然垂放，保持静止，测量即将开始。"
        >
          <div class="countdown-digit-block">
            <div class="headline countdown-seconds" data-stage-seconds aria-label="倒计时秒数">3</div>
            <p class="countdown-soon-caption">秒后开始</p>
          </div>
          <div class="countdown-pose-stage countdown-pose-stage--flat">
            <div class="human pose-down" aria-hidden="true">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="limb arm left"></div>
              <div class="limb arm right"></div>
              <div class="limb leg left"></div>
              <div class="limb leg right"></div>
            </div>
          </div>
          <div class="measuring-info-panel countdown-pose-hint">
            <img class="measuring-info-panel__badge" src="./assets/lanhu/info-badge-i.png" alt="" />
            <div class="measuring-info-panel__row">
              <img class="measuring-info-panel__dot" src="./assets/lanhu/tip-dot.png" alt="" />
              <p class="measuring-info-panel__text" data-countdown-panel-lead>请保持：双手自然垂放，面向屏幕站稳</p>
            </div>
          </div>
        </div>
        <div class="device-tips-carousel-section">
          <div class="device-tips-carousel-box">
            <div class="measurement-tips-carousel" data-tip-carousel data-tip-interval="2600" data-tip-no-index></div>
          </div>
        </div>
        </div>
        <div class="footer-hint">
          <a
            class="button primary"
            href="./pro-measuring.html"
            data-demo-next="./pro-measuring.html"
            data-stateful-link="./pro-measuring.html"
          >下一步</a>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
