<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报告详情</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device" data-report-detail>
        <div class="status-bar"><span>18:32</span><span>报告详情</span></div>

        <div class="topbar">
          <a class="back-link" href="./standard-next-step.html">← 返回</a>
          <span class="text-link">详细报告</span>
        </div>
        <h1 class="screen-title">报告详情</h1>
        <div class="report-detail-grid">
          <div class="report-metric-card is-loading" data-report-metric data-report-always="1" data-delay="400"><strong>体重</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-always="1" data-delay="700"><strong>身高</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-key="bodyCompReport" data-delay="1000"><strong>体成分</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-key="circumferenceReport" data-delay="1300"><strong>体围</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-key="waistAbdomenReport" data-delay="1600"><strong>腰腹围度</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-key="postureReport" data-delay="1900"><strong>体态报告</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-key="spine" data-delay="2200"><strong>脊柱报告</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-key="hip" data-delay="2500"><strong>臀型报告</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-report-always="1" data-delay="2800"><strong>综合评分</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
        </div>
        <div class="footer-hint"><div class="button-row"><a class="button primary" href="./home.html" data-stateful-link="./home.html">返回首页</a><a class="button secondary" href="./home.html" data-stateful-link="./home.html">重新测量</a></div></div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
