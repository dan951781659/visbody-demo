<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报告详情</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device" data-report-detail>
        <div class="status-bar"><span>18:32</span><span>报告详情</span><span class="demo-version-badge" data-demo-version>v1.5.0</span></div>

        <div class="topbar">
          <a class="back-link" href="./standard-next-step.html">← 返回</a>
          <span class="text-link">详细报告</span>
        </div>
        <div class="section-label">综合测量</div>
        <h1 class="screen-title">报告详情</h1>
        <div class="report-detail-grid">
          <div class="report-metric-card is-loading" data-report-metric data-delay="400"><strong>体重</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-delay="900"><strong>身高</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-delay="1400"><strong>体成分</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-delay="1900"><strong>体围</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-delay="2400"><strong>体态评估</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
          <div class="report-metric-card is-loading" data-report-metric data-delay="2900"><strong>综合评分</strong><span class="report-metric-value" data-report-value>加载中…</span></div>
        </div>
        <div class="qr-box" style="margin-top:14px;"><strong>手机扫码查看完整 H5 报告</strong><div class="qr-wrap"><div class="qr"></div><div class="field">演示环境为本地报告页；可在测量设置配置外链 H5。</div></div></div>
        <div class="footer-hint"><div class="button-row"><a class="button primary" href="./home.html" data-stateful-link="./home.html">返回首页</a><a class="button secondary" href="./home.html" data-stateful-link="./home.html">重新测量</a></div></div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
