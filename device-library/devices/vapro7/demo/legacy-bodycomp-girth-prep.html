<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体成分+体围准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>体成分+体围</span></div>
        <div class="topbar">
          <a class="back-link" href="./home.html" data-stateful-link="./home.html">← 返回首页</a>
          <span class="text-link">测量准备</span>
        </div>
        <h1 class="screen-title">体成分 + 体围</h1>
        <p class="screen-subtitle">请站上转台，依次完成体成分与体围测量。</p>
        <div class="summary-box">
          <ul class="hint-list">
            <li>请赤脚站稳，双脚与电极片充分接触。</li>
            <li>测量过程中请保持身体稳定。</li>
          </ul>
        </div>
        <div class="footer-hint">
          <div class="button-row">
            <a
              class="button primary"
              href="./standard-user-prep.html"
              data-stateful-link="./standard-user-prep.html"
              data-action-link="start-session"
              data-measurement-mode="bodycompGirth"
            >
              开始测量
            </a>
            <a class="button secondary" href="./settings-modes.html" data-stateful-link="./settings-modes.html">返回测量设置</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
