<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>转台站姿</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--guide"
        data-turntable-anthropometry
        data-anthropometry-auto="1"
        data-anthropometry-next="./standard-grip-prep.html"
        data-auto-detect-delay="2600"
        data-voice-text="请站上转台，双手自然下垂，身体放松并保持静止，系统将自动测量身高与体重。"
      >
        <div class="status-bar"><span>18:32</span><span>转台站姿</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-user-prep.html" data-stateful-link="./standard-user-prep.html">← 返回</a>
          <span class="text-link">测量准备页</span>
        </div>
        <h1 class="screen-title">站上转台</h1>
        <p class="screen-subtitle">双手自然下垂，面向屏幕，保持静止直至提示完成。</p>
        <div class="device-visual guide-visual">
          <div class="live-stage guide-scene-wrap bodycomp-prep-scene">
            <div class="camera-corner tl"></div>
            <div class="camera-corner tr"></div>
            <div class="camera-corner bl"></div>
            <div class="camera-corner br"></div>
            <div class="live-glow"></div>
            <div class="live-status live-status--single"><span class="live-chip ok">站姿识别中</span></div>
            <img
              class="bodycomp-prep-hero-svg bodycomp-prep-turntable-figure"
              src="./assets/weight-measure/turntable-figure.svg"
              alt="站上转台、双手自然下垂示意"
              width="320"
              height="260"
            />
            <div class="live-focus" data-auto-detect-status>正在识别站姿，请保持站立不动。</div>
          </div>
        </div>
        <div class="footer-hint" hidden>
          <a
            class="button primary"
            href="./standard-grip-prep.html"
            data-anthropometry-next-btn
            data-stateful-link="./standard-grip-prep.html"
          >下一步</a>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
