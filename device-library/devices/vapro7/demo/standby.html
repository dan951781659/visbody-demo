<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待机</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--standby" data-standby-page data-standby-home="./home.html">
        <div class="standby-status-bar" aria-label="设备状态" data-standby-no-nav>
          <span class="standby-status-icon" title="Wi-Fi">⌁</span>
          <span class="standby-status-icon" title="电源">⏻</span>
          <span class="standby-status-icon" title="手势">☝</span>
          <span class="standby-status-icon standby-status-icon--ok" title="打印">⎙</span>
          <span class="standby-status-icon" title="静音">🔇</span>
          <a
            class="standby-settings-link standby-settings-link--top"
            href="./settings.html"
            data-stateful-link="./settings.html"
            data-standby-no-nav
            title="设备设置"
          >设置</a>
        </div>

        <div class="standby-tap-zone" data-standby-tap-zone role="button" tabindex="0" aria-label="点击进入测量项目选择">
          <a
            class="standby-home-hit"
            data-stateful-link="./home.html"
            href="./home.html"
            tabindex="-1"
            aria-label="进入测量项目选择"
          >
            <span class="standby-home-hit__label">进入测量项目选择</span>
          </a>
          <div class="standby-tap-zone__surface">
            <div class="standby-hero">
              <div class="standby-logo">VISBODY<span class="standby-logo-dot"></span></div>
              <div class="standby-visual" aria-hidden="true"></div>
            </div>

            <div class="standby-actions">
              <a
                class="standby-weight-entry"
                href="./weight-standalone-measuring.html"
                data-show-if-weight-standalone
                data-stateful-link="./weight-standalone-measuring.html"
                data-standby-no-nav
                hidden
              >
                <span class="standby-weight-entry__icon" aria-hidden="true">⚖</span>
                <span class="standby-weight-entry__label">体重测量</span>
              </a>
            </div>

            <div class="standby-clock-wrap">
              <div class="standby-clock" data-standby-clock>18 : 32 : 00</div>
              <p class="standby-start-hint">点击屏幕开始测量</p>
            </div>
          </div>
        </div>

        <p class="standby-hub-hint" data-show-if-no-home-tiles hidden>
          当前未开启任何测量项目，请联系门店工作人员。
        </p>

        <p class="standby-footer-hint" data-standby-no-nav>
          长按 ⊕ 键查看报告列表，长按 ⊖ 键进入设置。
          <a class="standby-settings-link" href="./settings.html" data-stateful-link="./settings.html" data-standby-no-nav>设置</a>
        </p>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
