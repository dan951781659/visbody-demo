<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测量已完成</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--scheme-three"
        data-gesture-finish-page
        data-prep-hold-ms="2000"
        data-prep-auto-delay="off"
        data-voice-text="测量已完成。请举手确认下一步操作。"
      >
        <div class="status-bar"><span>18:32</span><span>测量完成</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-measuring.html">← 返回</a>
          <span class="text-link">测量完成</span>
        </div>
        <h1 class="screen-title">测量已完成</h1>
        <p class="screen-subtitle">请举手选择下一步，或直接点击上方选项进入对应流程。</p>

        <div class="scheme-three-summary" aria-label="本次已采集项">
          <div class="summary-check-row"><span class="summary-check-name">体重</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
          <div class="summary-check-row"><span class="summary-check-name">体成分</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
          <div class="summary-check-row"><span class="summary-check-name">身高体围</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
          <div class="summary-check-row"><span class="summary-check-name">体态</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
        </div>

        <div class="prep-gesture-block" aria-label="手势确认">
          <div
            class="gesture-ring-module"
            data-gesture-ring
            data-gesture-context="finish"
            data-gesture-hand="both"
            role="region"
            aria-label="举手确认操作"
          >
            <div class="gesture-ring-row">
              <div class="gesture-ring-stage" data-gesture-stage tabindex="0">
                <div class="human pose-down" data-gesture-human aria-hidden="true">
                  <div class="head"></div><div class="torso"></div>
                  <div class="limb arm left"></div><div class="limb arm right"></div>
                  <div class="limb leg left"></div><div class="limb leg right"></div>
                </div>
                <svg class="gesture-ring-svg" viewBox="0 0 200 220" aria-hidden="true" data-gesture-ring-svg>
                  <circle
                    class="gesture-ring-track"
                    cx="142"
                    cy="70"
                    r="38"
                    fill="none"
                    stroke="rgba(255,255,255,0.14)"
                    stroke-width="7"
                  />
                  <circle
                    class="gesture-ring-progress"
                    data-gesture-ring-progress
                    cx="142"
                    cy="70"
                    r="38"
                    fill="none"
                    stroke="#2b7cff"
                    stroke-width="7"
                    stroke-linecap="round"
                    transform="rotate(-90 142 70)"
                    stroke-dasharray="238.76"
                    stroke-dashoffset="238.76"
                  />
                </svg>
              </div>
              <div class="gesture-ring-callout">
                <p class="gesture-ring-hold" data-gesture-hold-hint hidden>*请保持当前动作</p>
                <p class="gesture-ring-bubble" data-gesture-bubble>请举手确认下方操作。</p>
              </div>
            </div>
          </div>
        </div>

        <div
          class="footer-hint finish-touch-footer"
          data-choice-group
          data-default-index="1"
          data-finish-group
          data-finish-flow="standard"
          data-finish-current="standard"
          data-idle-default-next="1"
          data-idle-start="on-first-click"
          data-idle-seconds="20"
        >
          <div class="scheme-three-action-row">
            <a class="scheme-three-action-card" href="./report-scan-login.html" data-choice-item data-choice-label="结束测量" data-finish-option="report">
              <strong>结束测量</strong>
              <span>查看报告</span>
            </a>
            <a class="scheme-three-action-card" href="#" data-choice-item data-choice-label="继续下一项测量" data-finish-option="next">
              <strong data-next-title>继续下一项测量</strong>
              <span data-next-desc>按测量顺序推荐</span>
            </a>
          </div>
          <div class="scheme-one-weak scheme-one-weak--minimal">
            <a href="./standard-user-prep.html" data-action-link="start-session" data-standard-flow-entry>重新测量当前项目</a>
          </div>
          <div class="scheme-one-footer footer-hint scheme-three-idle-footer touch-footnote-wrap">
            <div class="auto-hint">
              <strong><span data-idle-label>空闲倒计时</span></strong>
              <span class="count-badge" data-idle-countdown>20</span>
            </div>
            <div class="auto-hint">
              <strong><span data-auto-prefix>空闲默认：</span><span data-auto-label>继续下一项测量</span></strong>
            </div>
            <p class="touch-footnote">
              <span class="demo-ui-caption">Demo 演示</span>
              点击上方选项将直接进入对应流程；点击页面空白处后将启动空闲倒计时（与显式点击等价，均为演示用）。
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
