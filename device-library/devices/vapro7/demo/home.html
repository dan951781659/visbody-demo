<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测量项目</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--home device--measure-select">
        <div class="status-bar">
          <span>18:32</span>
          <span>请站上转台</span>
        </div>
        <div class="topbar">
          <a class="back-link" href="./standby.html" data-stateful-link="./standby.html">← 首页</a>
        </div>
        <h1 class="screen-title screen-title--measure-select">请按图示动作进入测量项目</h1>

        <div
          class="measure-select-stack"
          data-home-measure-grid
          data-choice-group
          data-default-index="0"
          data-gesture-hold-ms="2000"
        ></div>

        <p class="settings-group-hint" data-show-if-no-home-tiles hidden>
          当前未开启任何测量项目，请联系门店工作人员。
        </p>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
