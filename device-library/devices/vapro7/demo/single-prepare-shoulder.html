<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>肩部测量准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>肩部测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./home.html" data-dynamic-lab-back data-stateful-link="./home.html">← 返回</a>
          <span class="text-link">测量准备</span>
        </div>
        <div class="section-label section-label--stack">
          <span class="section-label__kicker">动态实验室</span>
          <span class="section-label__title">肩部测量</span>
        </div>
        <h1 class="screen-title">请站上转台并抬起左手</h1>
        <p class="screen-subtitle" data-live-voice>准备完成后将进入倒计时，再依次采集左手侧与右手侧。</p>
        <div class="device-visual">
          <div
            class="live-stage demo-click-zone"
            data-stage-next="./single-countdown-shoulder.html"
            data-stage-delay="2600"
            data-voice-text="请缓慢抬起左手，与肩平齐并保持稳定。"
          >
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip">左手引导</span>
              <span class="live-chip ok">识别中</span>
            </div>
            <div class="guide-line circle"></div>
            <div class="human pose-shoulder-left">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="limb arm left"></div>
              <div class="limb arm right"></div>
              <div class="limb leg left"></div>
              <div class="limb leg right"></div>
            </div>
            <div class="live-focus">左手缓慢抬高约与肩平</div>
          </div>
        </div>
        <div class="footer-hint">
          <div class="auto-hint auto-hint-clickable" data-demo-next="./single-countdown-shoulder.html">
            <strong>准备完成 · 进入 3 秒倒计时</strong>
            <span class="count-badge">OK</span>
          </div>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
