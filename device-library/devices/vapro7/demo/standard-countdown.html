<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开始测量</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--countdown">
        <div class="status-bar"><span>18:32</span><span>开始测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-position.html" data-stateful-link="./standard-position.html">← 返回</a>
          <span class="text-link">请保持静止</span>
        </div>
        <h1 class="screen-title">即将开始测量</h1>
        <div
          class="countdown-layout"
          data-stage-next="./standard-measuring.html"
          data-stage-delay="3200"
          data-stage-seconds-start="3"
          data-stage-auto-start
          data-stage-manual-next
          data-voice-text="请保持姿态，测量即将开始。"
        >
          <div class="device-visual countdown-pose-wrap">
            <div class="live-stage countdown-pose-stage">
              <div class="human pose-hold" aria-hidden="true">
                <div class="head"></div><div class="torso"></div>
                <div class="limb arm left"></div><div class="limb arm right"></div>
                <div class="limb leg left"></div><div class="limb leg right"></div>
              </div>
            </div>
            <p class="countdown-pose-caption">请保持：握住扶手，双臂约 45°，身体静止</p>
          </div>
          <div class="countdown-digit-block">
            <div class="headline countdown-seconds" data-stage-seconds aria-label="倒计时秒数">3</div>
            <p class="countdown-soon-caption">秒后开始</p>
            <p class="screen-subtitle countdown-done-hint" data-stage-done-hint>请保持以上动作</p>
          </div>
          <div class="measurement-tips-carousel" data-tip-carousel data-tip-interval="2600">
            <p class="measurement-tips-title">测量注意事项</p>
          </div>
        </div>
        <div class="footer-hint">
          <a class="button primary" href="./standard-measuring.html" data-demo-next="./standard-measuring.html" data-stateful-link="./standard-measuring.html">下一步</a>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
