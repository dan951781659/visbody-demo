<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开始测量</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--countdown device--bodycomp-countdown">
        <div class="status-bar"><span>18:32</span><span>身体成分</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-position.html" data-stateful-link="./standard-position.html">← 返回</a>
          <span class="text-link">请保持静止</span>
        </div>
        <h1 class="screen-title">即将开始测量</h1>
        <div class="countdown-body">
        <div
          class="countdown-layout"
          data-stage-next="./standard-measuring.html"
          data-stage-delay="3200"
          data-stage-seconds-start="3"
          data-stage-auto-start
          data-stage-manual-next
          data-voice-text="请保持姿态，测量即将开始。"
        >
          <div class="countdown-digit-block">
            <div class="headline countdown-seconds" data-stage-seconds aria-label="倒计时秒数">3</div>
            <p class="countdown-soon-caption">秒后开始</p>
          </div>
          <div class="countdown-pose-stage countdown-pose-stage--flat countdown-video-stage">
            <div class="camera-corner tl"></div>
            <div class="camera-corner tr"></div>
            <div class="camera-corner bl"></div>
            <div class="camera-corner br"></div>
            <video
              class="bodycomp-flow-video bodycomp-flow-video--countdown"
              autoplay
              muted
              loop
              playsinline
              preload="auto"
              controlslist="nodownload nofullscreen noremoteplayback"
              disablepictureinpicture
              aria-label="双臂自然打开约四十五度夹角倒计时示意动画"
            >
              <source src="./assets/bodycomp-flow/arms-45-countdown.mp4" type="video/mp4" />
            </video>
          </div>
          <div class="measuring-info-panel countdown-pose-hint">
            <img class="measuring-info-panel__badge" src="./assets/lanhu/info-badge-i.png" alt="" />
            <div class="measuring-info-panel__row">
              <img class="measuring-info-panel__dot" src="./assets/lanhu/tip-dot.png" alt="" />
              <p class="measuring-info-panel__text" data-countdown-panel-lead>请保持：握住扶手，双臂约 45°，身体静止</p>
            </div>
          </div>
        </div>
        <div class="device-tips-carousel-section">
          <div class="device-tips-carousel-box">
            <div class="measurement-tips-carousel" data-tip-carousel data-tip-interval="2600" data-tip-no-index></div>
          </div>
        </div>
        </div>
        <div class="footer-hint">
          <a class="button primary" href="./standard-measuring.html" data-demo-next="./standard-measuring.html" data-stateful-link="./standard-measuring.html">下一步</a>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
