<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>扶手接触准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--guide"
        data-auto-detect-next="./standard-position.html"
        data-auto-detect-delay="2600"
        data-voice-text="请双手握住扶手，拇指与四指充分接触金属区域。"
      >
        <div class="status-bar"><span>18:32</span><span>综合测量</span><span class="demo-version-badge" data-demo-version>v1.6.0</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-bodycomp-prep.html" data-stateful-link="./standard-bodycomp-prep.html">← 返回</a>
          <span class="text-link">测量准备页</span>
        </div>
        <div class="section-label">综合测量</div>
        <h1 class="screen-title">双手接触扶手金属</h1>
        <p class="screen-subtitle">请双手拇指及四指与扶手金属区域充分接触。</p>
        <div class="device-visual guide-visual">
          <div class="live-stage guide-scene-wrap phase-stage-rails">
            <div class="camera-corner tl"></div><div class="camera-corner tr"></div><div class="camera-corner bl"></div><div class="camera-corner br"></div>
            <div class="live-glow"></div>
            <div class="live-status live-status--single"><span class="live-chip ok">扶手识别中</span></div>
            <div class="turntable-base" aria-hidden="true"></div>
            <div class="guide-line circle"></div>
            <div class="human pose-hold">
              <div class="head"></div><div class="torso"></div><div class="limb arm left"></div><div class="limb arm right"></div><div class="limb leg left"></div><div class="limb leg right"></div>
            </div>
            <div class="guide-rail-hint">拇指与四指贴合金属区</div>
            <div class="live-focus" data-auto-detect-status>正在识别手部接触...</div>
          </div>
        </div>
        <div class="footer-hint">
          <a class="button primary" href="./standard-position.html" data-demo-next="./standard-position.html" data-stateful-link="./standard-position.html">下一步</a>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
