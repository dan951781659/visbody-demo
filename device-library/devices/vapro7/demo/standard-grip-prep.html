<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>扶手接触准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--guide device--guide-panel device--bodycomp-video-page"
        data-auto-detect-next="./standard-position.html"
        data-auto-detect-delay="2600"
        data-voice-advance-next="./standard-position.html"
        data-voice-advance-after-ms="3000"
        data-voice-text="请双手握住扶手，拇指与四指充分接触金属区域。"
      >
        <div class="status-bar"><span>18:32</span><span>扶手准备</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-bodycomp-prep.html" data-stateful-link="./standard-bodycomp-prep.html">← 返回</a>
          <span class="text-link">测量准备页</span>
        </div>
        <h1 class="screen-title">双手接触扶手金属</h1>
        <div class="device-visual guide-visual">
          <div class="live-stage guide-scene-wrap phase-stage-rails guide-grip-stage">
            <div class="camera-corner tl"></div><div class="camera-corner tr"></div><div class="camera-corner bl"></div><div class="camera-corner br"></div>
            <div class="live-glow"></div>
            <div class="live-status live-status--single"><span class="live-chip ok">请按提示操作</span></div>
            <video
              class="bodycomp-flow-video bodycomp-flow-video--guide"
              autoplay
              muted
              loop
              playsinline
              preload="auto"
              controlslist="nodownload nofullscreen noremoteplayback"
              disablepictureinpicture
              aria-label="双手拇指与四指接触扶手金属区示意动画"
            >
              <source src="./assets/bodycomp-flow/grip-handle.mp4" type="video/mp4" />
            </video>
            <div class="guide-rail-hint">拇指与四指贴合金属区</div>
          </div>
        </div>
        <div class="measuring-info-panel">
          <img class="measuring-info-panel__badge" src="./assets/lanhu/info-badge-i.png" alt="" />
          <div class="measuring-info-panel__row">
            <img class="measuring-info-panel__dot" src="./assets/lanhu/tip-dot.png" alt="" />
            <p class="measuring-info-panel__text" data-panel-hint>请双手拇指及四指与扶手金属区域充分接触。</p>
          </div>
        </div>
        <div class="footer-hint">
          <p class="footer-muted" hidden data-voice-auto-hint>
            语音播报结束后将自动进入下一页。
          </p>
          <a
            class="button primary"
            href="./standard-position.html"
            data-demo-next="./standard-position.html"
            data-stateful-link="./standard-position.html"
          >下一步</a>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
