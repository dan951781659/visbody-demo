<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测量已完成</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--scheme-three device--scheme-three-touch" data-voice-text="测量已完成。请触控选择下一步。">
        <div class="status-bar"><span>18:32</span><span>测量完成</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-measuring.html">← 返回</a>
          <span class="text-link">测量完成</span>
        </div>
        <div class="scheme-one-title">
          <h1 class="screen-title">测量已完成</h1>
        </div>

        <div class="scheme-three-summary" aria-label="本次已采集项">
          <div class="summary-check-row"><span class="summary-check-name">体重</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
          <div class="summary-check-row"><span class="summary-check-name">体成分</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
          <div class="summary-check-row"><span class="summary-check-name">身高体围</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
          <div class="summary-check-row"><span class="summary-check-name">体态</span><span class="summary-check-mark" aria-hidden="true">✓</span></div>
        </div>

        <div class="scheme-three-camera scheme-three-camera--compact is-camera-off" data-scheme-three-live-touch>
          <div class="live-stage">
            <video class="scheme-three-video" autoplay muted playsinline></video>
            <div class="scheme-three-overlay" aria-hidden="true"></div>
            <div class="live-status">
              <span class="live-chip ok">取景预览</span>
            </div>
            <span class="camera-corner tl"></span><span class="camera-corner tr"></span>
            <span class="camera-corner bl"></span><span class="camera-corner br"></span>
          </div>
        </div>

        <div
          class="scheme-three-flow"
          data-choice-group
          data-default-index="0"
          data-finish-group
          data-finish-flow="standard"
          data-finish-current="standard"
          data-idle-default-next="off"
          data-countdown="3"
        >
          <div class="scheme-three-action-row scheme-three-action-row--touch">
            <a
              class="scheme-three-action-card"
              href="./report-scan-login.html"
              data-choice-item
              data-choice-label="结束测量（查看报告）"
              data-finish-option="report"
            >
              <strong>结束测量</strong>
              <span>生成报告</span>
            </a>
            <a
              class="scheme-three-action-card"
              href="#"
              data-choice-item
              data-choice-label="继续下一项测量"
              data-finish-option="next"
            >
              <strong data-next-title>继续下一项测量</strong>
              <span data-next-desc>按测量顺序推荐</span>
            </a>
          </div>

          <div class="scheme-one-weak scheme-one-weak--minimal">
            <a href="./standard-user-prep.html" data-action-link="start-session" data-standard-flow-entry>重新测量</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
    <script>
      (function () {
        var wrap = document.querySelector("[data-scheme-three-live-touch]");
        var video = wrap && wrap.querySelector(".scheme-three-video");
        if (!wrap || !video) return;
        function setCameraOff() {
          wrap.classList.add("is-camera-off");
        }
        function setCameraOn() {
          wrap.classList.remove("is-camera-off");
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setCameraOff();
          return;
        }
        navigator.mediaDevices
          .getUserMedia({ video: { facingMode: "user" }, audio: false })
          .then(function (stream) {
            video.srcObject = stream;
            setCameraOn();
          })
          .catch(function () {
            setCameraOff();
          });
      })();
    </script>
  </body>
</html>
