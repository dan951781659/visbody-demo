<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>完整测量准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>完整测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./home.html">← 返回</a>
          <span class="text-link">测量准备</span>
        </div>
        <div class="section-label">完整测量</div>
        <h1 class="screen-title">完整测量准备</h1>
        <p class="screen-subtitle" data-live-voice data-guide-subtitle>请按提示完成准备动作。</p>
        <div class="device-visual">
          <div
            class="live-stage"
            data-guide-sequence
            data-guide-next="./standard-countdown.html"
            data-voice-text="请按提示完成准备动作。"
          >
            <div class="camera-corner tl"></div><div class="camera-corner tr"></div><div class="camera-corner bl"></div><div class="camera-corner br"></div>
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">扶手已识别</span>
              <span class="live-chip">准备完成后进入倒计时</span>
            </div>
            <div class="guide-line circle"></div>
            <div class="guide-line feet"></div>
            <div class="human pose-hold">
              <div class="head"></div><div class="torso"></div>
              <div class="limb arm left"></div><div class="limb arm right"></div>
              <div class="limb leg left"></div><div class="limb leg right"></div>
            </div>
            <div class="guide-spotlight">
              <div class="guide-step-pill" data-guide-step-index>1/4</div>
              <div class="guide-step-copy">
                <strong data-guide-step-title>脱鞋脱袜</strong>
                <span data-guide-step-body>保持足底可完整接触转台。</span>
              </div>
            </div>
            <div class="live-focus" data-guide-focus>请脱鞋脱袜</div>
          </div>
        </div>
        <div class="footer-hint">
          <div class="auto-hint auto-hint-clickable" data-demo-next="./standard-countdown.html">
            <strong>准备完成后进入倒计时</strong>
            <span class="count-badge">OK</span>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
