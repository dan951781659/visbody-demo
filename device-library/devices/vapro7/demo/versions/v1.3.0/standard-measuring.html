<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>完整测量中</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device"
        data-measuring-flow
        data-measuring-duration="42000"
        data-measuring-countdown="3"
        data-measuring-next="./standard-next-step.html"
        data-voice-text="测量中，请不要移动。"
      >
        <div class="status-bar"><span>18:32</span><span>测量中</span><span class="demo-version-badge" data-demo-version>v1.3.0</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-countdown.html">← 返回</a>
          <span class="text-link">转台旋转中</span>
        </div>
        <div class="section-label">完整测量</div>
        <h1 class="screen-title">请保持静止</h1>
        <p class="screen-subtitle" data-live-voice>转台旋转采集中，请不要移动。</p>
        <div class="device-visual">
          <div class="live-stage measuring-stage">
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">姿态正确</span>
              <span class="live-chip" data-measuring-chip>转台旋转中</span>
            </div>
            <div class="turntable-plate" aria-hidden="true"></div>
            <div class="guide-line circle"></div>
            <div class="human pose-hold measuring-human">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="limb arm left"></div>
              <div class="limb arm right"></div>
              <div class="limb leg left"></div>
              <div class="limb leg right"></div>
            </div>
            <div class="scan-line"></div>
            <div class="live-focus" data-measuring-focus>请不要移动</div>
          </div>
        </div>
        <div class="progress-track"><div class="progress-fill" data-measuring-progress style="width:0%;"></div></div>
        <div
          class="footer-hint auto-hint-clickable demo-click-zone"
          data-measuring-footer
          role="button"
          tabindex="0"
        >
          <strong>点击开始倒计时 · 测量完成后继续</strong>
          <span class="count-badge" data-stage-seconds>3</span>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
