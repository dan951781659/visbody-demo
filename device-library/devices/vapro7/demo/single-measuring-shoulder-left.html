<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>肩部测量 · 左手</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>肩部测量</span><span class="demo-version-badge" data-demo-version>v1.5.0</span></div>
        <div class="topbar">
          <a class="back-link" href="./single-countdown-shoulder.html">← 返回</a>
          <span class="text-link">左手侧采集中</span>
        </div>
        <div class="section-label">肩部测量</div>
        <h1 class="screen-title">左手侧测量中</h1>
        <p class="screen-subtitle" data-live-voice>请保持肩部姿态，设备正在采集左手侧角度。</p>
        <div class="single-measure-task-card">
          <div class="single-measure-task-head"><strong>当前任务</strong><span>左手抬高角度</span></div>
          <div class="single-measure-angle-ring" aria-hidden="true">
            <span class="single-measure-angle-value">164°</span>
          </div>
          <ul class="single-measure-bullets">
            <li>肩肘腕大致一线，勿耸肩</li>
            <li>面向前方，呼吸均匀</li>
          </ul>
        </div>
        <div class="device-visual">
          <div class="live-stage">
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">姿态稳定</span>
              <span class="live-chip">左手采集中</span>
            </div>
            <div class="guide-line circle"></div>
            <div class="human pose-shoulder-left">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="limb arm left"></div>
              <div class="limb arm right"></div>
              <div class="limb leg left"></div>
              <div class="limb leg right"></div>
            </div>
            <div class="scan-line"></div>
            <div class="live-focus">请保持静止</div>
          </div>
        </div>
        <div class="footer-hint">
          <div class="button-row">
            <a class="button primary" href="./single-measuring-shoulder-right.html">继续右手测量</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
