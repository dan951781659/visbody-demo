<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>肩部功能 · 外展上举 · 左手</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--shoulder-measure">
        <div class="status-bar"><span>18:32</span><span>肩部功能</span><span class="demo-version-badge" data-demo-version>v1.5.0</span></div>
        <div class="topbar">
          <a class="back-link" href="./single-countdown-shoulder.html">← 返回</a>
          <span class="text-link">测量中</span>
        </div>

        <div class="single-shoulder-progress">
          <div class="single-shoulder-progress-icon" aria-hidden="true">
            <span class="single-shoulder-progress-glyph"></span>
          </div>
          <div class="single-shoulder-progress-body">
            <div class="single-shoulder-progress-status">测量中</div>
            <div class="single-shoulder-progress-steps">
              <span class="is-current">外展上举-左手</span>
              <span class="single-shoulder-progress-sep">››</span>
              <span class="is-next">外展上举-右手</span>
            </div>
          </div>
        </div>

        <div class="single-shoulder-stage-wrap device-visual">
          <div class="live-stage single-shoulder-live">
            <div class="live-glow"></div>
            <div class="single-shoulder-axis single-shoulder-axis--torso" aria-hidden="true"></div>
            <div class="single-shoulder-arc single-shoulder-arc--left" aria-hidden="true"></div>
            <div class="single-shoulder-angle-block single-shoulder-angle-block--primary">
              <span class="single-shoulder-angle">164.0°</span>
            </div>
            <div class="single-shoulder-peak-check" aria-hidden="true">
              <span class="single-shoulder-check-ring">✓</span>
            </div>
            <div class="human pose-shoulder-left">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="limb arm left"></div>
              <div class="limb arm right"></div>
              <div class="limb leg left"></div>
              <div class="limb leg right"></div>
            </div>
          </div>
        </div>

        <div class="single-shoulder-info-card">
          <span class="single-shoulder-info-badge" aria-hidden="true">i</span>
          <ul class="single-shoulder-info-list">
            <li>保持身体自然站立</li>
            <li>左手向左伸直，缓慢展开上举至最高处</li>
          </ul>
        </div>

        <div class="footer-hint">
          <div class="button-row">
            <a class="button primary" href="./single-measuring-shoulder-right.html">继续右手测量</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
