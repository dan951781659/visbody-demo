<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>肩部测量 · 右手</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>肩部测量</span><span class="demo-version-badge" data-demo-version>v1.5.0</span></div>
        <div class="topbar">
          <a class="back-link" href="./single-measuring-shoulder-left.html">← 返回</a>
          <span class="text-link">右手侧采集中</span>
        </div>
        <div class="section-label">肩部测量</div>
        <h1 class="screen-title">右手侧测量中</h1>
        <p class="screen-subtitle" data-live-voice>左手侧已完成示意采集，请对称抬起右手完成另一侧。</p>
        <div class="single-measure-task-card single-measure-task-card--readonly">
          <div class="single-measure-task-head"><strong>左手侧（已采集）</strong><span>示意角度</span></div>
          <div class="single-measure-inline-metrics">
            <span>164.5°</span>
          </div>
        </div>
        <div class="single-measure-task-card">
          <div class="single-measure-task-head"><strong>当前任务</strong><span>右手抬高角度</span></div>
          <div class="single-measure-angle-ring single-measure-angle-ring--right" aria-hidden="true">
            <span class="single-measure-angle-value">170°</span>
          </div>
          <ul class="single-measure-bullets">
            <li>与左手动作镜像对称</li>
            <li>保持 2 秒以上便于锁定</li>
          </ul>
        </div>
        <div class="device-visual">
          <div class="live-stage">
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">姿态稳定</span>
              <span class="live-chip">右手采集中</span>
            </div>
            <div class="guide-line circle"></div>
            <div class="human pose-shoulder-right">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="limb arm left"></div>
              <div class="limb arm right"></div>
              <div class="limb leg left"></div>
              <div class="limb leg right"></div>
            </div>
            <div class="scan-line"></div>
            <div class="live-focus">请保持静止</div>
          </div>
        </div>
        <div class="footer-hint">
          <div class="button-row">
            <a
              class="button primary"
              href="./single-result-shoulder.html"
              data-action-link="noop"
              data-complete-group="singleShoulder"
              >查看肩部结果</a
            >
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
