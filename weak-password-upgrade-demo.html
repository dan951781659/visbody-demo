<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老客户弱口令升级交互 Demo</title>
    <style>
      :root {
        --bg: #f7f9fc;
        --panel: #ffffff;
        --panel-soft: #f8fbff;
        --border: #e6ebf2;
        --text: #1f2937;
        --muted: #667085;
        --primary: #165dff;
        --primary-soft: #e8f0ff;
        --cyan: #22a6f2;
        --teal: #0f766e;
        --danger: #dc2626;
        --danger-soft: #fef2f2;
        --warning: #d97706;
        --warning-soft: #fff7ed;
        --success: #16a34a;
        --success-soft: #ecfdf3;
        --shadow: 0 24px 64px rgba(22, 93, 255, 0.12);
        --radius-xl: 24px;
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 10px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(34, 166, 242, 0.1), transparent 28%),
          linear-gradient(180deg, #edf4ff 0%, #f7f9fc 48%, #f3f6fb 100%);
        color: var(--text);
      }

      .page-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 1fr auto;
      }

      .main-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.9fr) minmax(440px, 540px);
        gap: 24px;
        padding: 32px 32px 12px;
      }

      .hero-panel {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(22, 93, 255, 0.08), rgba(34, 166, 242, 0.02)),
          linear-gradient(180deg, #f6faff 0%, #edf4ff 100%);
        border: 1px solid rgba(22, 93, 255, 0.08);
        min-height: 700px;
        padding: 42px 46px;
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(22, 93, 255, 0.12);
        color: var(--primary);
        font-size: 13px;
        font-weight: 600;
        backdrop-filter: blur(10px);
      }

      .hero-title {
        margin: 18px 0 10px;
        font-size: 34px;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }

      .hero-copy {
        max-width: 560px;
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .visual-stage {
        position: absolute;
        inset: 165px 24px 26px 36px;
      }

      .stage-slab {
        position: absolute;
        inset: 90px 50px 56px 20px;
        border-radius: 34px;
        background:
          linear-gradient(140deg, rgba(22, 93, 255, 0.95), rgba(34, 166, 242, 0.72));
        box-shadow: 0 32px 52px rgba(22, 93, 255, 0.2);
        transform: perspective(1200px) rotateX(55deg) rotateZ(-28deg);
      }

      .stage-ring {
        position: absolute;
        left: 260px;
        top: 168px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        border: 18px solid rgba(255, 255, 255, 0.58);
        box-shadow:
          0 0 0 18px rgba(128, 174, 255, 0.18),
          0 0 0 38px rgba(168, 196, 255, 0.12);
      }

      .stage-core {
        position: absolute;
        left: 318px;
        top: 204px;
        width: 146px;
        height: 146px;
        border-radius: 44% 56% 52% 48% / 44% 48% 52% 56%;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.68) 60%, rgba(135, 164, 255, 0.68));
        box-shadow: 0 30px 48px rgba(16, 68, 214, 0.18);
      }

      .stage-card,
      .stage-chart,
      .stage-stat {
        position: absolute;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 18px 36px rgba(22, 93, 255, 0.14);
        backdrop-filter: blur(10px);
      }

      .stage-chart {
        left: 140px;
        top: 108px;
        width: 220px;
        height: 136px;
      }

      .stage-chart::before,
      .stage-chart::after {
        content: "";
        position: absolute;
        left: 22px;
        right: 22px;
        height: 2px;
        border-radius: 999px;
      }

      .stage-chart::before {
        top: 40px;
        background: linear-gradient(90deg, #86b9ff 0%, #c6dafe 100%);
      }

      .stage-chart::after {
        top: 72px;
        background: linear-gradient(90deg, #d8e6ff 0%, #a27dff 100%);
      }

      .stage-card.left {
        left: 94px;
        top: 300px;
        width: 156px;
        height: 118px;
      }

      .stage-card.right {
        right: 112px;
        top: 392px;
        width: 246px;
        height: 146px;
      }

      .stage-card.right::before {
        content: "";
        position: absolute;
        inset: 22px 28px 22px auto;
        width: 90px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(34, 166, 242, 0.22), rgba(15, 118, 110, 0.15));
      }

      .stage-stat {
        right: 214px;
        top: 136px;
        width: 132px;
        height: 82px;
      }

      .stage-stat::before {
        content: "";
        position: absolute;
        left: 22px;
        right: 22px;
        bottom: 18px;
        height: 36px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(139, 124, 255, 0.55), rgba(22, 93, 255, 0.18));
      }

      .hero-note {
        position: absolute;
        left: 46px;
        bottom: 34px;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(22, 93, 255, 0.12);
        border-radius: 16px;
        color: var(--muted);
        font-size: 13px;
        backdrop-filter: blur(12px);
      }

      .hero-note strong {
        color: var(--text);
      }

      .auth-side {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 8px 12px 0;
      }

      .auth-panel {
        width: 100%;
        max-width: 500px;
        min-height: 700px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(22, 93, 255, 0.08);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 30px 30px 26px;
        display: flex;
        flex-direction: column;
      }

      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 26px;
      }

      .lang-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--border);
      }

      .brand-lockup {
        margin-bottom: 28px;
      }

      .brand-eyebrow {
        color: var(--primary);
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .brand-title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .tabs {
        display: flex;
        gap: 22px;
        margin-bottom: 24px;
        font-size: 14px;
      }

      .tab-active {
        color: var(--primary);
        font-weight: 600;
        position: relative;
      }

      .tab-active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -10px;
        height: 2px;
        border-radius: 999px;
        background: var(--primary);
      }

      .tab-muted {
        color: #98a2b3;
      }

      .card-title {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.02em;
      }

      .card-copy {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .info-banner {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.6;
      }

      .info-banner.warning {
        background: var(--warning-soft);
        color: #9a4f03;
        border: 1px solid rgba(217, 119, 6, 0.16);
      }

      .info-banner.danger {
        background: var(--danger-soft);
        color: #b42318;
        border: 1px solid rgba(220, 38, 38, 0.14);
      }

      .info-banner.success {
        background: var(--success-soft);
        color: #067647;
        border: 1px solid rgba(22, 163, 74, 0.16);
      }

      .form {
        margin-top: 26px;
        display: grid;
        gap: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 14px;
        font-weight: 600;
      }

      .field input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fbfcfe;
        color: var(--text);
        padding: 14px 14px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .field input:focus {
        border-color: rgba(22, 93, 255, 0.5);
        box-shadow: 0 0 0 4px rgba(22, 93, 255, 0.08);
      }

      .password-input-wrap {
        position: relative;
      }

      .password-input-wrap input {
        padding-right: 118px;
      }

      .password-affix {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .password-counter {
        color: #98a2b3;
        font-size: 12px;
        line-height: 1;
      }

      .password-toggle {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: transparent;
        color: #8aa4c3;
        cursor: pointer;
        padding: 0;
      }

      .password-toggle:hover {
        color: var(--primary);
      }

      .password-toggle:focus-visible {
        outline: 2px solid rgba(22, 93, 255, 0.25);
        outline-offset: 2px;
        border-radius: 8px;
      }

      .password-toggle svg {
        width: 18px;
        height: 18px;
      }

      .error-text,
      .helper-text {
        font-size: 13px;
        line-height: 1.5;
      }

      .error-text {
        color: var(--danger);
      }

      .helper-text {
        color: var(--muted);
      }

      .inline-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .checkbox-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn {
        border: none;
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        transform: none;
      }

      .btn-primary {
        background: linear-gradient(180deg, #2f6eff 0%, #165dff 100%);
        color: #fff;
        box-shadow: 0 14px 30px rgba(22, 93, 255, 0.22);
      }

      .btn-secondary {
        background: var(--panel-soft);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-link {
        background: transparent;
        color: var(--primary);
        padding: 0;
        font-weight: 500;
      }

      .btn-stack {
        margin-top: 24px;
        display: grid;
        gap: 12px;
      }

      .demo-strip {
        margin-top: 28px;
        padding: 16px;
        border-radius: 16px;
        background: var(--panel-soft);
        border: 1px solid var(--border);
      }

      .demo-strip h4,
      .rule-card h4 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .scenario-grid {
        display: grid;
        gap: 10px;
      }

      .scenario-card {
        display: grid;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #fff;
        border: 1px solid var(--border);
      }

      .scenario-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .scenario-title {
        font-size: 13px;
        font-weight: 600;
      }

      .scenario-note,
      .scenario-cred {
        color: var(--muted);
        font-size: 12px;
      }

      .stepper {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 8px 0 28px;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #98a2b3;
        font-size: 13px;
        font-weight: 600;
      }

      .step-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #eef2f7;
        border: 1px solid #d8dee8;
      }

      .step.active {
        color: var(--primary);
      }

      .step.active .step-dot {
        background: var(--primary-soft);
        border-color: rgba(22, 93, 255, 0.2);
      }

      .step.done .step-dot {
        color: var(--success);
        background: rgba(22, 163, 74, 0.08);
        border-color: rgba(22, 163, 74, 0.18);
      }

      .step-line {
        flex: 1;
        min-width: 12px;
        height: 1px;
        background: #dde4ef;
      }

      .rule-card {
        margin-top: 18px;
        padding: 16px;
        border-radius: 16px;
        background: var(--panel-soft);
        border: 1px solid var(--border);
      }

      .reset-layout {
        max-width: 620px;
        margin: 0 auto;
      }

      .reset-layout .stepper {
        margin-bottom: 34px;
      }

      .reset-layout .card-title {
        font-size: 30px;
      }

      .reset-layout .card-copy {
        max-width: 560px;
        margin-top: 14px;
        font-size: 15px;
        line-height: 1.8;
      }

      .reset-form {
        gap: 22px;
        margin-top: 38px;
      }

      .reset-form .field {
        gap: 12px;
      }

      .required-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
      }

      .required-mark {
        color: #ff4d4f;
      }

      .reset-form input {
        height: 64px;
        border-radius: 10px;
        background: #f4f6fa;
        border-color: #edf1f7;
        font-size: 15px;
        color: #253046;
      }

      .reset-form input::placeholder {
        color: #98a2b3;
      }

      .reset-form .btn-primary {
        margin-top: 8px;
        height: 56px;
        border-radius: 8px;
        font-size: 16px;
      }

      .rule-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }

      .rule-list li {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .rule-list li::before {
        content: "•";
        color: var(--primary);
        font-size: 18px;
        line-height: 1;
      }

      .contact-card {
        margin-top: 18px;
        padding: 16px;
        border-radius: 16px;
        background: linear-gradient(180deg, #f9fbff 0%, #f4f8ff 100%);
        border: 1px solid var(--border);
      }

      .contact-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px dashed #dbe4f3;
      }

      .contact-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .contact-name {
        font-size: 14px;
        font-weight: 600;
      }

      .contact-copy {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .support-card {
        margin-top: 18px;
        padding: 16px;
        border-radius: 16px;
        background: linear-gradient(180deg, #f9fbff 0%, #f4f8ff 100%);
        border: 1px solid rgba(22, 93, 255, 0.1);
      }

      .support-card h4 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .support-list {
        display: grid;
        gap: 10px;
      }

      .support-item {
        display: grid;
        gap: 4px;
      }

      .support-label {
        color: var(--muted);
        font-size: 12px;
      }

      .support-value {
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
      }

      .support-value a {
        color: var(--primary);
        text-decoration: none;
      }

      .success-state {
        display: grid;
        place-items: center;
        padding: 26px 0 8px;
      }

      .success-badge {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(22, 163, 74, 0.12), rgba(22, 163, 74, 0.03));
        color: var(--success);
        font-size: 34px;
      }

      .dashboard-card {
        margin-top: 22px;
        border-radius: 20px;
        background: linear-gradient(180deg, #f7fbff 0%, #eef5ff 100%);
        border: 1px solid rgba(22, 93, 255, 0.1);
        padding: 20px;
      }

      .dashboard-grid {
        margin-top: 16px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dashboard-stat {
        padding: 14px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid var(--border);
      }

      .dashboard-stat strong {
        display: block;
        font-size: 22px;
        margin-top: 6px;
      }

      .footer-shell {
        padding: 22px 32px 28px;
      }

      .footer-panel {
        display: grid;
        grid-template-columns: 1.5fr 1fr 240px;
        gap: 28px;
        padding: 24px 30px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(22, 93, 255, 0.08);
        backdrop-filter: blur(12px);
      }

      .footer-logo {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.16em;
        color: #17336a;
      }

      .footer-list,
      .footer-links {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .qr-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .qr-box {
        display: grid;
        place-items: center;
        gap: 10px;
      }

      .qr-art {
        width: 88px;
        height: 88px;
        border-radius: 18px;
        background:
          linear-gradient(90deg, #1f2937 12px, transparent 12px) 0 0 / 26px 26px,
          linear-gradient(#1f2937 12px, transparent 12px) 0 0 / 26px 26px,
          #fff;
        border: 1px solid var(--border);
      }

      .qr-box span {
        color: var(--muted);
        font-size: 12px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 1320px) {
        .main-shell {
          grid-template-columns: minmax(0, 1fr);
        }

        .hero-panel {
          min-height: 520px;
        }

        .auth-side {
          padding-right: 0;
        }
      }

      @media (max-width: 768px) {
        .main-shell,
        .footer-shell {
          padding-left: 16px;
          padding-right: 16px;
        }

        .auth-panel,
        .hero-panel {
          min-height: auto;
        }

        .footer-panel {
          grid-template-columns: 1fr;
        }

        .qr-grid {
          grid-template-columns: repeat(2, minmax(0, 96px));
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <main class="main-shell">
        <section class="hero-panel">
          <div class="hero-badge">VISBODY WELLNESSHUB · Security Upgrade</div>
          <h1 class="hero-title">老客户弱口令升级交互 Demo</h1>
          <p class="hero-copy">
            保持现有客户登录页风格，只在右侧登录与安全升级卡片中扩展交互。演示重点覆盖正常密码直接登录、弱密码强制升级、邮箱不可用和未绑定邮箱四条路径。
          </p>

          <div class="visual-stage" aria-hidden="true">
            <div class="stage-slab"></div>
            <div class="stage-ring"></div>
            <div class="stage-core"></div>
            <div class="stage-chart"></div>
            <div class="stage-card left"></div>
            <div class="stage-card right"></div>
            <div class="stage-stat"></div>
          </div>

          <div class="hero-note">
            <strong>演示说明：</strong>
            海外默认邮箱验证路径；弱密码账号在完成验证和改密前不能进入平台。
          </div>
        </section>

        <aside class="auth-side">
          <div class="auth-panel" id="app"></div>
        </aside>
      </main>

      <footer class="footer-shell">
        <div class="footer-panel">
          <div>
            <div class="footer-logo">VISBODY</div>
            <div class="footer-list">
              <div>服务热线　400-161-7020</div>
              <div>客服邮箱　hello@visbody.com</div>
              <div>官网地址　visbodytech.cn</div>
            </div>
          </div>

          <div>
            <div class="footer-links">
              <strong style="color: var(--text)">支持与隐私</strong>
              <span>联系我们</span>
              <span>常见问题</span>
              <span>用户隐私协议</span>

    <script>
      const COMMON_WEAK_PASSWORDS = new Set([
        '12345678',
        '88888888',
        '11111111',
        'aaaaaaaaaaaa',
        'password123',
        'qwertyuiop',
        'abcd1234abcd',
      ]);

      const DEMO_ACCOUNTS = [
        {
          username: 'janice',
          password: '88888888',
          displayName: 'Janice',
          flow: 'weak',
          email: 'janice@example.com',
          note: '弱密码，正常邮箱验证',
        },
        {
          username: 'olivia',
          password: 'Harbor!Pulse2026',
          displayName: 'Olivia',
          flow: 'normal',
          email: 'olivia@example.com',
          note: '正常密码，直接进入系统',
        },
      ];

      const MIN_PASSWORD_LENGTH = 8;

      function maskEmail(email) {
        if (!email || !email.includes('@')) return '';

        const [prefix, domain] = email.split('@');
        if (prefix.length <= 2) {
          return `${prefix[0] || ''}***@${domain}`;
        }
        return `${prefix[0]}***${prefix[prefix.length - 1]}@${domain}`;
      }

      function findAccount(username, password) {
        return DEMO_ACCOUNTS.find(
          (account) => account.username === username.trim() && account.password === password,
        );
      }

      function loginMock(username, password) {
        const account = findAccount(username, password);

        if (!account) {
          return {
            status: 'LOGIN_FAIL',
            message: '账号或密码错误',
          };
        }

        if (account.flow === 'normal') {
          return {
            status: 'LOGIN_OK',
            displayName: account.displayName,
            message: '登录成功',
          };
        }

        return {
          status: 'LOGIN_WEAK_PASSWORD',
          displayName: account.displayName,
          email: account.email,
          maskedEmail: maskEmail(account.email),
          migrationToken: `migration-${account.username}`,
          username: account.username,
        };
      }

      function validateVerificationCode(code) {
        const value = code.trim();

        if (!value) {
          return {
            ok: false,
            code: 'EMPTY',
            message: '请输入验证码',
          };
        }

        if (value === '246810') {
          return {
            ok: true,
            code: 'OK',
            message: '',
          };
        }

        if (value === '000000') {
          return {
            ok: false,
            code: 'EXPIRED',
            message: '验证码已过期，请重新获取',
          };
        }

        return {
          ok: false,
          code: 'WRONG',
          message: '验证码错误，请重新输入',
        };
      }

      function validateLinkedEmail(email) {
        const value = (email || '').trim();

        if (!value) {
          return {
            ok: false,
            message: '请输入账号关联邮箱',
          };
        }

        if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(value)) {
          return {
            ok: false,
            message: '请输入有效的邮箱地址',
          };
        }

        return {
          ok: true,
          message: '',
        };
      }

      function isSequentialDigits(password) {
        return /012345|123456|234567|345678|456789|567890|987654|876543|765432|654321/.test(password);
      }

      function isRepeatedChars(password) {
        return /^([A-Za-z0-9!@#$%^&*()_+\-=[\]{};':"\\|,.<>/? ])\\1+$/.test(password);
      }

      function validatePasswordReset({ username, email, password, confirmPassword }) {
        const rawPassword = password || '';
        const rawConfirmPassword = confirmPassword || '';
        const normalizedPassword = rawPassword.trim();
        const normalizedUsername = (username || '').trim().toLowerCase();
        const normalizedEmailPrefix = ((email || '').split('@')[0] || '').trim().toLowerCase();
        const lowerPassword = normalizedPassword.toLowerCase();

        if (!normalizedPassword) {
          return {
            ok: false,
            field: 'password',
            message: '请输入新密码',
          };
        }

        if (lowerPassword === normalizedUsername) {
          return {
            ok: false,
            field: 'password',
            message: '密码不能与登录账号相同',
          };
        }

        if (normalizedPassword.length < MIN_PASSWORD_LENGTH) {
          return {
            ok: false,
            field: 'password',
            message: '密码长度不足，请设置更安全的密码',
          };
        }

        if (normalizedEmailPrefix && lowerPassword.includes(normalizedEmailPrefix)) {
          return {
            ok: false,
            field: 'password',
            message: '不能包含邮箱前缀等容易猜测的信息',
          };
        }

        if (
          COMMON_WEAK_PASSWORDS.has(lowerPassword) ||
          /^\\d+$/.test(normalizedPassword) ||
          isSequentialDigits(normalizedPassword) ||
          isRepeatedChars(normalizedPassword)
        ) {
          return {
            ok: false,
            field: 'password',
            message: '密码不可使用手机号、姓名、连续数字等常见简单密码',
          };
        }

        if (normalizedPassword !== rawConfirmPassword.trim()) {
          return {
            ok: false,
            field: 'confirmPassword',
            message: '两次输入的密码不一致',
          };
        }

        return {
          ok: true,
          field: '',
          message: '',
        };
      }

      const app = document.querySelector('#app');
      const SUPPORT_CONTACT = {
        serviceHotline: '400-161-7020',
        serviceEmail: 'hello@visbody.com',
        serviceWebsite: 'visbodytech.cn',
      };

      const state = {
        username: 'janice',
        password: '88888888',
        loginError: '',
        loginSuccess: '',
        migration: null,
        view: 'login',
        code: '',
        codeError: '',
        codeHint: '',
        linkedEmail: '',
        linkedEmailError: '',
        emailMode: 'known',
        newPassword: '',
        confirmPassword: '',
        resetError: '',
        resendLeft: 0,
        resendTimer: null,
        successTimer: null,
        fallbackType: 'unable-receive',
        entryMessage: '',
        entryMessageType: '',
        showNewPassword: false,
        showConfirmPassword: false,
      };

      function clearTimers() {
        stopResendCountdown();
        if (state.successTimer) {
          clearTimeout(state.successTimer);
          state.successTimer = null;
        }
      }

      function stopResendCountdown() {
        if (state.resendTimer) {
          clearInterval(state.resendTimer);
          state.resendTimer = null;
        }
        state.resendLeft = 0;
      }

      function resetUpgradeFields() {
        state.code = '';
        state.codeError = '';
        state.codeHint = '';
        state.linkedEmail = '';
        state.linkedEmailError = '';
        state.emailMode = 'known';
        state.newPassword = '';
        state.confirmPassword = '';
        state.resetError = '';
        state.entryMessage = '';
        state.entryMessageType = '';
        state.showNewPassword = false;
        state.showConfirmPassword = false;
        stopResendCountdown();
      }

      function backToLogin(message = '') {
        clearTimers();
        resetUpgradeFields();
        state.view = 'login';
        state.migration = null;
        state.loginSuccess = '';
        state.loginError = message;
        render();
      }

      function goDashboard(message) {
        clearTimers();
        state.view = 'dashboard';
        state.loginSuccess = message;
        render();
      }

      function startResendCountdown(seconds = 60) {
        stopResendCountdown();

        state.resendLeft = seconds;
        state.resendTimer = setInterval(() => {
          state.resendLeft -= 1;
          if (state.resendLeft <= 0) {
            stopResendCountdown();
          }
          updateVerifyCountdownUI();
        }, 1000);
      }

      function updateVerifyCountdownUI() {
        if (state.view !== 'reset-password') return;

        const resendButton = document.querySelector('[data-action="resend-code"]');
        if (!resendButton) return;

        resendButton.disabled = state.resendLeft > 0;
        resendButton.textContent = state.resendLeft > 0 ? `重新发送（${state.resendLeft}s）` : '重新发送';
      }

      function updatePasswordVisibilityUI() {
        const newPasswordInput = document.querySelector('#new-password');
        const confirmPasswordInput = document.querySelector('#confirm-password');
        const newPasswordToggle = document.querySelector('[data-action="toggle-new-password"]');
        const confirmPasswordToggle = document.querySelector('[data-action="toggle-confirm-password"]');

        if (newPasswordInput) {
          newPasswordInput.type = state.showNewPassword ? 'text' : 'password';
        }
        if (confirmPasswordInput) {
          confirmPasswordInput.type = state.showConfirmPassword ? 'text' : 'password';
        }
        if (newPasswordToggle) {
          newPasswordToggle.setAttribute('aria-label', state.showNewPassword ? '隐藏新密码' : '显示新密码');
          newPasswordToggle.setAttribute('aria-pressed', String(state.showNewPassword));
          newPasswordToggle.innerHTML = getEyeIcon(state.showNewPassword);
        }
        if (confirmPasswordToggle) {
          confirmPasswordToggle.setAttribute('aria-label', state.showConfirmPassword ? '隐藏确认新密码' : '显示确认新密码');
          confirmPasswordToggle.setAttribute('aria-pressed', String(state.showConfirmPassword));
          confirmPasswordToggle.innerHTML = getEyeIcon(state.showConfirmPassword);
        }
      }

      function handleSendCode() {
        if (!state.migration) return;

        let targetEmail = state.migration.email;
        state.linkedEmailError = '';

        if (state.emailMode === 'manual') {
          const emailResult = validateLinkedEmail(state.linkedEmail);
          if (!emailResult.ok) {
            state.linkedEmailError = emailResult.message;
            render();
            return;
          }
          targetEmail = state.linkedEmail.trim();
        }

        state.codeError = '';
        state.codeHint = `验证码已发送至 ${maskEmail(targetEmail)}。`;
        startResendCountdown(60);
        render();
      }

      function simulateSessionExpired() {
        backToLogin('登录状态已失效，请重新登录');
      }

      function applyDemoAccount(username) {
        const account = DEMO_ACCOUNTS.find((item) => item.username === username);
        if (!account) return;

        clearTimers();
        state.username = account.username;
        state.password = account.password;
        state.loginError = '';
        state.loginSuccess = '';
        state.view = 'login';
        state.migration = null;
        resetUpgradeFields();
        render();
      }

      function handleLogin(event) {
        event.preventDefault();
        state.loginError = '';
        state.loginSuccess = '';

        const result = loginMock(state.username, state.password);

        if (result.status === 'LOGIN_FAIL') {
          state.view = 'login';
          state.migration = null;
          state.loginError = result.message;
          render();
          return;
        }

        if (result.status === 'LOGIN_OK') {
          state.migration = null;
          goDashboard('正常密码登录成功，未触发安全升级。');
          return;
        }

        state.migration = result;
        resetUpgradeFields();

        state.view = 'upgrade-intro';
        render();
      }

      function handlePasswordSubmit(event) {
        event.preventDefault();
        if (!state.migration) return;

        const codeResult = validateVerificationCode(state.code);
        if (!codeResult.ok) {
          state.codeError = codeResult.message;
          render();
          return;
        }

        state.codeError = '';
        const result = validatePasswordReset({
          username: state.migration.username,
          email: state.migration.email,
          password: state.newPassword,
          confirmPassword: state.confirmPassword,
        });

        if (!result.ok) {
          state.resetError = result.message;
          render();
          return;
        }

        state.resetError = '';
        stopResendCountdown();
        state.view = 'success';
        render();

        state.successTimer = setTimeout(() => {
          goDashboard('密码修改成功，账号安全等级已提升。');
        }, 2000);
      }

      function renderStepper(step) {
        const steps = [
          { label: '验证身份', id: 1 },
          { label: '设置新密码', id: 2 },
          { label: '完成', id: 3 },
        ];

        return `
          <div class="stepper">
            ${steps
              .map((item, index) => {
                const stepClass = item.id < step ? 'done' : item.id === step ? 'active' : '';
                const dot = item.id < step ? '✓' : item.id;
                const line = index < steps.length - 1 ? '<div class="step-line"></div>' : '';
                return `
                  <div class="step ${stepClass}">
                    <span class="step-dot">${dot}</span>
                    <span>${item.label}</span>
                  </div>
                  ${line}
                `;
              })
              .join('')}
          </div>
        `;
      }

          </div>

        `;
      }

      function renderSuccess() {
        return `
          ${renderTopRow()}
          ${renderBrand()}
          ${renderStepper(3)}
          <div class="success-state">
            <div class="success-badge">✓</div>
          </div>
          <h3 class="card-title">密码修改成功</h3>
          <p class="card-copy">您的账号安全等级已提升，正在进入平台。</p>
          <div class="btn-stack">
            <button class="btn btn-primary" type="button" data-action="enter-platform">立即进入</button>
          </div>
        `;
      }

      function renderFallback() {
        const title = '无法接收验证码';
        const copy = '若您暂时无法通过当前邮箱接收验证码，或系统当前无法直接获取您的关联邮箱，请联系贵司管理员或平台客服协助处理。';
        const supportInfo = state.entryMessageType === 'support' ? renderSupportContactCard('联系我们') : '';
        const adminInfo = state.entryMessageType === 'admin'
          ? `<div class="info-banner success">${state.entryMessage}</div>`
          : '';

        return `
          ${renderTopRow()}
          ${renderBrand()}
          ${renderStepper(1)}
          <h3 class="card-title">${title}</h3>
          <p class="card-copy">${copy}</p>
          ${adminInfo}
          ${supportInfo}
          <div class="info-banner danger">
            为避免账号被冒用，本轮流程不支持在线自助改绑邮箱或手机号。
          </div>
          <div class="contact-card">
            <div class="contact-row">
              <div>
                <div class="contact-name">联系管理员</div>
                <div class="contact-copy">适用于租户管理员可协助核验身份、补绑邮箱或发起密码重置的场景。</div>
              </div>
              <button class="btn btn-secondary" type="button" data-link="admin">联系管理员</button>
            </div>
            <div class="contact-row">
              <div>
                <div class="contact-name">联系平台客服</div>
                <div class="contact-copy">适用于管理员不在线，或需平台协助确认绑定信息的场景，可通过热线、邮箱或官网获取支持。</div>
              </div>
              <button class="btn btn-secondary" type="button" data-link="support">联系平台客服</button>
            </div>
          </div>
          <div class="btn-stack">
            <button class="btn btn-primary" type="button" data-action="back-login">返回登录</button>
          </div>
        `;
      }

      function renderDashboard() {
        return `
          ${renderTopRow()}
          ${renderBrand()}
          <h3 class="card-title">已进入平台</h3>
          <p class="card-copy">${state.loginSuccess}</p>
          <div class="dashboard-card">
            <div style="font-size: 14px; font-weight: 600;">账号状态</div>
            <div class="dashboard-grid">
              <div class="dashboard-stat">
                <div class="helper-text">当前用户</div>
                <strong>${state.migration?.displayName || 'Olivia'}</strong>
              </div>
              <div class="dashboard-stat">
                <div class="helper-text">登录路径</div>
                <strong>${state.migration ? '升级后进入' : '直接登录'}</strong>
              </div>
              <div class="dashboard-stat">
                <div class="helper-text">安全状态</div>
                <strong>${state.migration ? '已升级' : '正常'}</strong>
              </div>
              <div class="dashboard-stat">
                <div class="helper-text">下一步</div>
                <strong>进入工作台</strong>
              </div>
            </div>
          </div>
          <div class="btn-stack">
            <button class="btn btn-secondary" type="button" data-action="back-login">返回登录页继续演示</button>
          </div>
        `;
      }

      function render() {
        let content = '';
        switch (state.view) {
          case 'upgrade-intro':
            content = renderUpgradeIntro();
            break;
          case 'reset-password':
            content = renderResetPassword();
            break;
          case 'success':
            content = renderSuccess();
            break;
          case 'fallback':
            content = renderFallback();
            break;
          case 'dashboard':
            content = renderDashboard();
            break;
          default:
            content = renderLogin();
            break;
        }

        app.innerHTML = content;
        bindEvents();
        updateVerifyCountdownUI();
        updatePasswordVisibilityUI();
      }

      function bindEvents() {
        const loginForm = document.querySelector('#login-form');
        if (loginForm) {
          loginForm.addEventListener('submit', handleLogin);
          loginForm.username.addEventListener('input', (event) => {
            state.username = event.target.value;
          });
          loginForm.password.addEventListener('input', (event) => {
            state.password = event.target.value;
          });
        }

        const resetForm = document.querySelector('#reset-form');
        if (resetForm) {
          resetForm.addEventListener('submit', handlePasswordSubmit);
          const linkedEmailInput = resetForm['linked-email'];
          if (linkedEmailInput) {
            linkedEmailInput.addEventListener('input', (event) => {
              state.linkedEmail = event.target.value;
              state.linkedEmailError = '';
            });
          }
          resetForm['verify-code'].addEventListener('input', (event) => {
            state.code = event.target.value;
            state.codeError = '';
          });
          resetForm['new-password'].addEventListener('input', (event) => {
            state.newPassword = event.target.value;
            state.resetError = '';
          });
          resetForm['confirm-password'].addEventListener('input', (event) => {
            state.confirmPassword = event.target.value;
            state.resetError = '';
          });
        }

        document.querySelectorAll('[data-demo-account]').forEach((button) => {
          button.addEventListener('click', () => {
            applyDemoAccount(button.dataset.demoAccount);
          });
        });

        document.querySelectorAll('[data-action]').forEach((button) => {
          button.addEventListener('click', () => {
            const action = button.dataset.action;
            if (action === 'back-login') backToLogin();
            if (action === 'start-upgrade') {
              state.view = 'reset-password';
              handleSendCode();
            }
            if (action === 'resend-code' && state.resendLeft === 0) handleSendCode();
            if (action === 'unable-receive') {
              stopResendCountdown();
              state.fallbackType = 'unable-receive';
              state.view = 'fallback';
              render();
            }
            if (action === 'email-mode-known') {
              stopResendCountdown();
              state.emailMode = 'known';
              state.linkedEmailError = '';
              state.codeHint = '';
              render();
            }
            if (action === 'email-mode-manual') {
              stopResendCountdown();
              state.emailMode = 'manual';
              state.codeHint = '';
              render();
            }
            if (action === 'enter-platform') {
              goDashboard('密码修改成功，账号安全等级已提升。');
            }
            if (action === 'session-expired') simulateSessionExpired();
            if (action === 'toggle-new-password') {
              state.showNewPassword = !state.showNewPassword;
              updatePasswordVisibilityUI();
              const input = document.querySelector('#new-password');
              if (input) input.focus({ preventScroll: true });
            }
            if (action === 'toggle-confirm-password') {
              state.showConfirmPassword = !state.showConfirmPassword;
              updatePasswordVisibilityUI();
              const input = document.querySelector('#confirm-password');
              if (input) input.focus({ preventScroll: true });
            }
          });
        });

        document.querySelectorAll('[data-link]').forEach((button) => {
          button.addEventListener('click', () => {
            const type = button.dataset.link;
            if (type === 'forgot') {
              state.loginError = '本 demo 仅演示老客户弱口令升级流程，忘记密码入口未展开。';
              render();
            }
            if (type === 'admin') {
              state.entryMessage = '请联系贵司管理员完成身份核验、绑定邮箱或发起密码重置。';
              state.entryMessageType = 'admin';
              render();
            }
            if (type === 'support') {
              state.entryMessage = `请通过平台通用联系方式获取协助：${SUPPORT_CONTACT.serviceHotline} / ${SUPPORT_CONTACT.serviceEmail} / ${SUPPORT_CONTACT.serviceWebsite}`;
              state.entryMessageType = 'support';
              render();
            }
          });
        });
      }

      render();
    </script>
  </body>
</html>
