<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录注册 - 国内/海外无密码方案 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #fff;
      --primary: #165DFF;
      --primary-light: #e8f0ff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --font-sans: 'Noto Sans SC', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

    .page-header {
      background: var(--card-bg);
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title { font-size: 18px; font-weight: 600; }
    .region-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .region-switch label { color: var(--text-muted); }
    .region-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .region-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .region-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    .main { max-width: 420px; margin: 24px auto; padding: 0 16px; }

    /* 手机端登录卡片 */
    .phone-frame {
      width: 100%;
      max-width: 375px;
      margin: 0 auto 24px;
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .phone-frame-inner { padding: 32px 24px 40px; }

    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-area .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    /* 登录/注册切换 */
    .auth-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--bg);
      padding: 4px;
      border-radius: 10px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .auth-tab.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    /* 国内登录区域 */
    .auth-section { display: none; }
    .auth-section.active { display: block; }

    .third-party-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .third-btn {
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all .2s;
    }
    .third-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .third-btn.wechat { color: #07c160; }
    .third-btn.qq { color: #12b7f5; }
    .third-btn.google { color: #ea4335; }
    .third-btn.facebook { color: #1877f2; }
    .third-btn.apple { color: #000; }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { padding: 0 12px; }

    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .input-with-btn {
      display: flex;
      gap: 8px;
    }
    .input-with-btn input { flex: 1; }
    .btn-code {
      padding: 12px 16px;
      border: 1px solid var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-code:hover { background: rgba(22,93,255,.15); }
    .btn-code.disabled { opacity: .6; cursor: not-allowed; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: .92; }

    .carrier-tip {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 12px;
      text-align: center;
    }
    .carrier-tip a { color: var(--primary); text-decoration: none; }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      font-size: 14px;
    }
    .footer-links a { color: var(--text-muted); text-decoration: none; }
    .footer-links a:hover { color: var(--primary); }

    .agreement {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 16px;
      text-align: center;
    }
    .agreement a { color: var(--primary); }

    /* 说明区 */
    .spec-note {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-top: 24px;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-muted);
    }
    .spec-note h3 { font-size: 15px; color: var(--text); margin-bottom: 12px; }
    .spec-note ul { padding-left: 20px; }
    .spec-note li { margin-bottom: 6px; }
  </style>
</head>
<body>
  <header class="page-header">
    <span class="page-title">登录注册 - 国内/海外无密码方案</span>
    <div class="region-switch">
      <label>地区切换（演示同一套代码）：</label>
      <button type="button" class="region-btn active" data-region="cn">国内</button>
      <button type="button" class="region-btn" data-region="overseas">海外</button>
    </div>
  </header>

  <main class="main">
    <div class="phone-frame">
      <div class="phone-frame-inner">
        <div class="logo-area">
          <div class="logo">VISBODY</div>
        </div>

        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-mode="login">登录</button>
          <button type="button" class="auth-tab" data-mode="register">注册</button>
        </div>

        <!-- 国内登录 -->
        <div class="auth-section active" id="section-cn-login">
          <div class="third-party-row">
            <button type="button" class="third-btn wechat" title="微信登录">微</button>
            <button type="button" class="third-btn qq" title="QQ登录">Q</button>
          </div>
          <div class="divider"><span>或</span></div>
          <div class="input-group">
            <label>手机号码</label>
            <div class="input-with-btn">
              <input type="tel" placeholder="请输入手机号" maxlength="11">
              <button type="button" class="btn-code">获取验证码</button>
            </div>
          </div>
          <button type="button" class="btn-primary">下一步</button>
          <p class="carrier-tip">支持 <a href="#">运营商一键登录</a>，免输验证码</p>
        </div>

        <!-- 海外登录 -->
        <div class="auth-section" id="section-overseas-login">
          <div class="third-party-row">
            <button type="button" class="third-btn google" title="Google">G</button>
            <button type="button" class="third-btn facebook" title="Facebook">f</button>
            <button type="button" class="third-btn apple" title="Apple">A</button>
          </div>
          <div class="divider"><span>或</span></div>
          <div class="input-group">
            <label>邮箱</label>
            <div class="input-with-btn">
              <input type="email" placeholder="请输入邮箱">
              <button type="button" class="btn-code">获取验证码</button>
            </div>
          </div>
          <button type="button" class="btn-primary">下一步</button>
        </div>

        <!-- 国内注册 -->
        <div class="auth-section" id="section-cn-register">
          <div class="input-group">
            <label>手机号码</label>
            <div class="input-with-btn">
              <input type="tel" placeholder="请输入手机号" maxlength="11">
              <button type="button" class="btn-code">获取验证码</button>
            </div>
          </div>
          <div class="input-group">
            <label>邀请码（选填）</label>
            <input type="text" placeholder="如有邀请码请输入">
          </div>
          <button type="button" class="btn-primary">注册</button>
          <p class="footer-links"><a href="#">已有账号？去登录</a></p>
        </div>

        <!-- 海外注册 -->
        <div class="auth-section" id="section-overseas-register">
          <div class="input-group">
            <label>邮箱</label>
            <div class="input-with-btn">
              <input type="email" placeholder="请输入邮箱">
              <button type="button" class="btn-code">获取验证码</button>
            </div>
          </div>
          <button type="button" class="btn-primary">注册</button>
          <p class="footer-links"><a href="#">已有账号？去登录</a></p>
        </div>

        <p class="agreement">登录即表示同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>
      </div>
    </div>

    <div class="spec-note">
      <h3>需求说明（修改后）</h3>
      <ul>
        <li>国内：微信、手机验证码、运营商一键登录；<strong>无密码</strong></li>
        <li>海外：Google/Facebook/Apple、邮箱验证码；<strong>无密码</strong>，避免高成本短信</li>
        <li>注册：不要求设置密码，验证码或第三方授权即可完成</li>
        <li>同一套代码：通过地区标识动态渲染不同登录选项</li>
      </ul>
    </div>
  </main>

  <script>
    (function () {
      var region = 'cn';
      var mode = 'login';

      function showSection() {
        var id = 'section-' + region + '-' + mode;
        document.querySelectorAll('.auth-section').forEach(function (el) {
          el.classList.toggle('active', el.id === id);
        });
      }

      document.querySelectorAll('.region-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          region = this.dataset.region;
          document.querySelectorAll('.region-btn').forEach(function (b) { b.classList.remove('active'); });
          this.classList.add('active');
          showSection();
        });
      });

      document.querySelectorAll('.auth-tab').forEach(function (tab) {
        tab.addEventListener('click', function () {
          mode = this.dataset.mode;
          document.querySelectorAll('.auth-tab').forEach(function (t) { t.classList.remove('active'); });
          this.classList.add('active');
          showSection();
        });
      });

      document.querySelectorAll('.btn-code').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (this.classList.contains('disabled')) return;
          this.classList.add('disabled');
          this.textContent = '60s 后重发';
          var n = 60;
          var t = setInterval(function () {
            n--;
            btn.textContent = n + 's 后重发';
            if (n <= 0) {
              clearInterval(t);
              btn.classList.remove('disabled');
              btn.textContent = '获取验证码';
            }
          }, 1000);
        });
      });

      document.querySelectorAll('.btn-primary').forEach(function (btn) {
        btn.addEventListener('click', function () {
          alert('Demo 演示：实际接入需对接后端认证接口');
        });
      });

      document.querySelectorAll('.third-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          alert('Demo 演示：第三方登录需接入对应 SDK');
        });
      });
    })();
  </script>
</body>
</html>
