<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WellnessHub 多角色运营分析</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-2: #fbfcfe;
      --line: #e6ebf2;
      --line-strong: #d7dfea;
      --text: #1f2937;
      --sub: #667085;
      --muted: #94a3b8;
      --blue: #2563eb;
      --blue-soft: rgba(37, 99, 235, 0.08);
      --teal: #0f766e;
      --teal-soft: rgba(15, 118, 110, 0.08);
      --green: #16a34a;
      --green-soft: rgba(22, 163, 74, 0.08);
      --orange: #d97706;
      --orange-soft: rgba(217, 119, 6, 0.08);
      --red: #dc2626;
      --red-soft: rgba(220, 38, 38, 0.08);
      --purple: #4f46e5;
      --purple-soft: rgba(79, 70, 229, 0.08);
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 236px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(180deg, #2f6bf5, #2455dd);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
    }

    .brand-title {
      font-size: 15px;
      font-weight: 700;
    }

    .brand-sub {
      margin-top: 2px;
      font-size: 12px;
      color: var(--sub);
    }

    .side-section-title {
      padding: 0 8px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .side-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--sub);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .side-btn:hover {
      background: #f3f6fc;
      color: var(--text);
    }

    .side-btn.active {
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 600;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .side-meta {
      font-size: 12px;
      color: inherit;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .global-bar {
      min-height: 52px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .crumbs {
      font-size: 13px;
      color: var(--sub);
    }

    .global-right,
    .workspace-status,
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tiny-pill,
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      font-weight: 600;
    }

    .tiny-pill {
      padding: 4px 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--sub);
      font-size: 12px;
    }

    .workspace-head {
      padding: 20px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .page-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .page-sub {
      margin-top: 6px;
      color: var(--sub);
      font-size: 13px;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px 18px;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filter-bar .primary-btn {
      margin-left: auto;
    }

    .segmented {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f3f6fb;
      padding: 3px;
    }

    .segmented button {
      height: 38px;
      border: 0;
      background: transparent;
      color: var(--sub);
      padding: 0 12px;
      border-radius: 8px;
    }

    .segmented button.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      font-weight: 600;
    }

    .ghost-btn,
    .primary-btn,
    .search-box,
    .select-box {
      height: 40px;
      border-radius: 10px;
    }

    .ghost-btn,
    .primary-btn {
      border: 1px solid var(--line);
      padding: 0 14px;
      background: var(--panel);
      color: var(--text);
    }

    .primary-btn {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .search-box,
    .select-box {
      border: 1px solid var(--line);
      padding: 0 12px;
      background: var(--panel);
      color: var(--text);
    }

    .search-box {
      min-width: 280px;
      flex: 1 1 280px;
    }

    .select-box {
      min-width: 160px;
    }

    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .panel,
    .detail-panel,
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h3,
    .detail-panel h3,
    .mini-card h4,
    .chart-card h4,
    .empty h4,
    .locked-block h4 {
      margin: 0;
    }

    .panel-head p,
    .detail-panel p,
    .mini-card p,
    .chart-card p,
    .empty p,
    .locked-block p {
      margin: 4px 0 0;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
    }

    .panel-body {
      padding: 18px;
    }

    .panel-body.flush {
      padding: 0;
    }

    .stat-strip {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      grid-column: span 3;
      padding: 16px;
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    .stat-card.clickable:hover {
      border-color: #bfd2ff;
      transform: translateY(-1px);
    }

    .stat-card.active {
      border-color: var(--blue);
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.14);
    }

    .stat-card.locked {
      background: linear-gradient(180deg, #fafbfd, #f6f8fb);
      border-style: dashed;
    }

    .label {
      font-size: 12px;
      color: var(--sub);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .value {
      margin-top: 2px;
      font-size: 30px;
      line-height: 1;
      font-weight: 700;
    }

    .delta {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--sub);
    }

    .delta strong {
      color: var(--text);
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--sub);
    }

    .card-link {
      color: var(--blue);
      font-weight: 600;
    }

    .pill {
      padding: 4px 8px;
      font-size: 11px;
    }

    .pill.blue { color: var(--blue); background: var(--blue-soft); }
    .pill.teal { color: var(--teal); background: var(--teal-soft); }
    .pill.green { color: var(--green); background: var(--green-soft); }
    .pill.orange { color: var(--orange); background: var(--orange-soft); }
    .pill.red { color: var(--red); background: var(--red-soft); }
    .pill.purple { color: var(--purple); background: var(--purple-soft); }
    .pill.gray { color: #475569; background: #eef2f7; }

    .panel-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 336px;
      gap: 16px;
      align-items: start;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .chart-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-2);
      padding: 16px;
    }

    .chart-legend {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: 12px;
      color: var(--sub);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
    }

    .group-chart {
      margin-top: 18px;
      height: 230px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
    }

    .group-col {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .group-bars {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
    }

    .bar-wrap {
      width: 28%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .bar-value {
      font-size: 11px;
      color: var(--sub);
      white-space: nowrap;
    }

    .bar {
      width: 100%;
      min-height: 8px;
      border-radius: 8px 8px 0 0;
    }

    .axis-label {
      font-size: 12px;
      color: var(--sub);
    }

    .rank-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .rank-item {
      display: grid;
      grid-template-columns: 160px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .rank-name {
      font-size: 13px;
      font-weight: 600;
    }

    .bar-track {
      height: 10px;
      background: #eef2f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .rank-value {
      font-size: 12px;
      color: var(--sub);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-card,
    .focus-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-2);
      padding: 14px;
    }

    .focus-card {
      cursor: pointer;
      transition: border-color 0.16s ease, transform 0.16s ease;
    }

    .focus-card:hover {
      border-color: #bfd2ff;
      transform: translateY(-1px);
    }

    .focus-card.active {
      border-color: var(--blue);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 40;
    }

    .modal {
      width: min(620px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      overflow: hidden;
    }

    .modal-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head h3,
    .toast strong {
      margin: 0;
    }

    .modal-head p,
    .toast p {
      margin: 6px 0 0;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal-body {
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .field-tags span {
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f6fb;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--sub);
    }

    .modal-actions {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 320px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
      z-index: 45;
    }

    .focus-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .focus-sub {
      margin-top: 8px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
    }

    .detail-panel {
      padding: 18px;
      position: sticky;
      top: 24px;
    }

    .detail-panel .sub {
      margin-top: 6px;
      color: var(--sub);
      font-size: 12px;
    }

    .detail-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .detail-title {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 8px;
    }

    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 8px 0;
      font-size: 13px;
      color: var(--sub);
    }

    .kv strong {
      color: var(--text);
      font-weight: 600;
    }

    .bullet-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bullet {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.5;
    }

    .bullet i {
      width: 8px;
      height: 8px;
      margin-top: 6px;
      border-radius: 999px;
      background: var(--blue);
      flex: 0 0 8px;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
      white-space: nowrap;
    }

    th {
      color: var(--sub);
      font-weight: 600;
      background: #fbfcfe;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.16s ease;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    tbody tr.selected {
      background: #f1f6ff;
    }

    .cell-sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .section-kicker {
      font-size: 12px;
      color: var(--sub);
    }

    .rule-line {
      margin-top: 6px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .status-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-2);
      padding: 14px;
    }

    .status-card strong {
      display: block;
      font-size: 14px;
    }

    .status-card span {
      display: block;
      margin-top: 6px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.5;
    }

    .empty,
    .locked-block {
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      padding: 22px 18px;
      background: #fbfcfe;
      text-align: center;
    }

    .empty p,
    .locked-block p {
      margin-top: 8px;
    }

    .skeletons {
      display: grid;
      gap: 16px;
    }

    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .skeleton-card,
    .skeleton-panel {
      border-radius: 14px;
      background: linear-gradient(90deg, #eff3f8 25%, #f7f9fc 37%, #eff3f8 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s ease infinite;
      border: 1px solid var(--line);
    }

    .skeleton-card {
      height: 132px;
    }

    .skeleton-panel {
      height: 360px;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }

    @media (max-width: 1280px) {
      .stat-card { grid-column: span 4; }
      .panel-grid { grid-template-columns: 1fr; }
      .detail-panel { position: static; }
    }

    @media (max-width: 980px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .workspace-head { flex-direction: column; }
      .stat-card { grid-column: span 6; }
      .two-col,
      .mini-grid,
      .status-grid { grid-template-columns: 1fr; }
      .skeleton-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .group-chart { grid-template-columns: repeat(3, minmax(0, 1fr)); height: auto; }
      .group-bars { height: 140px; }
      .filter-bar .primary-btn { margin-left: 0; }
      .modal-backdrop { padding: 16px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const roles = {
      hq: {
        label: "总部端 PC",
        pages: [
          { key: "overview", label: "经营总览" },
          { key: "stores", label: "门店分析" }
        ]
      },
      owner: {
        label: "馆主端 PC",
        pages: [
          { key: "overview", label: "经营总览" },
          { key: "analysis", label: "经营分析" }
        ]
      },
      coach: {
        label: "教练端 PC",
        pages: [
          { key: "workbench", label: "工作台" },
          { key: "members", label: "会员工作" }
        ]
      }
    };

    const hqStores = [
      { id: "st1", name: "静安旗舰店", group: "华东", tier: "pro", measuredTotal: 4200, newMeasured: 302, activeUsers: 1740, retestUsers: 320, eligibleRetest: 1380, riskUsers: 180, unassignedUsers: 60, dueRetest: 34, pendingBind: 4, archiveCompletePct: 91, aiUsers: 970, proUsers: 1500, outlineUsers: 780, deviceUtilization: 76, status: "标杆门店", tone: "green", peak: "18:00-20:00" },

            ${labels.map((label, index) => `

                <div class="group-bars">
                  ${series.map((item) => {
                    const value = item.values[index];
                    const height = Math.max(12, value / max * 150);

                    `;

                </div>
                <div class="axis-label">${label}</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;

            return `

    function renderTable(columns, rows, selectedId, tableKey) {
      return `

            <tbody>

              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function ensureSelected(pageKey, rows) {
      const current = state.selected[pageKey];
      if (rows.some((item) => item.id === current)) return current;
      const fallback = rows[0] ? rows[0].id : "";
      state.selected[pageKey] = fallback;
      return fallback;

    function ownerCoachSummary(users) {
      const map = {};
      users.filter((item) => item.coach !== "未分配").forEach((item) => {
        if (!map[item.coach]) {
          map[item.coach] = { id: item.coach, name: item.coach, total: 0, retested: 0, eligibleRetest: 0, dueRetest: 0, active: 0 };
        }
        const row = map[item.coach];
        row.total += 1;
        if (item.retested) row.retested += 1;
        if (item.eligibleRetest) row.eligibleRetest += 1;
        if (item.dueRetest) row.dueRetest += 1;
        if (item.active) row.active += 1;
      });
      return Object.values(map).map((item) => ({
        ...item,
        retestRate: item.eligibleRetest ? item.retested / item.eligibleRetest * 100 : 0
      }));
    }

    function csvEscape(value) {
      const text = String(value == null ? "" : value).replace(/"/g, '""');
      return '"' + text + '"';
    }

    function buildCsv(context) {
      const metaLines = [
        ["视图", roles[state.role].label + " / " + pageMeta().label],
        ["导出内容", context.title],
        ["筛选条件", exportFiltersSummary()],
        ["导出时间", "2026-04-11 14:20:00"]
      ].map((line) => line.map(csvEscape).join(","));

      const headers = context.columns.map((column) => csvEscape(column.label)).join(",");
      const rows = context.rows.map((row) => context.columns.map((column) => csvEscape(stripHtml(column.render(row)))).join(","));
      return "\ufeff" + metaLines.join("\n") + "\n\n" + headers + "\n" + rows.join("\n");
    }

    function triggerCsvDownload(filename, content) {
      const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    function showToast(title, text) {
      state.toast = { title, text };
      render();
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        state.toast = "";
        render();
      }, 2600);
    }

    function renderExportModal() {
      const context = currentExportContext();
      return `
        <div class="modal-backdrop" data-action="close-export">
          <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-head">
              <div>
                <h3>导出当前视图</h3>
                <p>导出当前页面正在查看的明细表，格式为 CSV。</p>
              </div>
              <button class="ghost-btn" data-action="close-export">关闭</button>
            </div>
            <div class="modal-body">
              <div class="kv"><span>页面</span><strong>${roles[state.role].label} / ${pageMeta().label}</strong></div>
              <div class="kv"><span>导出内容</span><strong>${context.title}</strong></div>
              <div class="kv"><span>筛选条件</span><strong>${exportFiltersSummary()}</strong></div>
              <div class="kv"><span>数据条数</span><strong>${context.rows.length} 条</strong></div>
              <div>
                <div class="section-kicker">导出字段</div>
                <div class="field-tags">${context.columns.map((column) => "<span>" + column.label + "</span>").join("")}</div>
              </div>
            </div>
            <div class="modal-actions">
              <button class="ghost-btn" data-action="close-export">取消</button>
              <button class="primary-btn" data-action="confirm-export">确认导出</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderToast() {
      if (!state.toast) return "";
      return `
        <div class="toast">
          <strong>${state.toast.title}</strong>
          <p>${state.toast.text}</p>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <div class="app-shell">
          ${renderSidebar()}
          <main class="main">
            <div class="global-bar">
              <div class="crumbs">Visbody WellnessHub / 运营分析 / ${pageMeta().label}</div>
              <div class="global-right">
                <span class="tiny-pill">${roles[state.role].label}</span>
                <div class="segmented">
                  <button class="${state.tier === "basic" ? "active" : ""}" data-tier-switch="basic">非 Pro</button>
                  <button class="${state.tier === "pro" ? "active" : ""}" data-tier-switch="pro">Pro</button>
                </div>
                <button class="ghost-btn" data-action="refresh">刷新</button>
              </div>
            </div>
            ${renderTopbar()}
            <div class="content">
              ${state.loading ? renderLoading() : currentContent()}
            </div>
          </main>
        </div>
        ${state.exportModal ? renderExportModal() : ""}
        ${renderToast()}
      `;
      syncFilters();
    }

    function syncFilters() {
      document.querySelectorAll("[data-filter='group']").forEach((node) => node.value = state.group);
      document.querySelectorAll("[data-filter='coach']").forEach((node) => node.value = state.coach);
    }

    document.addEventListener("click", (event) => {
      const roleBtn = event.target.closest("[data-role-switch]");
      if (roleBtn) {
        const nextRole = roleBtn.dataset.roleSwitch;
        if (nextRole !== state.role) {
          setLoading(() => {
            state.role = nextRole;
            state.page = roles[nextRole].pages[0].key;
            state.search = "";
          });
        }
        return;
      }

      const pageBtn = event.target.closest("[data-page-switch]");
      if (pageBtn) {
        const nextPage = pageBtn.dataset.pageSwitch;
        if (nextPage !== state.page) {
          setLoading(() => state.page = nextPage);
        }
        return;
      }

      const tierBtn = event.target.closest("[data-tier-switch]");
      if (tierBtn) {
        const nextTier = tierBtn.dataset.tierSwitch;
        if (nextTier !== state.tier) {
          setLoading(() => state.tier = nextTier);
        }
        return;
      }

      const dateBtn = event.target.closest("[data-date-switch]");
      if (dateBtn) {
        const nextDate = dateBtn.dataset.dateSwitch;
        if (nextDate !== state.date) {
          setLoading(() => state.date = nextDate);
        }
        return;
      }

      const drillBtn = event.target.closest("[data-drill]");
      if (drillBtn) {
        const page = pageId();
        state.activeDrill[page] = drillBtn.dataset.drill;
        render();
        return;
      }

      const rowBtn = event.target.closest("[data-select-table]");
      if (rowBtn) {
        const table = rowBtn.dataset.selectTable;
        const id = rowBtn.dataset.id;
        state.selected[table] = id;
        render();
        return;
      }

      const refreshBtn = event.target.closest("[data-action='refresh']");
      if (refreshBtn) {
        setLoading(() => {});
        return;
      }

      const exportBtn = event.target.closest("[data-action='export']");
      if (exportBtn) {
        state.exportModal = true;
        render();
        return;
      }

      const closeExportBtn = event.target.closest("[data-action='close-export']");
      if (closeExportBtn) {
        state.exportModal = false;
        render();
        return;
      }

      const confirmExportBtn = event.target.closest("[data-action='confirm-export']");
      if (confirmExportBtn) {
        const context = currentExportContext();
        const filename = context.fileKey + "-" + state.date + "-20260411-142000.csv";
        triggerCsvDownload(filename, buildCsv(context));
        state.exportModal = false;
        showToast("导出已开始", "已导出“" + context.title + "”，共 " + context.rows.length + " 条。");
      }
    });

    document.addEventListener("input", (event) => {
      const field = event.target.dataset.filter;
      if (field === "search") {
        state.search = event.target.value.trim();
        render();
      }
    });

    document.addEventListener("change", (event) => {
      const field = event.target.dataset.filter;
      if (!field || field === "search") return;
      state[field] = event.target.value;
      render();
    });

    render();
  </script>
</body>
</html>
