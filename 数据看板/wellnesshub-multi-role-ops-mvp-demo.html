    modalMask.addEventListener("click",e=>{if(e.target===modalMask||e.target.closest("[data-close]")){modalMask.classList.remove("show");modalMask.innerHTML="";return}if(e.target.closest("[data-confirm-export]")){const keys=[...modalMask.querySelectorAll("[data-export-key]:checked")].map(node=>node.dataset.exportKey),format=modalMask.querySelector("[data-export-format]:checked")?.value||state.exportFormat;modalMask.classList.remove("show");modalMask.innerHTML="";createExportTask(keys,format)}});
    modalMask.addEventListener("change",e=>{if(e.target.closest("[data-export-key]")||e.target.closest("[data-export-format]"))refreshExportSummary()});
    drawerMask.addEventListener("click",e=>{if(e.target===drawerMask||e.target.closest("[data-drawer-close]")){drawerState=null;drawerMask.classList.remove("show");drawerMask.innerHTML="";return}if(e.target.closest("[data-drawer-export]")){const format=drawerMask.dataset.exportFormat||state.exportFormat;triggerDownload(format,[{title:drawerState.title,rule:drawerState.rule,cols:drawerState.cols,rows:drawerState.rows}],drawerMask.dataset.exportName||`${drawerState?.title||"导出"}-${filenameStamp()}`);return}if(e.target.closest("[data-drawer-prev]")){const pages=Math.max(1,Math.ceil(drawerState.rows.length/drawerState.pageSize));drawerState.pageNo=Math.max(1,drawerState.pageNo-1);drawerState.pageNo=Math.min(drawerState.pageNo,pages);renderDrawer();return}if(e.target.closest("[data-drawer-next]")){const pages=Math.max(1,Math.ceil(drawerState.rows.length/drawerState.pageSize));drawerState.pageNo=Math.min(pages,drawerState.pageNo+1);renderDrawer();return}if(e.target.closest("[data-task-download]")){const node=e.target.closest("[data-task-download]"),task=exportTasks.find(item=>item.id===node.dataset.taskDownload);if(task)triggerDownload(task.format==="Excel"?"excel":"csv",exportSections(task.keys),task.fileBase)}});
    render();
  </script>
</body>
</html>
