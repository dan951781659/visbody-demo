<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WellnessHub 多角色运营看板</title>
  <style>
    :root{
      --bg:#f5f7fb;--panel:#fff;--line:#e5ebf3;--line-strong:#d8e1ee;
      --text:#172033;--sub:#667085;--muted:#98a2b3;--blue:#2563eb;
      --blue-soft:#edf4ff;--green:#16a34a;--green-soft:#ecfdf3;--orange:#d97706;
      --orange-soft:#fff6e7;--red:#dc2626;--red-soft:#fff1f1;--teal:#0f766e;
      --teal-soft:#ecfdfb;--purple:#7c3aed;--purple-soft:#f4f0ff;--shadow:0 14px 36px rgba(15,23,42,.06);
      --chart-blue:#3b82f6;--chart-cyan:#14b8a6;--chart-emerald:#22c55e;--chart-amber:#f59e0b;
      --chart-violet:#8b5cf6;--chart-rose:#fb7185;--chart-slate:#64748b;--chart-indigo:#6366f1;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.09), transparent 24%),
        radial-gradient(circle at top right, rgba(20,184,166,.08), transparent 18%),
        linear-gradient(180deg,#f7faff 0%, #f4f7fb 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app{display:grid;grid-template-columns:248px minmax(0,1fr);min-height:100vh}
    .sidebar{background:linear-gradient(180deg,#fff 0%, #fbfcff 100%);border-right:1px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;gap:24px}
    .brand{display:flex;gap:12px;align-items:center;padding:8px}
    .brand-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#38bdf8);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:0 12px 22px rgba(37,99,235,.22)}
    .brand-title{font-size:15px;font-weight:800;line-height:1.2}.brand-sub{margin-top:3px;font-size:12px;color:var(--sub)}
    .side-title{font-size:12px;color:var(--muted);padding:0 8px;margin-bottom:8px}
    .nav-list{display:flex;flex-direction:column;gap:6px}
    .side-btn{width:100%;border:0;background:transparent;color:#475467;border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:space-between;text-align:left}
    .side-btn:hover{background:#f3f6fb}.side-btn.active{background:var(--blue-soft);color:var(--blue);font-weight:700}
    .side-left{display:flex;align-items:center;gap:10px}.dot{width:8px;height:8px;border-radius:50%;background:currentColor}
    .main{min-width:0}
    .global-bar{height:56px;background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid rgba(229,235,243,.9);padding:0 26px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .crumbs{font-size:13px;color:#667085}.global-right,.toolbar,.filters,.top-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .tiny-pill,.pill{display:inline-flex;align-items:center;border-radius:999px;font-weight:700}
    .tiny-pill{height:28px;padding:0 11px;border:1px solid var(--line);background:#fff;color:#667085;font-size:12px}
    .segmented{display:inline-flex;border:1px solid var(--line);background:#f7f9fd;border-radius:10px;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
    .segmented button{border:0;background:transparent;color:#667085;height:36px;padding:0 14px;font-weight:700}
    .segmented .active{background:#fff;color:#172033;box-shadow:0 1px 2px rgba(15,23,42,.05)}
    .ghost-btn,.primary-btn{height:38px;padding:0 16px;border-radius:8px;border:1px solid var(--line);background:#fff;color:#172033;font-weight:700}
    .primary-btn{border-color:#2563eb;background:#2563eb;color:#fff;box-shadow:0 8px 18px rgba(37,99,235,.18)}
    .topbar{background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);border-bottom:1px solid var(--line);padding:18px 26px;display:flex;flex-direction:column;gap:14px}
    .page-title{margin:0;font-size:24px;font-weight:800}.page-sub{margin:5px 0 0;color:#667085;font-size:13px}
    .search-box,.select-box{height:40px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 14px;outline:none;color:#172033}
    .search-box{min-width:420px;flex:1}.select-box{min-width:170px}
    .content{padding:22px 26px 32px}
    .stat-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}
    .zone{margin-bottom:18px}
    .zone+.zone{margin-top:10px}
    .zone-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin:0 0 14px}
    .zone-head h2{margin:0;font-size:18px;line-height:1.2}
    .zone-head p{margin:6px 0 0;font-size:13px;color:#667085}
    .zone-time{padding:18px 18px 14px;border:1px solid rgba(191,211,240,.82);border-radius:18px;background:linear-gradient(180deg,rgba(245,249,255,.92) 0%, rgba(255,255,255,.98) 100%);box-shadow:0 16px 30px rgba(15,23,42,.05)}
    .zone-snapshot{padding:18px;border:1px solid rgba(229,235,243,.95);border-radius:18px;background:linear-gradient(180deg,#fff 0%, #fcfdff 100%);box-shadow:var(--shadow)}
    .zone-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .zone-controls .date-range{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:0 10px;height:40px;box-shadow:0 8px 16px rgba(15,23,42,.03)}
    .zone-controls .date-range input{border:0;outline:0;color:#172033;background:transparent}
    .zone-controls .date-range span{color:#98a2b3}
    .stat-card{
      border:1px solid #dde6f0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(250,252,255,.98) 100%);
      border-radius:18px;
      min-height:128px;
      padding:16px 16px 14px 18px;
      text-align:left;
      box-shadow:0 10px 24px rgba(15,23,42,.045);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
      transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    .stat-card::before{
      content:"";
      position:absolute;
      left:0;
      top:16px;
      bottom:16px;
      width:4px;
      border-radius:0 999px 999px 0;
      background:var(--accent,#2563eb);
      opacity:.72;
    }
    .stat-card::after{
      content:"";
      position:absolute;
      right:-20px;
      top:-18px;
      width:88px;
      height:88px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(37,99,235,.06) 0%, rgba(37,99,235,0) 70%);
      pointer-events:none;
    }
    .stat-card:hover{transform:translateY(-2px);border-color:#c8d9ff;box-shadow:0 16px 30px rgba(15,23,42,.075);background:#fff}
    .stat-card.active{outline:2px solid rgba(37,99,235,.14);border-color:#c8d9ff;transform:translateY(-1px)}
    .stat-card[data-tone="blue"]{--accent:#2563eb}
    .stat-card[data-tone="green"]{--accent:#16a34a}
    .stat-card[data-tone="orange"]{--accent:#d97706}
    .stat-card[data-tone="red"]{--accent:#dc2626}
    .stat-card[data-tone="teal"]{--accent:#0f766e}
    .stat-card[data-tone="purple"]{--accent:#7c3aed}
    .stat-card[data-tone="gray"]{--accent:#64748b}
    .stat-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .stat-label{font-size:13px;color:#475467;font-weight:800;letter-spacing:.01em}
    .stat-value{font-size:34px;font-weight:900;margin-top:12px;letter-spacing:-.02em;line-height:1}
    .stat-sub{margin-top:10px;font-size:12px;color:#667085;line-height:1.4}
    .pill{height:24px;padding:0 10px;font-size:12px;border:1px solid transparent;box-shadow:0 6px 12px rgba(15,23,42,.04)}
    .pill.gray{background:#f2f4f7;color:#475467}
    .pill.blue{background:var(--blue-soft);color:#2563eb}
    .pill.green{background:var(--green-soft);color:#16a34a}
    .pill.orange{background:var(--orange-soft);color:#d97706}
    .pill.red{background:var(--red-soft);color:#dc2626}
    .pill.teal{background:var(--teal-soft);color:#0f766e}
    .pill.purple{background:var(--purple-soft);color:#7c3aed}
    .grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(340px,.9fr);gap:16px;align-items:start}.stack{display:flex;flex-direction:column;gap:16px}
    .panel{background:linear-gradient(180deg,#fff 0%, #fcfdff 100%);border:1px solid rgba(229,235,243,.95);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
    .panel-title{padding:18px 18px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .panel-title h3{margin:0;font-size:18px}.panel-title p{margin:6px 0 0;color:#667085;font-size:13px}
    .panel-body{padding:18px}.panel-body.flush{padding:0}
    .table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:14px 18px;text-align:left;font-size:13px;white-space:nowrap}th{background:linear-gradient(180deg,#f8fbff 0%, #f4f7fb 100%);color:#475467;font-weight:800}tbody tr{cursor:pointer}tbody tr:hover,tbody tr.selected{background:#f5f9ff}
    .detail{position:sticky;top:16px;background:linear-gradient(180deg,#fff 0%, #fcfdff 100%);border:1px solid rgba(229,235,243,.95);border-radius:14px;box-shadow:var(--shadow);padding:18px}
    .detail h3{margin:0;font-size:20px}.subline{margin-top:5px;color:#667085;font-size:13px}.detail-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
    .kv{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px dashed #edf1f7}.kv:last-child{border-bottom:0}.kv span{font-size:13px;color:#667085}.kv strong{text-align:right;font-size:13px}
    .action-list{display:flex;flex-direction:column;gap:8px}.action-line{display:flex;gap:9px;font-size:13px;line-height:1.6}.action-line i{width:7px;height:7px;border-radius:50%;background:#2563eb;margin-top:8px;flex:none}
    .mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .service-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    .mini{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);padding:16px;text-align:left;box-shadow:0 8px 20px rgba(15,23,42,.03);position:relative;overflow:hidden}.mini::before{content:"";position:absolute;inset:0 auto auto 0;width:100%;height:3px;background:linear-gradient(90deg, rgba(37,99,235,.9), rgba(20,184,166,.7));opacity:.18}.mini.clickable{cursor:pointer}.mini.clickable:hover{border-color:#c8d9ff;background:#f8fbff;transform:translateY(-1px)}.mini h4{margin:0;font-size:16px}.mini p{margin:8px 0 0;color:#667085;font-size:13px}
    .chart-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .bar-list{display:flex;flex-direction:column;gap:12px}
    .bar-row{display:grid;grid-template-columns:92px minmax(0,1fr) 34px;align-items:center;gap:10px;cursor:pointer;padding:2px 0}
    .bar-row:hover .bar{filter:saturate(1.08) brightness(1.01)}
    .bar-label{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
    .bar-label::before{content:"";width:8px;height:8px;border-radius:999px;background:var(--swatch,var(--chart-blue));box-shadow:0 0 0 4px rgba(37,99,235,.08)}
    .bar-track{height:12px;background:linear-gradient(90deg,#eef3f9,#f5f8fc);border-radius:999px;overflow:hidden;position:relative}
    .bar-track::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg, rgba(255,255,255,.18), transparent);pointer-events:none}
    .bar{height:100%;border-radius:999px;background:var(--bar-color,var(--chart-blue));box-shadow:0 8px 16px color-mix(in srgb, var(--bar-color,var(--chart-blue)) 22%, transparent);position:relative;overflow:hidden}
    .bar::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,.16), transparent 55%);pointer-events:none}
    .trend-wrap{display:flex;flex-direction:column;gap:10px}
    .trend-topline{display:flex;align-items:center;justify-content:space-between;gap:12px;color:#667085;font-size:12px;padding:0 2px}
    .trend{display:flex;align-items:flex-end;gap:9px;height:176px;padding-top:18px;padding-bottom:4px}
    .trend-btn{flex:1;border:0;background:transparent;height:100%;display:flex;align-items:flex-end;padding:0}
    .trend-bar{width:100%;border-radius:12px 12px 6px 6px;background:var(--series,var(--chart-blue));position:relative;box-shadow:0 10px 20px color-mix(in srgb, var(--series,var(--chart-blue)) 18%, transparent);overflow:hidden}
    .trend-bar::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,.14), transparent 55%);pointer-events:none}
    .trend-bar span{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      font-size:12px;
      font-weight:800;
      color:#fff;
      background:rgba(15,23,42,.18);
      padding:2px 8px;
      border-radius:999px;
      line-height:1.4;
      backdrop-filter:blur(4px);
      white-space:nowrap;
    }
    .trend-axis{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:9px;font-size:12px;color:#667085}
    .trend-axis span{text-align:center}
    .pie-grid{display:grid;grid-template-columns:220px minmax(0,1fr);gap:16px;align-items:center}
    .pie-wrap{display:flex;align-items:center;justify-content:center}
    .pie-chart{width:168px;height:168px;border-radius:50%;position:relative;box-shadow:0 16px 28px rgba(15,23,42,.08)}
    .pie-chart::after{content:"";position:absolute;inset:28px;border-radius:50%;background:#fff;box-shadow:inset 0 0 0 1px rgba(229,235,243,.95)}
    .pie-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:1;text-align:center;pointer-events:none}
    .pie-center strong{font-size:24px;line-height:1}
    .pie-center span{margin-top:4px;font-size:12px;color:#667085}
    .legend-list{display:flex;flex-direction:column;gap:10px}
    .legend-item{display:grid;grid-template-columns:16px minmax(0,1fr) auto;gap:10px;align-items:center;font-size:13px;cursor:pointer;padding:6px 0;border:0;background:transparent;width:100%;text-align:left}
    .legend-dot{width:10px;height:10px;border-radius:999px;box-shadow:0 0 0 4px rgba(37,99,235,.08);background:var(--legend,#2563eb)}
    .legend-item:hover{color:#172033}
    .legend-item strong{font-size:13px}
    .legend-item span{color:#667085;font-size:12px}
    .legend-dot{cursor:pointer}
    .status-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.status-card{border:1px solid var(--line);border-radius:12px;padding:15px;background:linear-gradient(180deg,#fff 0%, #fcfdff 100%);cursor:pointer;box-shadow:0 8px 20px rgba(15,23,42,.03)}.status-card:hover{border-color:#c8d9ff;background:#f8fbff}.status-card strong{display:block;font-size:13px;color:#475467}.status-card span{display:block;margin-top:10px;font-size:24px;font-weight:850}
    .empty{padding:24px;color:#667085}
    .pager{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;border-top:1px solid var(--line);background:#fbfcff;color:#667085;font-size:13px}
    .pager-actions{display:flex;gap:8px}
    .pager button{height:32px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 12px;font-weight:700}
    .pager button:disabled{opacity:.45;cursor:not-allowed}
    .date-range{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 10px;height:40px}
    .date-range input{border:0;outline:0;color:#172033;background:transparent}
    .date-range span{color:#98a2b3}
    .export-list{display:flex;flex-direction:column;gap:10px}
    .export-item{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff}
    .export-item input{margin-top:3px}
    .export-item strong{display:block;font-size:14px}
    .export-item span{display:block;margin-top:4px;color:#667085;font-size:12px}
    .modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.32);display:none;align-items:center;justify-content:center;padding:20px;z-index:80}
    .modal-mask.show{display:flex}
    .modal{width:min(1100px,100%);max-height:88vh;background:#fff;border-radius:16px;box-shadow:0 24px 48px rgba(15,23,42,.18);overflow:hidden;display:flex;flex-direction:column}
    .modal-head,.modal-foot{padding:16px 20px;border-bottom:1px solid var(--line)}
    .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .modal-foot{border-bottom:0;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
    .modal-body{padding:16px 20px;overflow:auto}
    .export-layout{display:grid;grid-template-columns:minmax(0,1.35fr) 320px;gap:16px;align-items:start}
    .export-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .export-summary{position:sticky;top:0;border:1px solid var(--line);border-radius:14px;background:#fbfcff;padding:14px}
    .export-summary h4{margin:0 0 10px;font-size:15px}
    .export-summary .kv{padding:9px 0}
    .export-format{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#f7f9fd}
    .export-format label{padding:8px 12px;font-weight:700;color:#667085;display:flex;align-items:center;gap:6px;cursor:pointer}
    .export-format input{margin:0}
    .export-format .active{background:#fff;color:#172033}
    .drawer-mask{position:fixed;inset:0;background:rgba(15,23,42,.28);display:none;z-index:60}
    .drawer-mask.show{display:block}
    .drawer{position:absolute;right:0;top:0;bottom:0;width:min(1180px,calc(100vw - 48px));background:#fff;box-shadow:-24px 0 48px rgba(15,23,42,.18);display:flex;flex-direction:column}
    .drawer-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .drawer-head h3{margin:0;font-size:22px}
    .drawer-head p{margin:6px 0 0;color:#667085;font-size:13px}
    .drawer-actions{display:flex;gap:10px;flex:none}
    .drawer-format{display:inline-flex}
    .drawer-search{padding:0 22px 12px}
    .drawer-search input{width:100%;height:42px;border:1px solid var(--line);border-radius:12px;padding:0 14px;font-size:14px;outline:none;background:#fff}
    .drawer-search input:focus{border-color:#b7cdfd;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    .drawer-body{padding:18px 22px;overflow:auto;flex:1}
    .drawer .table-wrap{max-height:none}
    .section-gap{height:16px}
    .metric-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
    .metric-summary-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 14px;box-shadow:0 8px 20px rgba(15,23,42,.03)}
    .metric-summary-card span{display:block;font-size:12px;color:#667085}
    .metric-summary-card strong{display:block;margin-top:8px;font-size:18px;color:#172033}
    .decision-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
    .decision-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 14px}
    .decision-card span{display:block;font-size:12px;color:#667085}
    .decision-card strong{display:block;margin-top:8px;font-size:18px;color:#172033}
    .decision-list{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 14px;margin-bottom:14px}
    .decision-list h4{margin:0 0 8px;font-size:14px}
    .decision-list ul{margin:0;padding-left:18px;color:#344054}
    .decision-list li{margin:6px 0;font-size:13px;line-height:1.5}
    .rule-box{border:1px solid var(--line);border-radius:14px;background:#fbfcff;padding:14px 16px;margin-bottom:16px}
    .rule-box h4{margin:0 0 8px;font-size:15px}
    .rule-box p{margin:0;color:#475467;line-height:1.7;font-size:13px}
    .task-list{display:flex;flex-direction:column;gap:12px}
    .task-item{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px 16px;display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .task-meta{display:flex;flex-direction:column;gap:6px}
    .task-meta strong{font-size:15px}
    .task-meta span{font-size:12px;color:#667085}
    .task-right{display:flex;align-items:center;gap:8px;flex:none}
    .toast{position:fixed;right:24px;bottom:24px;background:#111827;color:#fff;padding:12px 15px;border-radius:8px;opacity:0;transform:translateY(8px);transition:.2s;z-index:60}.toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:1280px){.stat-strip{grid-template-columns:repeat(3,minmax(0,1fr))}.grid,.chart-grid{grid-template-columns:1fr}.detail{position:relative;top:auto}.service-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.metric-summary{grid-template-columns:repeat(2,minmax(0,1fr))}}

    function selectedWindowDays(){const start=new Date(state.dateStart),end=new Date(state.dateEnd);if(Number.isNaN(start.getTime())||Number.isNaN(end.getTime()))return defaultWindowDays;return Math.max(1,Math.round((end-start)/86400000)+1)}

        build(sourceRows=snapshotRows()){const rows=sourceRows.map(row=>{const rate=Number(String(row.ratio||"").replace("%",""))||0;const done=Number(row.retest||0);const pool=rate>0?Math.round(done/(rate/100)):done;const miss=Math.max(0,pool-done);return{name:row.name,retestUsers:done,ratioPool:pool,ratioMiss:miss,ratioValue:row.ratio,status:row.status}});return{cols:["name","retestUsers","ratioPool","ratioMiss","ratioValue","status"],rows};},

    function exportDataset(key){

    function downloadBlob(blob,filename){const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(url),500)}
    function buildCsv(sections){const lines=[];sections.forEach(set=>{lines.push([set.title]);lines.push(["统计规则",set.rule||""]);lines.push(["页面",`${roleMeta().label} / ${pageMeta().label}`]);lines.push(["日期范围",`${state.dateStart} 至 ${state.dateEnd}`]);lines.push(["导出时间",timeLabel()]);lines.push([""]);lines.push(set.cols.map(c=>headerMap[c]||c));set.rows.forEach(row=>lines.push(set.cols.map(c=>row[c])));lines.push([""])}) ;return lines.map(line=>line.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n")}
    function buildExcel(sections){const tables=sections.map(set=>`<section style="margin:0 0 28px"><h2 style="margin:0 0 8px;font-size:18px">${esc(set.title)}</h2><div style="color:#667085;font-size:12px;margin-bottom:6px">统计规则：${esc(set.rule||"")}</div><div style="color:#667085;font-size:12px;margin-bottom:10px">页面：${esc(`${roleMeta().label} / ${pageMeta().label}`)} · 日期范围：${esc(`${state.dateStart} 至 ${state.dateEnd}`)} · 导出时间：${esc(timeLabel())}</div><table border="1" cellspacing="0" cellpadding="6" style="border-collapse:collapse;width:100%;font-size:12px"><thead><tr>${set.cols.map(c=>`<th style="background:#f5f7fb;text-align:left">${esc(headerMap[c]||c)}</th>`).join("")}</tr></thead><tbody>${set.rows.map(row=>`<tr>${set.cols.map(c=>`<td>${esc(row[c])}</td>`).join("")}</tr>`).join("")}</tbody></table></section>`).join("");return `<!doctype html><html><head><meta charset="utf-8"><title>导出</title></head><body style="font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;padding:16px">${tables}</body></html>`}
    function triggerDownload(format,sections,baseName){if(format==="excel"){downloadBlob(new Blob(["\ufeff"+buildExcel(sections)],{type:"application/vnd.ms-excel;charset=utf-8;"}),`${baseName}.xls`)}else{downloadBlob(new Blob(["\ufeff"+buildCsv(sections)],{type:"text/csv;charset=utf-8;"}),`${baseName}.csv`)}showToast("导出已开始")}
    function createExportTask(keys,format,meta={}){const sections=meta.sections||exportSections(keys),task={id:`task-${Date.now()}`,title:meta.title||sections.map(s=>s.title).join("、"),format:format==="excel"?"Excel":"CSV",scope:meta.scope||`${roleMeta().label} / ${pageMeta().label}`,rows:sections.reduce((sum,set)=>sum+set.rows.length,0),status:"已完成",time:timeLabel(),keys:[...((keys.length?keys:["main"]))],sections:meta.sections||null,fileBase:meta.fileBase||`${roleMeta().label}-${state.dateStart}_${state.dateEnd}-${filenameStamp()}`};exportTasks.unshift(task);triggerDownload(format,sections,task.fileBase);render()}

    function trendDecisionInsight(rows,title){
      if(!rows.length){
        return {
          summary:`${title}当前暂无可分析数据。`,
          cards:[{label:"当前值",value:"—"},{label:"较首期变化",value:"—"},{label:"趋势判断",value:"数据不足"}],
          actions:["补齐统计周期后再判断趋势。"]
        };
      }
      const first=Number(rows[0].value||0);
      const last=Number(rows[rows.length-1].value||0);
      const diff=last-first;
      const pct=first?`${(diff/first*100).toFixed(1)}%`:"—";
      const trend=diff>0?"上升":diff<0?"下降":"持平";
      const actions=diff<0
        ?["优先排查本期新增承接与复测推进环节，避免继续下滑。","针对关键对象建立当日跟进清单。"]
        :["保持当前推进节奏，先处理关键对象防止反弹。","复盘普通对象转化动作，提升整体效率。"];
      return {
        summary:`${title}最近周期从 ${first} 变化到 ${last}，整体${trend}（${diff>=0?"+":""}${diff}，${pct}）。`,
        cards:[
          {label:"当前值",value:last},
          {label:"较首期变化",value:`${diff>=0?"+":""}${diff}`},
          {label:"趋势判断",value:trend}
        ],
        actions
      };
    }

    function openDrawerExportModal(){if(!drawerState)return;const format=drawerState.format||state.exportFormat;modalMask.innerHTML=`<div class="modal"><div class="modal-head"><div><h3>导出明细</h3></div><div class="export-format" role="tablist"><label class="${format==="excel"?"active":""}"><input type="radio" name="drawer-export-format" value="excel" ${format==="excel"?"checked":""} data-drawer-export-format>Excel</label><label class="${format==="csv"?"active":""}"><input type="radio" name="drawer-export-format" value="csv" ${format==="csv"?"checked":""} data-drawer-export-format>CSV</label></div></div><div class="modal-body"><div class="export-summary"><h4>导出摘要</h4><div class="kv"><span>数据集</span><strong>${esc(drawerState.title)}</strong></div><div class="kv"><span>数据量</span><strong>${drawerFilteredRows().length} 行</strong></div><div class="kv"><span>导出范围</span><strong>${esc(`${roleMeta().label} / ${pageMeta().label}`)}</strong></div><div class="kv"><span>格式</span><strong id="drawer-export-format-label">${format==="excel"?"Excel":"CSV"}</strong></div></div></div><div class="modal-foot"><button class="ghost-btn" data-close-drawer-export>取消</button><button class="primary-btn" data-confirm-drawer-export>确认导出</button></div></div>`;modalMask.classList.add("show")}
    function openExportModal(){const opts=exportOptions();modalMask.innerHTML=`<div class="modal"><div class="modal-head"><div><h3>导出数据</h3></div><div class="export-format" role="tablist"><label class="${state.exportFormat==="excel"?"active":""}"><input type="radio" name="export-format" value="excel" ${state.exportFormat==="excel"?"checked":""} data-export-format>Excel</label><label class="${state.exportFormat==="csv"?"active":""}"><input type="radio" name="export-format" value="csv" ${state.exportFormat==="csv"?"checked":""} data-export-format>CSV</label></div></div><div class="modal-body export-layout"><div class="export-main"><div class="export-grid">${opts.map(opt=>{const set=exportDataset(opt.key);return `<label class="export-item"><input type="checkbox" data-export-key="${opt.key}" checked><div><strong>${opt.title}</strong><span>${opt.desc} · ${set.rows.length} 行</span></div></label>`}).join("")}</div></div><aside class="export-summary"><h4>导出摘要</h4><div class="kv"><span>数据集数量</span><strong id="export-selected-count">${opts.length}</strong></div><div class="kv"><span>格式</span><strong id="export-selected-format">${state.exportFormat==="excel"?"Excel":"CSV"}</strong></div><div class="kv"><span>导出范围</span><strong>${esc(`${roleMeta().label} / ${pageMeta().label}`)}</strong></div><div class="kv"><span>文件名</span><strong id="export-selected-file">${esc(`${roleMeta().label}-${state.dateStart}_${state.dateEnd}-${filenameStamp()}.${state.exportFormat==="excel"?"xls":"csv"}`)}</strong></div></aside></div><div class="modal-foot"><button class="ghost-btn" data-close>取消</button><button class="primary-btn" data-confirm-export>确认导出</button></div></div>`;modalMask.classList.add("show");refreshExportSummary()}
    function refreshExportSummary(){const checked=[...modalMask.querySelectorAll("[data-export-key]:checked")],format=(modalMask.querySelector("[data-export-format]:checked")||{}).value||state.exportFormat;state.exportFormat=format;const count=modalMask.querySelector("#export-selected-count"),fmt=modalMask.querySelector("#export-selected-format"),file=modalMask.querySelector("#export-selected-file");if(count)count.textContent=String(checked.length);if(fmt)fmt.textContent=format==="excel"?"Excel":"CSV";if(file)file.textContent=`${roleMeta().label}-${state.dateStart}_${state.dateEnd}-${filenameStamp()}.${format==="excel"?"xls":"csv"}`;modalMask.querySelectorAll(".export-format label").forEach(label=>label.classList.toggle("active",label.querySelector("input").checked))}
    function render(){app.innerHTML=`<div class="app"><aside class="sidebar"><div class="brand"><div class="brand-mark">W</div><div><div class="brand-title">Visbody WellnessHub</div><div class="brand-sub">运营分析</div></div></div><div><div class="side-title">角色视图</div><div class="nav-list">${Object.entries(roles).map(([key,item])=>`<button class="side-btn ${state.role===key?"active":""}" data-role="${key}"><span class="side-left"><span class="dot"></span>${item.label}</span><span>${state.role===key?"当前":""}</span></button>`).join("")}</div></div><div><div class="side-title">页面</div><div class="nav-list">${roleMeta().pages.map(page=>`<button class="side-btn active"><span class="side-left"><span class="dot"></span>${page.label}</span></button>`).join("")}</div></div></aside><main class="main"><div class="global-bar"><div class="crumbs">Visbody WellnessHub / 运营分析 / ${pageMeta().label}</div><div class="global-right"><span class="tiny-pill">${roleMeta().label}</span><div class="segmented"><button class="${state.tier==="basic"?"active":""}" data-tier="basic">非 Pro</button><button class="${state.tier==="pro"?"active":""}" data-tier="pro">Pro</button></div><button class="ghost-btn" data-refresh>刷新</button>${state.role==="hq"?`<button class="ghost-btn" data-param-config>参数配置</button>`:""}<button class="ghost-btn" data-export-tasks>导出任务 ${exportTasks.length?`(${exportTasks.length})`:""}</button></div></div>${renderTopbar()}<div class="content">${mainPage()}</div></main></div>`;bind()}
    function resetList(){state.rowId="";state.pageNo=1}
    function bind(){document.querySelectorAll("[data-role]").forEach(btn=>btn.onclick=()=>{state.role=btn.dataset.role;state.search="";state.coach="全部教练";state.ownerCoachSearch="";state.ownerCoachPageNo=1;resetList();render()});document.querySelectorAll("[data-tier]").forEach(btn=>btn.onclick=()=>{state.tier=btn.dataset.tier;showToast(state.tier==="pro"?"已切换到 Pro":"已切换到非 Pro");resetList();render()});document.querySelectorAll("[data-metric]").forEach(btn=>btn.onclick=()=>{const key=btn.dataset.metric;if(isRateMetric(key)){openRateDrawer(key,metricSourceRows(key));return}openDrawer(metricDrawerTitle(key,btn.dataset.title),drillRows(key,metricSourceRows(key)),drawerColsForMetric(key),metricRule(key),key)});document.querySelectorAll("[data-service-metric]").forEach(btn=>btn.onclick=()=>openServiceDrawer(btn.dataset.serviceMetric,btn.dataset.serviceTitle));document.querySelectorAll("[data-row]").forEach(tr=>tr.onclick=()=>{state.rowId=tr.dataset.row;render()});const start=document.querySelector("[data-date-start]"),end=document.querySelector("[data-date-end]");if(start)start.onchange=()=>{state.dateStart=start.value||state.dateStart;resetList();render()};if(end)end.onchange=()=>{state.dateEnd=end.value||state.dateEnd;resetList();render()};const search=document.querySelector("[data-search]");if(search)search.oninput=()=>{state.search=search.value.trimStart();resetList();render()};const serviceSearch=document.querySelector("[data-coach-service-search]");if(serviceSearch)serviceSearch.oninput=()=>{state.ownerCoachSearch=serviceSearch.value.trimStart();state.ownerCoachPageNo=1;render()};const exportBtn=document.querySelector("[data-export]");if(exportBtn)exportBtn.onclick=openExportModal;const paramBtn=document.querySelector("[data-param-config]");if(paramBtn)paramBtn.onclick=openParamModal;const taskBtn=document.querySelector("[data-export-tasks]");if(taskBtn)taskBtn.onclick=openTaskDrawer;const refreshBtn=document.querySelector("[data-refresh]");if(refreshBtn)refreshBtn.onclick=()=>showToast("数据已刷新");document.querySelectorAll("[data-problem]").forEach(btn=>btn.onclick=()=>{const key=btn.dataset.problem;const title=key==="risk"?"沉默用户":btn.dataset.title;openDrawer(metricDrawerTitle(key,title),drillRows(key,snapshotRows()),drawerColsForMetric(key),btn.dataset.problemRule||problemRules[key]||"",key)});document.querySelectorAll("[data-status]").forEach(btn=>btn.onclick=()=>openDrawer(`${btn.dataset.status}会员`,snapshotRows().filter(row=>row.status===btn.dataset.status),columns(),btn.dataset.statusRule||chartRules["会员状态分布"],"status"));document.querySelectorAll("[data-chart-key]").forEach(btn=>btn.onclick=()=>{const map=btn.dataset.chartTitle.includes("性别")?"gender":btn.dataset.chartTitle.includes("年龄")?"age":btn.dataset.chartTitle.includes("目标")?"goal":"tag";openDrawer(`${btn.dataset.chartTitle} - ${btn.dataset.chartKey}`,snapshotRows().filter(row=>String(row[map])===btn.dataset.chartKey),columns(),btn.dataset.chartRule||chartRules[btn.dataset.chartTitle]||"",btn.dataset.chartTitle)});document.querySelectorAll("[data-trend]").forEach(btn=>btn.onclick=()=>openDrawer(`${btn.dataset.trend}明细`,currentTrendRows(),["label","value"],btn.dataset.trendRule||chartRules[trendTitle()]||"",trendTitle()));document.querySelector("[data-page-prev]")?.addEventListener("click",()=>{const pages=Math.max(1,Math.ceil(mainRows().length/state.pageSize));state.pageNo=Math.max(1,state.pageNo-1);state.pageNo=Math.min(state.pageNo,pages);render()});document.querySelector("[data-page-next]")?.addEventListener("click",()=>{const pages=Math.max(1,Math.ceil(mainRows().length/state.pageSize));state.pageNo=Math.min(pages,state.pageNo+1);render()});document.querySelector("[data-coach-service-prev]")?.addEventListener("click",()=>{const rows=coachServiceFilteredRows(),pages=Math.max(1,Math.ceil(rows.length/state.ownerCoachPageSize));state.ownerCoachPageNo=Math.max(1,state.ownerCoachPageNo-1);state.ownerCoachPageNo=Math.min(state.ownerCoachPageNo,pages);render()});document.querySelector("[data-coach-service-next]")?.addEventListener("click",()=>{const rows=coachServiceFilteredRows(),pages=Math.max(1,Math.ceil(rows.length/state.ownerCoachPageSize));state.ownerCoachPageNo=Math.min(pages,state.ownerCoachPageNo+1);render()})}
    modalMask.addEventListener("click",e=>{if(e.target===modalMask||e.target.closest("[data-close]")){modalMask.classList.remove("show");modalMask.innerHTML="";return}if(e.target.closest("[data-confirm-export]")){const keys=[...modalMask.querySelectorAll("[data-export-key]:checked")].map(node=>node.dataset.exportKey),format=modalMask.querySelector("[data-export-format]:checked")?.value||state.exportFormat;modalMask.classList.remove("show");modalMask.innerHTML="";createExportTask(keys,format)}});
    modalMask.addEventListener("change",e=>{
      if(e.target.closest("[data-export-key]")||e.target.closest("[data-export-format]"))refreshExportSummary();
      if(e.target.matches("[data-drawer-export-format]")){
        drawerState.format=e.target.value;
        modalMask.querySelectorAll(".export-format label").forEach(label=>label.classList.toggle("active",label.querySelector("input").checked));
        const label=modalMask.querySelector("#drawer-export-format-label");
        if(label)label.textContent=e.target.value==="excel"?"Excel":"CSV";
      }
    });
    drawerMask.addEventListener("click",e=>{
      if(e.target===drawerMask||e.target.closest("[data-drawer-close]")){drawerState=null;drawerMask.classList.remove("show");drawerMask.innerHTML="";return}
      if(e.target.closest("[data-drawer-format]")){drawerState.format=e.target.closest("[data-drawer-format]").dataset.drawerFormat;renderDrawer();return}
      if(e.target.closest("[data-drawer-export]")){openDrawerExportModal();return}
      if(e.target.closest("[data-drawer-prev]")){const pages=Math.max(1,Math.ceil(drawerFilteredRows().length/drawerState.pageSize));drawerState.pageNo=Math.max(1,drawerState.pageNo-1);drawerState.pageNo=Math.min(drawerState.pageNo,pages);renderDrawer();return}
      if(e.target.closest("[data-drawer-next]")){const pages=Math.max(1,Math.ceil(drawerFilteredRows().length/drawerState.pageSize));drawerState.pageNo=Math.min(pages,drawerState.pageNo+1);renderDrawer();return}
      if(e.target.closest("[data-task-download]")){const node=e.target.closest("[data-task-download]"),task=exportTasks.find(item=>item.id===node.dataset.taskDownload);if(task){const sections=task.sections||exportSections(task.keys);triggerDownload(task.format==="Excel"?"excel":"csv",sections,task.fileBase)}}
    });
    drawerMask.addEventListener("input",e=>{if(e.target.matches("[data-drawer-search]")){drawerState.search=e.target.value.trimStart();drawerState.pageNo=1;renderDrawer()}});
    modalMask.addEventListener("click",e=>{if(e.target.closest("[data-close-param-config]")){modalMask.classList.remove("show");modalMask.innerHTML="";return}if(e.target.closest("[data-save-param-config]")){const next={...hqParams};modalMask.querySelectorAll("[data-param-field]").forEach(input=>{next[input.dataset.paramField]=Math.max(1,Number(input.value)||1)});hqParams=next;persistHqParams();modalMask.classList.remove("show");modalMask.innerHTML="";showToast("参数已保存");render();return}if(e.target.closest("[data-confirm-drawer-export]")){const format=modalMask.querySelector("[data-drawer-export-format]:checked")?.value||drawerState.format||state.exportFormat;const rows=drawerFilteredRows();const sections=[{title:drawerState.title,rule:drawerState.rule,cols:drawerState.cols,rows}];modalMask.classList.remove("show");modalMask.innerHTML="";createExportTask([],format,{title:drawerState.title,scope:`${roleMeta().label} / ${pageMeta().label} / ${drawerState.title}`,sections,fileBase:drawerMask.dataset.exportName||`${drawerState?.title||"导出"}-${filenameStamp()}`});return}if(e.target.closest("[data-close-drawer-export]")){modalMask.classList.remove("show");modalMask.innerHTML="";return}})
    render();
  </script>
