<!doctype html>
<html lang="zh-CN">

    <title>H5 调整方案 · React Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>

        theme: {
          extend: {

              fxBgStart: "#0a0e27",
              fxBgEnd: "#131a3a",
              fxCard: "rgba(20, 30, 60, 0.7)",

              fxText: "#e8ecf4",
              fxSub: "#7a8baa",
              fxPrimary: "#00e5ff",
              fxPrimarySoft: "rgba(0, 229, 255, 0.10)",
              fxPrimaryGlow: "rgba(0, 229, 255, 0.30)",
              fxPurple: "#a78bfa",
              fxPurpleSoft: "rgba(167, 139, 250, 0.12)",
              fxPink: "#ff6bcb",
              fxBlue: "#00e5ff",
              fxGreen: "#36cfc9",
              fxGreenSoft: "rgba(54, 207, 201, 0.12)",
              fxOrange: "#ff9b37",
              fxOrangeSoft: "rgba(255, 155, 55, 0.12)",
              fxRed: "#ff4d6a",

            borderRadius: { card: "16px" },
            boxShadow: {
              card: "0 8px 32px rgba(0, 0, 0, 0.40)",
              glow: "0 0 30px rgba(0, 229, 255, 0.10)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./src/styles.css" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="bg-slate-950">
    <div id="root"></div>
    <script type="module" src="./src/main.js"></script>
