<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体重结果</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--weight-result"
        data-weight-standalone-result
        data-result-return="./standby.html"
      >
        <div class="status-bar"><span>18:32</span><span>体重测量</span></div>
        <div class="topbar">
          <a class="back-link" href="./standby.html" data-stateful-link="./standby.html">← 首页</a>
        </div>
        <h1 class="screen-title">体重测量</h1>

        <div class="live-status-wrap">
          <div class="live-status">
            <span class="live-chip ok">测量完成</span>
          </div>
        </div>

        <div class="weight-result-hero">
          <span class="weight-result-number" data-session-weight-value>56.8</span>
          <span class="weight-result-unit">kg</span>
        </div>

        <div class="weight-result-time-only">
          <div class="weight-result-info-card">
            <div class="weight-result-info-card__label">测量时间</div>
            <div class="weight-result-info-card__value" data-last-standalone-weight-at>—</div>
          </div>
        </div>

        <div class="footer-hint">
          <a class="button secondary" href="./standby.html" data-weight-return-now data-stateful-link="./standby.html">立即返回</a>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
