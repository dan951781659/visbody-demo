<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>扶手接触准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--guide"
        data-auto-detect-next="./standard-position.html"
        data-auto-detect-delay="2600"
        data-voice-advance-next="./standard-position.html"
        data-voice-advance-after-ms="3000"
        data-voice-text="请双手握住扶手，拇指与四指充分接触金属区域。"
      >
        <div class="status-bar"><span>18:32</span><span>扶手准备</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-bodycomp-prep.html" data-stateful-link="./standard-bodycomp-prep.html">← 返回</a>
          <span class="text-link">测量准备页</span>
        </div>
        <h1 class="screen-title">双手接触扶手金属</h1>
        <p class="screen-subtitle">请双手拇指及四指与扶手金属区域充分接触。</p>
        <div class="device-visual guide-visual">
          <div class="live-stage guide-scene-wrap phase-stage-rails guide-grip-stage">
            <div class="camera-corner tl"></div><div class="camera-corner tr"></div><div class="camera-corner bl"></div><div class="camera-corner br"></div>
            <div class="live-glow"></div>
            <div class="live-status live-status--single"><span class="live-chip ok">扶手识别中</span></div>
            <div class="turntable-base" aria-hidden="true"></div>
            <div class="guide-line circle"></div>
            <img
              class="guide-grip-hero"
              src="./assets/bodycomp-prep/hand-grip-metal.svg"
              alt="双手拇指与四指接触扶手金属区示意"
              width="320"
              height="220"
            />
            <div class="guide-rail-hint">拇指与四指贴合金属区</div>
            <div class="live-focus" data-auto-detect-status>正在识别手部接触...</div>
          </div>
        </div>
        <div class="footer-hint">
          <p class="footer-muted" hidden data-voice-auto-hint>
            联调模式（URL 带 <code>demoAuto=1</code>）：语音播报结束后约 3 秒将自动进入下一页。
          </p>
          <a
            class="button primary"
            href="./standard-position.html"
            data-demo-next="./standard-position.html"
            data-stateful-link="./standard-position.html"
          >下一步</a>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
