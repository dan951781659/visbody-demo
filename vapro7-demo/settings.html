<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--settings device--settings-scroll">
        <div class="settings-scroll-header">
          <div class="status-bar status-bar--device-settings">
            <span>18:32</span>
            <span class="status-icons" aria-hidden="true">
              <span class="status-icon status-icon--wifi"></span>
              <span class="status-icon status-icon--signal"></span>
              <span class="status-icon status-icon--gesture"></span>
              <span class="status-icon status-icon--printer status-icon--ok"></span>
              <span class="status-icon status-icon--mute"></span>
            </span>
          </div>
          <div class="topbar">
            <a
              class="back-link"
              href="./standby.html"
              data-back-link
              data-back-mode="demo-or-standby"
              data-back-default="./standby.html"
            >
              <span class="back-link__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M19 12H5M12 5l-7 7 7 7" />
                </svg>
              </span>
              <span>首页</span>
            </a>
          </div>
          <h1 class="screen-title">设置</h1>
          <div class="settings-page-divider" aria-hidden="true"></div>
        </div>

        <div class="settings-scroll-list" tabindex="0" aria-label="设置列表，可上下滑动">
          <section class="settings-group" id="measurement-flow" aria-labelledby="settings-group-measure-flow">
            <h2 class="settings-group-title" id="settings-group-measure-flow">测量流程</h2>
            <div class="settings-group-body">
              <div class="settings-row settings-row--toggle">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M8 5.5h8M9 4h6a1 1 0 0 1 1 1v1H8V5a1 1 0 0 1 1-1Z" />
                    <path d="M7 6.5h10A2.5 2.5 0 0 1 19.5 9v9A2.5 2.5 0 0 1 17 20.5H7A2.5 2.5 0 0 1 4.5 18V9A2.5 2.5 0 0 1 7 6.5Z" />
                    <path d="M8.5 11h7M8.5 14h7M8.5 17h4.5" />
                  </svg>
                </span>
                <div class="settings-row__text">
                  <span class="settings-row__label">显示测量准备页</span>
                  <span class="settings-row__subhint">快速测量前引导</span>
                </div>
                <label class="toggle settings-row__toggle"><input type="checkbox" data-config-key="bodyCompositionPrepEnabled" /><span></span></label>
              </div>
              <div class="settings-row settings-row--toggle">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M5 10.5h4l4-3.5v10l-4-3.5H5z" />
                    <path d="M16 9.5c1.2.9 2 2.3 2 3.5s-.8 2.6-2 3.5" />
                    <path d="M18.5 7c2 1.5 3.2 3.8 3.2 6s-1.2 4.5-3.2 6" />
                  </svg>
                </span>
                <div class="settings-row__text">
                  <span class="settings-row__label">语音播报</span>
                  <span class="settings-row__subhint">仅供 Demo 演示</span>
                  <span class="settings-row__subhint">测量引导语音</span>
                </div>
                <label class="toggle settings-row__toggle"><input type="checkbox" data-config-key="voiceEnabled" /><span></span></label>
              </div>
            </div>
          </section>

          <section class="settings-group" aria-labelledby="settings-group-system">
            <h2 class="settings-group-title" id="settings-group-system">系统</h2>
            <div class="settings-group-body">
              <div class="settings-row settings-row--static settings-row--accent">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M5 10.5h4l4-3.5v10l-4-3.5H5z" />
                    <path d="M16 9.5c1.2.9 2 2.3 2 3.5s-.8 2.6-2 3.5" />
                    <path d="M18.5 7c2 1.5 3.2 3.8 3.2 6s-1.2 4.5-3.2 6" />
                  </svg>
                </span>
                <span class="settings-row__label">声音设置</span>
                <span class="settings-row__value">60%</span>
                <span class="settings-row__chev">›</span>
              </div>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <circle cx="12" cy="12" r="4.2" />
                    <path d="M12 2.8v2.6M12 18.6v2.6M5.5 5.5l1.8 1.8M16.7 16.7l1.8 1.8M2.8 12h2.6M18.6 12h2.6M5.5 18.5l1.8-1.8M16.7 7.3l1.8-1.8" />
                  </svg>
                </span>
                <span class="settings-row__label">屏幕亮度</span>
                <span class="settings-row__value">100</span>
                <span class="settings-row__chev">›</span>
              </div>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M7 18.5v-4.8l2.6-2.2V6.8A1.8 1.8 0 0 1 11.4 5a1.8 1.8 0 0 1 1.8 1.8v3.7l1.3-1.1a1.7 1.7 0 0 1 2.4.2 1.8 1.8 0 0 1 .3 1.8l-1.1 3.2v4" />
                    <path d="M7 18.5h9.2" />
                    <path d="M4 13.5h3" />
                    <path d="M17.8 4.2l2 2" />
                  </svg>
                </span>
                <span class="settings-row__label">手势识别</span>
                <span class="settings-row__value">已开启</span>
                <span class="settings-row__chev">›</span>
              </div>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M7 8V4.5h10V8" />
                    <path d="M6.2 17H5.5A2.5 2.5 0 0 1 3 14.5v-4A2.5 2.5 0 0 1 5.5 8h13A2.5 2.5 0 0 1 21 10.5v4a2.5 2.5 0 0 1-2.5 2.5h-.7" />
                    <path d="M7 14h10v5.5H7z" />
                    <path d="M17.5 11.2h.01" />
                  </svg>
                </span>
                <span class="settings-row__label">打印设置</span>
                <span class="settings-row__value">已开启</span>
                <span class="settings-row__chev">›</span>
              </div>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M12 3.5v7" />
                    <path d="M7.2 6.5A7.2 7.2 0 1 0 16.8 6.5" />
                    <circle cx="12" cy="12.2" r="8.2" />
                  </svg>
                </span>
                <span class="settings-row__label">按键指引</span>
                <span class="settings-row__chev">›</span>
              </div>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M4.5 12a7.5 7.5 0 1 1 13.4 4.6" />
                    <path d="M16.5 16.6c.8.4 1.6.4 2.2-.1 1-.8 1.3-2.4 1.3-4a8.5 8.5 0 1 0-3 6.5" />
                    <path d="M14.8 12a2.8 2.8 0 1 1-5.6 0 2.8 2.8 0 0 1 5.6 0Z" />
                  </svg>
                </span>
                <span class="settings-row__label">网络设置</span>
                <span class="settings-row__chev">›</span>
              </div>
              <a
                class="settings-row settings-row--static"
                href="./settings-language.html"
                data-stateful-link="./settings-language.html"
                style="text-decoration: none; color: inherit"
              >
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <circle cx="12" cy="12" r="8.5" />
                    <path d="M3.8 12h16.4M12 3.5c2.1 2.3 3.3 5.3 3.3 8.5S14.1 18.2 12 20.5M12 3.5c-2.1 2.3-3.3 5.3-3.3 8.5s1.2 6.2 3.3 8.5" />
                  </svg>
                </span>
                <span class="settings-row__label">语言</span>
                <span class="settings-row__chev">›</span>
              </a>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M8 5.5h8M9 4h6a1 1 0 0 1 1 1v1H8V5a1 1 0 0 1 1-1Z" />
                    <path d="M7 6.5h10A2.5 2.5 0 0 1 19.5 9v9A2.5 2.5 0 0 1 17 20.5H7A2.5 2.5 0 0 1 4.5 18V9A2.5 2.5 0 0 1 7 6.5Z" />
                    <path d="M8.5 11h7M8.5 14h7M8.5 17h4.5" />
                  </svg>
                </span>
                <span class="settings-row__label">报告获取方式</span>
                <span class="settings-row__chev">›</span>
              </div>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <path d="M8 17.8c1.4-1.9 2.1-4.2 2.1-6.6V6.2A1.7 1.7 0 0 1 11.8 4.5 1.7 1.7 0 0 1 13.5 6v3.6" />
                    <path d="M10.6 17.5c1.4 1.2 3.5 1.7 5.3.8 1.5-.7 2.3-2 2.3-3.5 0-1.4-.7-2.5-1.7-3.7l-2.9-3.5" />
                    <path d="M6.3 18.8c.7.7 1.8.7 2.7.5l1.8-.5" />
                    <circle cx="15.9" cy="6.6" r=".9" />
                    <circle cx="17.9" cy="7.9" r=".8" />
                    <circle cx="19" cy="10" r=".7" />
                  </svg>
                </span>
                <span class="settings-row__label">脚部加热设置</span>
                <span class="settings-row__chev">›</span>
              </div>
              <div class="settings-row settings-row--static">
                <span class="settings-row__icon" aria-hidden="true">
                  <svg class="settings-glyph" viewBox="0 0 24 24" focusable="false">
                    <rect x="6.5" y="10.5" width="11" height="9" rx="2.4" />
                    <path d="M9 10.5V8.2A3 3 0 0 1 12 5.2a3 3 0 0 1 3 3v2.3" />
                  </svg>
                </span>
                <span class="settings-row__label">锁屏设置</span>
                <span class="settings-row__value">已开启</span>
                <span class="settings-row__chev">›</span>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
