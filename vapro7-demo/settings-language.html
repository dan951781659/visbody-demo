<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>语言</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device device--settings device--settings-scroll">
        <div class="settings-scroll-header">
          <div class="status-bar"><span>18:32</span><span data-i18n="settings.language">语言</span></div>
          <div class="topbar">
            <a
              class="back-link"
              href="./settings.html"
              data-stateful-link="./settings.html"
              data-i18n="common.backSettings"
              >← 设置</a>
          </div>
          <h1 class="screen-title" data-i18n="settings.languageTitle">语言</h1>
        </div>

        <div class="settings-scroll-list" tabindex="0" aria-label="语言列表">
          <section class="settings-group">
            <div class="settings-group-body">
              <a
                class="settings-row settings-row--static"
                href="#"
                data-action-link="set-language"
                data-lang="zh"
                style="text-decoration: none; color: inherit"
              >
                <span class="settings-row__icon">🇨🇳</span>
                <span class="settings-row__label" data-i18n="lang.zh">中文</span>
                <span class="settings-row__value" data-lang-indicator="zh" hidden>✓</span>
                <span class="settings-row__chev">›</span>
              </a>
              <a
                class="settings-row settings-row--static"
                href="#"
                data-action-link="set-language"
                data-lang="de"
                style="text-decoration: none; color: inherit"
              >
                <span class="settings-row__icon">🇩🇪</span>
                <span class="settings-row__label" data-i18n="lang.de">Deutsch</span>
                <span class="settings-row__value" data-lang-indicator="de" hidden>✓</span>
                <span class="settings-row__chev">›</span>
              </a>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
