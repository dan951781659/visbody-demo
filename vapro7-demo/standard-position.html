<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>扶手姿势准备</title><link rel="stylesheet" href="./shared.css" /></head>
<body>
<main class="device-stage"><section class="device device--guide">
<div class="status-bar"><span>18:32</span><span>综合测量</span><span class="demo-version-badge" data-demo-version>v1.5.0</span></div>
<div class="topbar"><a class="back-link" href="./home.html" data-stateful-link="./home.html">← 返回</a><span class="text-link">测量准备</span></div>
<div class="section-label">综合测量</div>
<h1 class="screen-title" data-guide-title>扶手与手臂姿势</h1>
<p class="screen-subtitle guide-caption" data-guide-subtitle>先握扶手，再将双臂展开至约 45°。</p>
<div class="device-visual guide-visual">
<div class="live-stage guide-scene-wrap phase-stage-rails" data-guide-sequence data-guide-scene data-guide-initial-phase="2" data-guide-next="./standard-countdown.html" data-voice-text="请双手握住扶手，双臂展开约四十五度并保持静止。">
<div class="camera-corner tl"></div><div class="camera-corner tr"></div><div class="camera-corner bl"></div><div class="camera-corner br"></div>
<div class="live-glow"></div>
<div class="live-status live-status--single" data-guide-chips><span class="live-chip ok" data-guide-chip-a>扶手姿势</span></div>
<div class="turntable-base" aria-hidden="true"></div>
<div class="guide-line circle" data-guide-circle></div>
<div class="guide-feet-closeup" data-guide-feet hidden><span class="motor-mark">电机片</span><span class="footprint-mark">脚印</span></div>
<div class="human pose-hold" data-guide-human><div class="head"></div><div class="torso"></div><div class="limb arm left"></div><div class="limb arm right"></div><div class="limb leg left"></div><div class="limb leg right"></div></div>
<div class="guide-rail-hint" data-guide-rail-hint>握住扶手</div>
<p class="guide-arm-hint" data-guide-arm-hint>若夹角不足，请再张开一些</p>
<div class="live-focus" data-guide-focus>请握住扶手并展开双臂</div>
</div>
</div>
<div class="guide-actions"><button type="button" class="button ghost guide-replay-btn" data-guide-replay>再次播报</button></div>
<div class="footer-hint guide-footer">
<a class="button primary guide-phase-btn" href="./standard-countdown.html" data-guide-phase-next data-demo-next="./standard-countdown.html" data-stateful-link="./standard-countdown.html">准备完成，进入倒计时</a>
</div>
</section></main>
<script src="./shared.js"></script>
</body></html>
