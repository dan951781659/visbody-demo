<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手臂姿势准备</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section
        class="device device--guide device--guide-panel device--bodycomp-video-page"
        data-auto-detect-next="./standard-countdown.html"
        data-auto-detect-delay="2600"
        data-voice-advance-next="./standard-countdown.html"
        data-voice-advance-after-ms="3000"
        data-voice-text="请双臂自然打开，保持约四十五度夹角。"
      >
        <div class="status-bar"><span>18:32</span><span>角度准备</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-grip-prep.html" data-stateful-link="./standard-grip-prep.html">← 返回</a>
          <span class="text-link">测量准备页</span>
        </div>
        <h1 class="screen-title">双臂自然打开 45°</h1>
        <div class="device-visual guide-visual">
          <div class="live-stage guide-scene-wrap phase-stage-rails">
            <div class="camera-corner tl"></div>
            <div class="camera-corner tr"></div>
            <div class="camera-corner bl"></div>
            <div class="camera-corner br"></div>
            <div class="live-glow"></div>
            <div class="live-status live-status--single"><span class="live-chip ok">请按提示操作</span></div>
            <video
              class="bodycomp-flow-video bodycomp-flow-video--guide"
              autoplay
              muted
              loop
              playsinline
              preload="auto"
              controlslist="nodownload nofullscreen noremoteplayback"
              disablepictureinpicture
              aria-label="双臂自然打开约四十五度夹角示意动画"
            >
              <source src="./assets/bodycomp-flow/arms-45.mp4" type="video/mp4" />
            </video>
          </div>
        </div>
        <div class="measuring-info-panel">
          <img class="measuring-info-panel__badge" src="./assets/lanhu/info-badge-i.png" alt="" />
          <div class="measuring-info-panel__row">
            <img class="measuring-info-panel__dot" src="./assets/lanhu/tip-dot.png" alt="" />
            <p class="measuring-info-panel__text" data-panel-hint>请保持握住扶手，面向屏幕，双臂自然打开并维持约 45° 夹角。</p>
          </div>
        </div>
        <div class="footer-hint guide-footer">
          <p class="footer-muted" hidden data-voice-auto-hint>
            语音播报结束后将自动进入下一页。
          </p>
          <div class="button-row">
            <a
              class="button primary guide-phase-btn"
              href="./standard-countdown.html"
              data-demo-next="./standard-countdown.html"
              data-stateful-link="./standard-countdown.html"
            >下一步</a>
          </div>
        </div>
      </section>
    </main>
    <script src="./device-i18n.js"></script>
    <script src="./shared.js"></script>
  </body>
</html>
