<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>完整测量中</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <main class="device-stage">
      <section class="device">
        <div class="status-bar"><span>18:32</span><span>测量中</span></div>
        <div class="topbar">
          <a class="back-link" href="./standard-countdown.html">← 返回</a>
          <span class="text-link">转台旋转中</span>
        </div>
        <div class="section-label">完整测量</div>
        <h1 class="screen-title">请保持静止</h1>
        <p class="screen-subtitle" data-live-voice>正在采集体重、体成分、体围、身高和体态。</p>
        <div class="device-visual">
          <div class="live-stage rotating-stage" data-stage-next="./standard-next-step.html" data-stage-delay="4200" data-voice-text="测量中，请不要移动。">
            <div class="live-glow"></div>
            <div class="live-status">
              <span class="live-chip ok">姿态正确</span>
              <span class="live-chip">转台旋转中</span>
            </div>
            <div class="guide-line circle"></div>
            <div class="guide-line feet"></div>
            <div class="human pose-hold">
              <div class="head"></div><div class="torso"></div>
              <div class="limb arm left"></div><div class="limb arm right"></div>
              <div class="limb leg left"></div><div class="limb leg right"></div>
            </div>
            <div class="scan-line"></div>
            <div class="live-focus">请不要移动</div>
          </div>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:72%;"></div></div>
        <div class="footer-hint">
          <div class="auto-hint auto-hint-clickable" data-demo-next="./standard-next-step.html">
            <strong>测量完成后自动进入下一步</strong>
            <span class="count-badge">72%</span>
          </div>
        </div>
      </section>
    </main>
    <script src="./shared.js"></script>
  </body>
</html>
