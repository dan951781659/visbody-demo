<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visbody Demo 列表</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #fff;
      --primary: #1677ff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --font: 'Noto Sans SC', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 48px 24px; line-height: 1.6; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .demo-list { max-width: 560px; display: flex; flex-direction: column; gap: 12px; }
    a {
      display: block;
      background: var(--card);
      padding: 20px 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      transition: border-color .2s, box-shadow .2s;
    }
    a:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(22, 119, 255, .15); }
    a .desc { font-size: 13px; color: var(--text-muted); font-weight: 400; margin-top: 4px; }
    a .path { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <h1>Visbody Demo 列表</h1>
  <p class="sub">同一名称的 Demo 固定在同一地址（覆盖更新）；不同名称会新建路径，保留历史。</p>
  <nav class="demo-list">
    <a href="report-export/">
      报告列表批量导出
      <span class="desc">报告列表、筛选、勾选、批量导出与用户授权（中国大陆/Global、协议滚动、倒计时）</span>
      <span class="path">固定地址：/report-export/</span>
    </a>
    <a href="body-report.html">
      体测报告单页
      <span class="desc">单次体测结果概览与详细数据切换</span>
      <span class="path">/body-report.html</span>
    </a>
    <a href="header-collapse.html">
      顶部栏收起交互
      <span class="desc">维塑数字健康平台 - 顶部栏收起/展开 Demo</span>
      <span class="path">/header-collapse.html</span>
    </a>
  </nav>
</body>
</html>
