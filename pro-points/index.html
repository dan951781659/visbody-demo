<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的套餐 · 维塑数字健康平台</title>
  <style>
    :root {
      --line: #e8ebf3;
      --line-2: #edf1f7;
      --ink: #1e2433;
      --muted: #6c7485;
      --blue: #315dff;
      --blue-soft: rgba(49, 93, 255, 0.1);
      --purple-soft: rgba(170, 136, 255, 0.12);
      --warn: #d88216;
      --warn-soft: rgba(216, 130, 22, 0.12);
      --green: #16a34a;
      --green-soft: rgba(22, 163, 74, 0.12);
      --danger: #df4c4c;
      --danger-soft: rgba(223, 76, 76, 0.12);
      --bg: #f5f6fb;
      --panel: rgba(255, 255, 255, 0.9);
      --shadow: 0 18px 50px rgba(42, 52, 82, 0.08);
    }
    * { box-sizing: border-box; }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    body {
      margin: 0;
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    button, input, select {
      font: inherit;
    }
    .app {
      display: grid;
      grid-template-columns: 212px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: #fff;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
    }
    .brand {
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--line);
    }
    .brand strong {
      font-size: 28px;
      letter-spacing: 0.08em;
      color: #223252;
    }
    .brand span {
      color: #bcc2d0;
      font-size: 12px;
      margin-left: 6px;
    }
    .nav-group {
      padding: 10px 0;
      border-bottom: 1px solid #eef1f7;
    }
    .nav-title {
      padding: 12px 16px 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .nav-item {
      padding: 12px 22px;
      color: #4a5871;
      border-left: 3px solid transparent;
      cursor: pointer;
      font-size: 15px;
    }
    .nav-item.active {
      color: var(--blue);
      border-left-color: var(--blue);
      background: linear-gradient(90deg, rgba(49, 93, 255, 0.1), transparent 90%);
      font-weight: 700;
    }
    .nav-foot {
      margin-top: auto;
      padding: 14px 16px;
      color: #9aa5b7;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 78px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }
    .topbar-right {
      position: absolute;
      right: 24px;
      display: flex;
      gap: 26px;
      align-items: center;
      color: #2f3748;
      font-size: 14px;
    }
    .account-menu-wrap {
      position: relative;
    }
    .account-menu-trigger {
      border: none;
      background: none;
      cursor: pointer;
      font: inherit;
      color: inherit;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .account-menu-trigger:hover {
      background: var(--blue-soft);
    }
    .account-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      min-width: 168px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 6px 0;
      z-index: 30;
    }
    .account-dropdown.open {
      display: block;
    }
    .account-dropdown button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
    }
    .account-dropdown button:hover {
      background: #f5f6fb;
    }
    .usage-snapshot-actions {
      margin-top: 10px;
      text-align: right;
    }
    .content {
      padding: 16px;
    }
    .canvas {
      min-height: calc(100vh - 110px);
      border: 1px solid #eceff5;
      border-radius: 22px;
      background:
        radial-gradient(circle at 34% 20%, rgba(255, 241, 182, 0.22), transparent 25%),
        radial-gradient(circle at 76% 62%, rgba(228, 201, 255, 0.22), transparent 24%),
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(250,248,255,0.98));
      box-shadow: var(--shadow);
      padding: 24px 28px 30px;
      position: relative;
      overflow: hidden;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    .page-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .back-link {
      color: #58647e;
      cursor: pointer;
      font-size: 18px;
    }
    .top-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .page-eyebrow {
      font-size: 14px;
      font-weight: 600;
      color: #3d4a63;
      padding: 8px 0;
    }
    .btn {
      border-radius: 6px;
      border: 1px solid rgba(49, 93, 255, 0.22);
      background: #fff;
      color: var(--blue);
      cursor: pointer;
      padding: 10px 18px;
      font-size: 14px;
    }
    .btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .btn.light {
      color: #55627d;
      border-color: var(--line);
    }
    .btn-outline {
      border-radius: 2px;
      background: #fff;
      color: var(--blue);
      border: 1px solid var(--blue);
    }
    .btn-outline:hover {
      background: rgba(49, 93, 255, 0.06);
    }
    .btn.disabled,
    .btn:disabled {
      background: #f3f5f9;
      color: #a5afc1;
      border-color: #e6eaf1;
      cursor: not-allowed;
    }
    .account-wrap,
    .renew-wrap,
    .records-wrap,
    .detail-wrap {
      max-width: 1320px;
      margin: 0 auto;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .hero-title {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-title h2 {
      margin: 0;
      font-size: 42px;
      font-weight: 500;
      letter-spacing: -0.03em;
    }
    .pro-badge {
      border-radius: 999px;
      border: 1px solid rgba(49, 93, 255, 0.22);
      padding: 5px 12px;
      color: var(--blue);
      background: rgba(255,255,255,0.88);
      font-size: 13px;
      font-weight: 700;
    }
    .subline {
      margin-top: 12px;
      color: #4d5871;
      font-size: 17px;
    }
    .subline strong {
      color: var(--blue);
      font-size: 22px;
    }
    .summary-grid {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 14px;
      margin-top: 18px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .summary-card {
      flex: 1;
      min-width: 0;
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
    }
    .summary-card .label {
      color: var(--muted);
      font-size: 13px;
    }
    .summary-card .value {
      margin-top: 10px;
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
    }
    .summary-card .value small {
      font-size: 17px;
      font-weight: 600;
    }
    .summary-card .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .action-row {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      padding: 12px;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .action-row-main {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      align-items: center;
      flex: 1;
      min-width: 0;
    }
    .action-row-main .btn {
      flex: 0 0 auto;
      min-width: 118px;
    }
    .action-row-sub {
      margin-left: auto;
      flex: 0 0 auto;
    }
    .action-row-sub .btn {
      min-width: 148px;
    }
    .device-panel {
      margin-top: 20px;
      display: grid;
      gap: 14px;
    }
    .device-card {
      display: grid;
      grid-template-columns: 168px 1fr;
      gap: 22px;
      align-items: center;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.95);
      padding: 18px 20px;
    }
    .device-card-thumb {
      width: 168px;
      height: 152px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f4f7ff 0%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8ba0d3;
      font-weight: 800;
      font-size: 26px;
    }
    .device-card-main h3 {
      margin: 0 0 10px;
      font-size: 19px;
      color: var(--blue);
    }
    .device-card-main p {
      margin: 4px 0;
      color: #57637c;
      font-size: 15px;
      line-height: 1.6;
    }
    .device-card-main strong {
      color: #2e374b;
      font-weight: 600;
    }
    .device-card-actions {
      margin-top: 12px;
    }
    .device-card-actions .btn {
      padding: 8px 16px;
      font-size: 14px;
    }
    .notice {
      margin-top: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      line-height: 1.7;
      font-size: 14px;
      display: none;
    }
    .notice.show { display: block; }
    .notice.warn {
      background: var(--warn-soft);
      color: #8a5a10;
      border: 1px solid rgba(216, 130, 22, 0.18);
    }
    .notice.info {
      background: var(--blue-soft);
      color: #2d4ccf;
      border: 1px solid rgba(49, 93, 255, 0.16);
    }

    .usage-snapshot {
      margin: 0 0 20px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .usage-snapshot-head {
      margin-bottom: 10px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .usage-snapshot-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .usage-snapshot-table th,
    .usage-snapshot-table td {
      border: 1px solid var(--line-2);
      padding: 8px 10px;
      text-align: left;
    }
    .usage-snapshot-table th {
      background: #f8f9fc;
      color: var(--muted);
      font-weight: 600;
    }

    .feature-panel {
      margin-top: 20px;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
    }
    .feature-table {
      width: 100%;
      border-collapse: collapse;
    }
    .feature-table th,
    .feature-table td {
      border-bottom: 1px solid var(--line-2);
      padding: 16px 18px;
      vertical-align: top;
      text-align: left;
    }
    .feature-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      background: rgba(255,255,255,0.72);
    }
    .feature-name {
      color: #9b7fff;
      font-weight: 700;
      font-size: 14px;
    }
    .feature-desc {
      color: #5c677f;
      font-size: 13px;
      line-height: 1.7;
    }
    .feature-meta {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      background: var(--purple-soft);
      color: #8a6fff;
    }
    .link-btn {
      border: 0;
      background: transparent;
      color: var(--blue);
      padding: 0;
      cursor: pointer;
      font-size: 12px;
    }
    .check {
      text-align: center;
      color: #c2a8ff;
      font-size: 22px;
      font-weight: 700;
    }
    .renew-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin: 6px 0 22px;
    }
    .renew-panel {
      max-width: 860px;
      margin: 0 auto;
    }
    .device-select-head {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
      color: var(--blue);
      font-size: 14px;
      align-items: center;
      gap: 10px;
    }
    .device-list {
      display: grid;
      gap: 14px;
    }
    .device-item {
      display: grid;
      grid-template-columns: 58px 132px 1fr auto;
      gap: 16px;
      align-items: center;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 18px;
    }
    .check-box {
      width: 26px;
      height: 26px;
      accent-color: var(--blue);
      cursor: pointer;
      justify-self: center;
    }
    .device-thumb {
      width: 132px;
      height: 118px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f4f7ff 0%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8ba0d3;
      font-weight: 700;
      font-size: 20px;
    }
    .device-main h3 {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 17px;
    }
    .device-main p {
      margin: 2px 0;
      color: #5c6880;
      font-size: 14px;
      line-height: 1.6;
    }
    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .status.green {
      background: var(--green-soft);
      color: var(--green);
    }
    .pay-section {
      margin-top: 22px;
    }
    .pay-section h3 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #33425c;
    }
    .pay-cards {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .pay-card-v2 {
      position: relative;
      flex: 1;
      min-width: 160px;
      min-height: 132px;
      border-radius: 12px;
      padding: 16px 14px 40px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #e2e6ef;
      box-sizing: border-box;
    }
    .pay-card-v2.active {
      border: 2px solid transparent;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(90deg, #a78bfa, #6366f1, #fb923c) border-box;
      box-shadow: 0 8px 28px rgba(99, 102, 241, 0.12);
    }
    .pay-card-qty {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 12px;
      color: #9aa3b5;
      font-weight: 600;
    }
    .pay-card-price {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #1e2433;
      margin-top: 6px;
    }
    .pay-card-price.grad {
      background: linear-gradient(90deg, #7c3aed, #6366f1, #ea580c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    .pay-card-unit {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: 12px;
      color: #9aa3b5;
    }
    .pay-card-points {
      margin-top: 8px;
      font-size: 12px;
      color: #67748b;
      line-height: 1.5;
    }
    .pay-card-points strong {
      color: #3f4f6b;
      font-weight: 700;
    }
    .coupon-strip {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      padding: 14px 16px;
      flex-wrap: wrap;
    }
    .coupon-strip .left {
      color: #48556f;
      font-size: 14px;
      line-height: 1.7;
    }
    .accordion {
      margin-top: 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
    }
    .accordion-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      cursor: pointer;
      color: #47536c;
      font-size: 15px;
      font-weight: 600;
    }
    .accordion-body {
      display: none;
      border-top: 1px solid var(--line);
      padding: 16px 18px;
      color: #5c6780;
      line-height: 1.8;
      font-size: 14px;
      background: rgba(250,252,255,0.9);
    }
    .accordion.open .accordion-body {
      display: block;
    }
    .renew-actions {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .renew-tip-banner {
      margin-top: 18px;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(223, 76, 76, 0.14);
      border: 1px solid rgba(223, 76, 76, 0.28);
      color: #6b2d2d;
      font-size: 14px;
      line-height: 1.65;
    }
    .renew-tip-banner strong {
      color: #4a1f1f;
    }
    .pack-wrap {
      max-width: 860px;
      margin: 0 auto;
    }
    .pack-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin: 6px 0 16px;
    }
    .pack-desc {
      color: #58637b;
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 14px;
    }
    .pack-list {
      display: grid;
      gap: 12px;
    }
    .pack-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      cursor: pointer;
    }
    .pack-item.active {
      border-color: rgba(49, 93, 255, 0.28);
      background: rgba(49, 93, 255, 0.05);
      box-shadow: inset 0 0 0 1px rgba(49, 93, 255, 0.08);
    }
    .pack-item h4 {
      margin: 0 0 6px;
      font-size: 20px;
      color: #1f283a;
    }
    .pack-item p {
      margin: 0;
      color: #616c84;
      font-size: 14px;
      line-height: 1.7;
    }
    .pack-item .price {
      font-size: 38px;
      font-weight: 800;
      color: #2e384d;
      letter-spacing: -0.02em;
      min-width: 130px;
      text-align: right;
    }
    .records-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .records-summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mini-card {
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      padding: 12px 14px;
      min-width: 170px;
    }
    .mini-card .label {
      color: var(--muted);
      font-size: 12px;
    }
    .mini-card .value {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 800;
    }
    .filters {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-box {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input,
    .select {
      height: 44px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      padding: 0 16px;
      color: #58637b;
      min-width: 250px;
      font-size: 14px;
    }
    .select {
      min-width: 180px;
    }
    .search-btn {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      border: 0;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }
    .table-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th,

    function isExpired() {
      return new Date(state.expiry + 'T23:59:59') < new Date('2026-03-25T00:00:00');
    }

    /** 锚定「今天」：设备 Pro 到期早于今日视为已到期，展示「立即续费」 */
    function deviceProExpired(proExpireStr) {
      const end = new Date(proExpireStr.replace(' ', 'T'));
      const today = new Date('2026-03-25T00:00:00');
      return end < today;
    }

    function showToast(message) {
      const el = document.getElementById('toast');
      if (!el) return;
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function escAttr(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }

    function initSceneDock() {
      const dock = document.getElementById('sceneDock');
      if (!dock) return;
      if (/\bstaff=1\b/.test(window.location.search)) {
        dock.classList.add('show');
        dock.setAttribute('aria-hidden', 'false');
      }
    }

    function usageRowMatchesDatePreset(row) {
      if (state.usageDatePreset === 'all') return true;
      const t = new Date(row.time.replace(/-/g, '/'));
      if (Number.isNaN(t.getTime())) return true;
      if (state.usageDatePreset === 'custom') {
        if (!state.usageDateStart || !state.usageDateEnd) return true;
        const start = new Date(`${state.usageDateStart}T00:00:00`);
        const end = new Date(`${state.usageDateEnd}T23:59:59`);
        return t >= start && t <= end;
      }
      const anchor = new Date('2026-03-25T23:59:59');
      const elapsedDays = (anchor - t) / 86400000;
      if (elapsedDays < 0) return false;
      const windowDays = state.usageDatePreset === '7d' ? 7 : 30;
      return elapsedDays <= windowDays;
    }

    function usageFeatureFilterOptions() {
      const rows = state.usageRows.filter(usageRowMatchesDatePreset);
      if (!rows.length) return [{ value: 'all', label: '全部功能' }];
      const map = new Map();
      rows.forEach((r) => {
        if (r.featureId) map.set(r.featureId, r.feature);
      });
      const opts = [...map.entries()].map(([value, label]) => ({ value, label }));
      if (opts.length <= 1) return opts;
      return [{ value: 'all', label: '全部功能' }, ...opts];
    }

    function usageStatusFilterOptions() {
      const rows = state.usageRows.filter(usageRowMatchesDatePreset);
      if (!rows.length) return [{ value: 'all', label: '全部状态' }];
      const arr = [...new Set(rows.map((r) => r.status))];
      if (arr.length <= 1) return arr.map((s) => ({ value: s, label: s }));
      return [{ value: 'all', label: '全部状态' }, ...arr.map((s) => ({ value: s, label: s }))];
    }

    function syncUsageFilters() {
      const fo = usageFeatureFilterOptions();
      const so = usageStatusFilterOptions();
      const fv = fo.map((o) => o.value);
      const sv = so.map((o) => o.value);
      if (!fv.includes(state.usageFilterFeature)) state.usageFilterFeature = fv[0] || 'all';
      if (!sv.includes(state.usageFilterStatus)) state.usageFilterStatus = sv[0] || 'all';
    }

    function filteredUsageRows() {
      return state.usageRows.filter((row) => {
        if (!usageRowMatchesDatePreset(row)) return false;
        if (state.usageFilterFeature !== 'all' && row.featureId !== state.usageFilterFeature) return false;
        if (state.usageFilterStatus !== 'all' && row.status !== state.usageFilterStatus) return false;
        return true;
      });
    }

    function paymentTypeFilterOptions() {
      return [
        { value: 'all', label: '全部订单类型' },
        { value: 'pro', label: 'Pro 订阅订单' },
        { value: 'basic', label: 'Basic 订阅订单' },
        { value: 'pack', label: '积分包订单' }
      ];
    }

    function syncPaymentFilters() {
      const vals = paymentTypeFilterOptions().map((o) => o.value);
      if (!vals.includes(state.paymentFilterType)) state.paymentFilterType = 'all';
    }

    function filteredPaymentRows() {
      const q = (state.paymentSearchQuery || '').trim().toLowerCase();
      return state.paymentRows.filter((row) => {
        if (state.paymentFilterType !== 'all' && row.type !== state.paymentFilterType) return false;
        if (q && !String(row.orderNo).toLowerCase().includes(q)) return false;
        return true;
      });
    }

    function getSelectedCoupon() {
      return coupons[state.selectedCouponId] || coupons.none;
    }

    function totalSelectedDevices() {
      return state.selectedDeviceIds.length;
    }

    function renewUnitPrice() {
      if (state.selectedCycle === 'month') return plan.monthPrice;
      if (state.selectedCycle === 'year') return plan.yearPrice;
      return plan.foreverPrice;
    }

    function renewUnitPoints() {
      if (state.selectedCycle === 'month') return plan.monthPoints;
      if (state.selectedCycle === 'year') return plan.yearPoints;
      return plan.foreverPoints;
    }

    function renewSubtotal() {
      return renewUnitPrice() * totalSelectedDevices();
    }

    function renewPaidAmount() {
      return renewSubtotal();
    }

    function renewAwardPoints() {
      return renewUnitPoints() * totalSelectedDevices();
    }

    function renewExtendedDays() {
      if (state.selectedCycle === 'month') return 30;
      if (state.selectedCycle === 'year') return 365;
      return 3650;
    }

    function nextExpiry(baseDate, addDays) {
      const date = new Date(baseDate + 'T23:59:59');
      date.setDate(date.getDate() + addDays);
      return date.toISOString().slice(0, 10) + ' 23:59:59';
    }

    function currentFeature(id) {
      return featureDefs.find((item) => item.id === id);
    }

    function currentPaymentDetail() {
      return state.paymentRows.find((item) => item.id === state.activePaymentId) || state.paymentRows[0];
    }

    function usageBalanceHint() {
      if (isExpired()) {
        return { type: 'warn', text: '当前 Pro 已到期，请先续费后继续使用 AI 功能。' };
      }
      if (state.notice) {
        return { type: state.scene === 'key' ? 'info' : 'warn', text: state.notice };
      }
      return null;
    }

    function applyScene(sceneKey) {
      const scene = scenes[sceneKey];
      state.scene = sceneKey;
      state.balance = scene.balance;
      state.used30 = scene.used30;
      state.expiry = scene.expiry;
      state.notice = scene.notice;
      state.availableCouponIds = clone(scene.coupons);
      state.selectedCouponId = 'none';
      state.selectedCycle = 'month';
      state.selectedPack = 5000;
      state.selectedDeviceIds = ['m30'];
      state.usageRows = buildUsageRows(sceneKey);
      state.paymentRows = buildPaymentRows(sceneKey);
      state.activePaymentId = state.paymentRows[0]?.id || '';
      state.page = 'account';
      state.modal = null;
      state.pendingFeatureId = null;
      state.accordion = { detail: false, rules: false };
      state.usageFilterFeature = 'all';
      state.usageFilterStatus = 'all';
      state.usageDatePreset = 'all';
      state.usageDateStart = '';
      state.usageDateEnd = '';
      state.paymentFilterType = 'all';
      state.paymentSearchQuery = '';
      render();
    }

    function openPage(pageName) {
      state.page = pageName;
      render();
    }

    function openModal(type) {
      state.modal = type;
      renderModal();
    }

    function closeModal() {
      state.modal = null;
      renderModal();
    }

    function toggleAccordion(section) {
      state.accordion[section] = !state.accordion[section];
      renderRenewPage();
    }

    function toggleAllDevices(checked) {
      state.selectedDeviceIds = checked ? devices.map((item) => item.id) : [];
      renderRenewPage();
    }

    function toggleDevice(id, checked) {
      if (checked) {
        if (!state.selectedDeviceIds.includes(id)) state.selectedDeviceIds.push(id);
      } else {
        state.selectedDeviceIds = state.selectedDeviceIds.filter((item) => item !== id);
      }
      renderRenewPage();
    }

    function openFeatureInfo(id) {
      state.pendingFeatureId = id;
      openModal('feature');
    }

    function simulateFeatureUse(id) {
      const feature = currentFeature(id);
      if (!feature || !feature.points) return;
      if (isExpired()) {
        openModal('expired');
        return;
      }
      if (state.balance < feature.points) {
        state.pendingFeatureId = id;
        openModal('insufficient');
        return;
      }
      state.balance -= feature.points;
      state.used30 += feature.points;
      state.usageRows.unshift({
        time: '2026-03-25 10:18:12',
        feature: feature.usageTitle,
        featureId: id,
        device: 'Visbody-M30',
        points: feature.points,
        balance: state.balance,
        status: '成功'
      });
      render();
    }

    function goRenew(deviceId) {
      state.page = 'renew';
      if (deviceId) state.selectedDeviceIds = [deviceId];
      render();
    }

    function confirmRenew() {
      if (!totalSelectedDevices()) return;
      const awardPoints = renewAwardPoints();
      const paid = renewPaidAmount();
      const extendDays = renewExtendedDays();
      const newExpiry = nextExpiry(isExpired() ? '2026-03-25' : state.expiry, extendDays);
      const cycleLabel =
        state.selectedCycle === 'month' ? 'Pro/月' : state.selectedCycle === 'year' ? 'Pro/年' : 'Pro/永久';
      const cycleText =
        state.selectedCycle === 'month' ? '月付' : state.selectedCycle === 'year' ? '年付' : '永久';
      const perUnit =
        state.selectedCycle === 'month' ? '月' : state.selectedCycle === 'year' ? '年' : '永久';
      const orderNo = `${Date.now()}`.slice(-18);
      const id = `renew-${Date.now()}`;
      const firstDev =
        devices.find((d) => state.selectedDeviceIds.includes(d.id)) || devices[0] || {};
      const subtotalStr = `¥${renewSubtotal().toFixed(2)}`;

      state.balance += awardPoints;
      state.expiry = newExpiry.slice(0, 10);
      state.paymentRows.unshift({
        id,
        orderNo,
        amount: `¥ ${paid.toFixed(2)}`,
        packageType: cycleLabel,
        status: '支付成功',
        createTime: '2026-03-25 10:22:01',
        payTime: '2026-03-25 10:22:16',
        type: 'pro',
        detail: {
          cycle: cycleText,
          points: awardPoints,
          earlyRenewal: isExpired() ? '否' : '是',
          perPrice: `¥${renewUnitPrice().toFixed(2)}/${perUnit}`,
          subtotal: subtotalStr,
          linePrice: subtotalStr,
          deviceModel: firstDev.name || '—',
          deviceSn: firstDev.sn || '—',
          deviceExpire: firstDev.expire || '—',
          proExpire: newExpiry
        }
      });
      state.activePaymentId = id;
      state.page = 'paymentDetail';
      render();
    }

      const ts = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      state.usageRows.unshift({
        time: ts,
        feature: feature.usageTitle,
        featureId: id,
        device: 'Visbody-M30',
        points: 0,
        balance: state.balance,
        status: '失败',
        remark: '服务未返回有效结果，本次未扣减积分'

      render();

        render();
      };
      const runSearch = () => {
        const el = document.getElementById('paymentSearchQuery');
        state.paymentSearchQuery = el ? el.value : '';
        render();
      };
      document.getElementById('paymentSearchBtn').onclick = runSearch;
      document.getElementById('paymentSearchQuery').onkeydown = (e) => {
        if (e.key === 'Enter') runSearch();
      };
      page.querySelectorAll('[data-detail]').forEach((el) => {
        el.onclick = () => {
          state.activePaymentId = el.dataset.detail;
          openPage('paymentDetail');
        };
      });
    }

    function renderPaymentDetailPage() {
      const page = document.getElementById('pagePaymentDetail');
      page.classList.toggle('active', state.page === 'paymentDetail');
      const row = currentPaymentDetail();
      if (!row) {
        page.innerHTML = '';
        return;
      }
      const detail = row.detail;
      const isPack = row.type === 'pack';
      const isBasic = row.type === 'basic';
      const payMethod = '微信支付';
      const feeTitle = isPack ? '积分包费用明细' : isBasic ? 'Basic 费用明细' : 'Pro费用明细';
      const thumbLabel = isPack ? 'POINTS' : isBasic ? 'BASIC' : 'M30';
      const subtotalLabel = isPack ? '积分包费用小计' : isBasic ? 'Basic费用小计' : 'Pro费用小计';
      const packExpiryNote =
        '与当前账户 Pro 有效期一致（与「我的套餐」展示同步；仅日期时默认至当日 23:59:59）。续费或变更套餐后 Pro 到期日会更新，本笔未使用积分随新的 Pro 有效期计算。每次打开本页将按最新账户状态刷新上述时间。';
      const productLinesHtml = isPack
        ? `
                    <div class="product-row"><span>积分包档位：</span><strong>${detail.packSize}</strong></div>
                    <div class="product-row"><span>本次到账积分：</span><strong>${detail.points}</strong></div>
                    <div class="product-row"><span>价格：</span><strong>${detail.subtotal}</strong></div>
                    <div class="product-row"><span>积分有效期：</span><strong>${formatAccountProExpiryDisplay()}</strong></div>
                    <div class="detail-footnote">${packExpiryNote}</div>
                  `
        : isBasic
          ? `
                    <div class="product-row"><span>设备型号：</span><strong>${detail.deviceModel || '—'}</strong></div>
                    <div class="product-row"><span>SN：</span><strong>${detail.deviceSn || '—'}</strong></div>
                    <div class="product-row"><span>设备到期时间：</span><strong>${detail.deviceExpire || '—'}</strong></div>
                    <div class="product-row"><span>套餐价格：</span><strong>${detail.perPrice || '—'}</strong></div>
                    <div class="product-row"><span>套餐到期时间：</span><strong>${detail.planExpire || '—'}</strong></div>
                    <div class="product-row"><span>价格：</span><strong>${detail.linePrice || detail.subtotal || '—'}</strong></div>
                    ${
                      detail.points > 0
                        ? `<div class="product-row"><span>本次到账积分：</span><strong>${detail.points}</strong></div>`
                        : ''
                    }
                  `
          : `
                    <div class="product-row"><span>设备型号：</span><strong>${detail.deviceModel || '—'}</strong></div>
                    <div class="product-row"><span>SN：</span><strong>${detail.deviceSn || '—'}</strong></div>
                    <div class="product-row"><span>设备到期时间：</span><strong>${detail.deviceExpire || '—'}</strong></div>
                    <div class="product-row"><span>Pro套餐价格：</span><strong>${detail.perPrice || '—'}</strong></div>
                    <div class="product-row"><span>Pro到期时间：</span><strong>${detail.proExpire || '—'}</strong></div>
                    <div class="product-row"><span>价格：</span><strong>${detail.linePrice || detail.subtotal || '—'}</strong></div>
                    <div class="product-row"><span>本次到账积分：</span><strong>${detail.points ?? '—'}</strong></div>
                  `;
      page.innerHTML = `
        <div class="detail-wrap">
          <div class="page-head">
            <div class="back-link" id="detailBack">← 返回</div>
          </div>

          <div class="detail-box">
            <div class="detail-grid">
              <div>
                <div><strong>客户ID：</strong>842</div>
                <div><strong>编号：</strong>${row.orderNo}</div>
                <div><strong>支付方式：</strong>${payMethod}</div>
                <div><strong>套餐类型：</strong>${row.packageType}</div>
              </div>
              <div>
                <div><strong>客户名称：</strong>【测试】西安测试</div>
                <div><strong>支付时间：</strong>${row.payTime}</div>
                <div><strong>状态：</strong>${row.status}</div>
              </div>
            </div>
          </div>

          <div class="detail-box">
            <h3 class="section-title">${feeTitle}</h3>
            <div class="product-card">
              <div class="product-main">
                <div class="thumb">${thumbLabel}</div>
                <div class="product-lines">
                  ${productLinesHtml}
                </div>
              </div>
              <div class="price-line">
                <span>${subtotalLabel}</span>
                <strong>${detail.subtotal}</strong>
              </div>
              <div class="final-line">
                <span>实付金额</span>
                <strong>${row.amount}</strong>
              </div>
            </div>

            <div class="footer-actions">
              <button class="btn light" id="detailCloseBtn">我已了解</button>
              <button class="btn primary" id="detailConfirmBtn">确认收据</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('detailBack').onclick = () => openPage('payments');
      document.getElementById('detailCloseBtn').onclick = () => openPage('payments');
      document.getElementById('detailConfirmBtn').onclick = () => {
        showToast('已确认查看本笔订单，可随时在「缴费记录」中再次打开。');
        openPage('payments');
      };
    }

    function renderModal() {
      const overlay = document.getElementById('overlay');
      const modal = document.getElementById('modal');
      if (!state.modal) {
        overlay.classList.remove('show');
        modal.innerHTML = '';
        return;
      }
      overlay.classList.add('show');

      if (state.modal === 'coupon') {
        modal.innerHTML = `
          <h3>我的优惠券</h3>
          <p>选择本次续费要使用的优惠券。代金券仅减少实付金额，时间优惠券仅延长有效期，不影响本次积分到账数。</p>
          <div class="modal-list">
            ${state.availableCouponIds.map((id) => {
              const item = coupons[id];
              return `
                <div class="modal-item ${state.selectedCouponId === id ? 'active' : ''}" data-coupon="${id}">
                  <div>
                    <strong>${item.name}</strong>
                    <div style="color: var(--muted); font-size: 13px;">${item.desc}</div>
                  </div>
                  <div style="color: var(--muted); font-size: 13px;">${item.discount ? `-¥${item.discount}` : item.extraDays ? `+${item.extraDays} 天` : ''}</div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="modal-actions">
            <button class="btn light" id="couponCancelBtn">取消</button>
            <button class="btn primary" id="couponConfirmBtn">确定</button>
          </div>
        `;
        modal.querySelectorAll('[data-coupon]').forEach((el) => {
          el.onclick = () => {
            state.selectedCouponId = el.dataset.coupon;
            renderModal();
          };
        });
        document.getElementById('couponCancelBtn').onclick = closeModal;
        document.getElementById('couponConfirmBtn').onclick = () => {
          closeModal();
          if (state.page === 'renew') renderRenewPage();
        };
      }

      if (state.modal === 'pack') {
        modal.innerHTML = `
          <h3>购买积分包</h3>
          <p>支付成功后积分立即到账，与 Pro 套餐获赠积分合并统计。积分有效期与当前账户 Pro 有效期一致，购买积分包不会延长 Pro 到期时间。</p>
          <div class="modal-list">
            ${[1000, 5000, 10000].map((pack) => `
              <div class="modal-item ${state.selectedPack === pack ? 'active' : ''}" data-pack="${pack}">
                <div>
                  <strong>${pack} 积分</strong>
                  <div style="color: var(--muted); font-size: 13px; line-height:1.55;">${packPurchaseCopy[pack]}</div>
                </div>
                <div style="font-weight: 700;">¥${plan.packPrices[pack]}</div>
              </div>
            `).join('')}
          </div>
          <div class="modal-summary">
            本次到账积分：<strong>${state.selectedPack}</strong><br />
            应付金额：<strong>¥${plan.packPrices[state.selectedPack]}</strong><br />
            到账说明：<strong>支付成功后立即生效</strong>；积分在 Pro 有效期内使用，Pro 全部到期后剩余积分将清零。
          </div>
          <div class="modal-actions">
            <button class="btn light" id="packCancelBtn">取消</button>
            <button type="button" class="btn primary" id="packConfirmBtn">确认并支付</button>
          </div>
        `;
        modal.querySelectorAll('[data-pack]').forEach((el) => {
          el.onclick = () => {
            state.selectedPack = Number(el.dataset.pack);
            renderModal();
          };
        });
        document.getElementById('packCancelBtn').onclick = closeModal;
        document.getElementById('packConfirmBtn').onclick = confirmPack;
      }

      if (state.modal === 'feature') {
        const feature = currentFeature(state.pendingFeatureId);
        modal.innerHTML = `
          <h3>${feature.usageTitle}</h3>
          <p>${feature.usageText}</p>
          <div class="modal-summary">
            计费规则：每次成功使用扣减 <strong>${feature.points}</strong> 积分；调用失败不扣减。<br />
            余额不足时，可先购买积分包；也可在「设备列表」中为设备开通或续费 Pro，按周期获得积分。
          </div>
          <div class="modal-actions">
            <button class="btn primary" id="featureCloseBtn">我知道了</button>
          </div>
        `;
        document.getElementById('featureCloseBtn').onclick = closeModal;
      }

      if (state.modal === 'insufficient') {
        const feature = currentFeature(state.pendingFeatureId);
        modal.innerHTML = `
          <h3>积分不足</h3>
          <p>当前可用积分不足以完成本次「${feature.usageTitle}」。购买积分包后积分立即到账，可马上继续使用；若您还需要为新设备开通 Pro 或延长多台设备服务周期，请前往设备管理选择套餐。</p>
          <div class="modal-summary">
            当前可用积分：<strong>${state.balance}</strong><br />
            本次需要：<strong>${feature.points}</strong> 积分
          </div>
          <div class="modal-actions">
            <button class="btn light" id="insufficientCancelBtn">取消</button>
            <button type="button" class="btn" id="insufficientRenewBtn">去开通 / 续费 Pro</button>
            <button type="button" class="btn primary" id="insufficientPackBtn">购买积分包</button>
          </div>
        `;
        document.getElementById('insufficientCancelBtn').onclick = closeModal;
        document.getElementById('insufficientRenewBtn').onclick = () => {
          closeModal();
          goRenew();
        };
        document.getElementById('insufficientPackBtn').onclick = () => {
          closeModal();
          openPage('pack');
        };
      }

      if (state.modal === 'expired') {
        modal.innerHTML = `
          <h3>Pro 已到期</h3>
          <p>您账户下的 Pro 服务已全部结束，消耗积分的 AI 能力暂不可用。请先完成 Pro 续费或重新开通，系统将在支付成功后按所选周期发放积分并恢复服务。</p>
          <div class="modal-summary">
            当前可用积分：<strong>${state.balance}</strong><br />
            最近一笔 Pro 到期日：<strong>${state.expiry}</strong><br />
            说明：账户内全部 Pro 到期后，剩余积分将按平台规则清零；续费成功后新周期积分按订单发放。
          </div>
          <div class="modal-actions">
            <button class="btn light" id="expiredCancelBtn">取消</button>
            <button type="button" class="btn primary" id="expiredRenewBtn">去续费 Pro</button>
          </div>
        `;
        document.getElementById('expiredCancelBtn').onclick = closeModal;
        document.getElementById('expiredRenewBtn').onclick = () => {
          closeModal();
          goRenew();
        };
      }
    }

    function render() {
      renderSceneSwitch();
      renderSimulateSwitch();
      renderNav();
      renderAccountPage();
      renderRenewPage();
      renderPackPage();
      renderUsagePage();
      renderPaymentsPage();
      renderPaymentDetailPage();
      renderModal();
    }

    document.getElementById('overlay').addEventListener('click', (event) => {
      if (event.target.id === 'overlay') closeModal();
    });

    function initTopAccountMenu() {
      const trigger = document.getElementById('accountMenuTrigger');
      const dd = document.getElementById('accountMenuDropdown');
      const myPlan = document.getElementById('accountMenuMyPlan');
      if (!trigger || !dd || !myPlan) return;
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = !dd.classList.contains('open');
        dd.classList.toggle('open', open);
        trigger.setAttribute('aria-expanded', String(open));
      });
      myPlan.addEventListener('click', (e) => {
        e.stopPropagation();
        dd.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
        openPage('account');
      });
      document.addEventListener('click', () => {
        dd.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      });
    }

    initTopAccountMenu();
    initSceneDock();
    applyScene('normal');
  </script>
</body>
</html>
